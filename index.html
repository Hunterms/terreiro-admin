  });
}

// ── AGENDA DO PAI ─────────────────────────────────────────────────────────
let agendaFiltro = 'semana'; // 'hoje' | 'semana' | 'mes' | 'todos'

function renderAgenda(c) {
  const hoje = new Date().toISOString().slice(0,10);
  const fimSemana = new Date(); fimSemana.setDate(fimSemana.getDate()+7);
  const fimSemanaStr = fimSemana.toISOString().slice(0,10);
  const fimMes = new Date(); fimMes.setDate(fimMes.getDate()+30);
  const fimMesStr = fimMes.toISOString().slice(0,10);

  let lista = [...S.atendimentos].sort((a,b) => (a.data+a.hora).localeCompare(b.data+b.hora));
  if(agendaFiltro === 'hoje') lista = lista.filter(a => a.data === hoje);
  else if(agendaFiltro === 'semana') lista = lista.filter(a => a.data >= hoje && a.data <= fimSemanaStr);
  else if(agendaFiltro === 'mes') lista = lista.filter(a => a.data >= hoje && a.data <= fimMesStr);

  // KPIs do mês
  const mesAtual = hoje.slice(0,7);
  const atendsMes = S.atendimentos.filter(a => a.data && a.data.startsWith(mesAtual));
  const realizadosMes = atendsMes.filter(a => a.status_atendimento === 'realizado');
  const receitaMes = realizadosMes.filter(a => a.status_pagamento && a.status_pagamento.startsWith('pago')).reduce((s,a)=>s+(a.valor||0),0);
  const pendentes = atendsMes.filter(a => a.status_pagamento === 'pendente' && a.status_atendimento === 'realizado').reduce((s,a)=>s+(a.valor||0),0);

  const gcalOn = gcalIsConnected();
  const gcalEm = gcalEmail();

  c.innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">Agenda do Pai</div>
        <div class="page-sub">${atendsMes.length} atendimento${atendsMes.length===1?'':'s'} esse mês · ${realizadosMes.length} realizado${realizadosMes.length===1?'':'s'}</div>
      </div>
      <div class="page-actions">
        ${gcalOn
          ? `<button class="btn" onclick="window._app.gcalDisconnect()" title="${gcalEm||''}">✓ Google Calendar conectado${gcalEm?` (${gcalEm.split('@')[0]})`:''}</button>`
          : `<button class="btn" onclick="window._app.gcalConnect()">🔗 Conectar Google Calendar</button>`}
        <button class="btn btn-primary" onclick="window._app.openAtendimentoForm()">+ Novo atendimento</button>
      </div>
    </div>

    ${gcalOn ? `
      <div style="padding:10px 14px;background:var(--green-bg);border:1px solid var(--green-bd);border-radius:8px;margin-bottom:14px;font-size:13px;color:var(--green);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
        <span>🟢 Sync ativo · Calendar de <strong>${gcalEm||'(conta google)'}</strong></span>
        <button class="btn btn-sm" onclick="window._app.buscarGcalEventos()">🔄 Buscar eventos do Calendar</button>
      </div>
    ` : `
      <div style="padding:10px 14px;background:var(--amber-bg);border:1px solid rgba(243,156,18,0.3);border-radius:8px;margin-bottom:14px;font-size:13px;color:var(--amber)">
        ⚠️ Sem sync · atendimentos ficam só aqui no admin. Clica "Conectar Google Calendar" pra sincronizar com o calendar do terreiro.
      </div>
    `}
    <div id="gcal-events-section"></div>

    <div class="grid grid-4" style="margin-bottom:18px">
      <div class="metric" style="--clr:var(--green)"><div class="ml">Receita do mês</div><div class="mv">R$ ${receitaMes.toFixed(0)}</div><div class="mh">de ${realizadosMes.length} jogo${realizadosMes.length===1?'':'s'}</div></div>
      <div class="metric" style="--clr:var(--amber)"><div class="ml">Pendente receber</div><div class="mv">R$ ${pendentes.toFixed(0)}</div></div>
      <div class="metric" style="--clr:var(--blue)"><div class="ml">Esta semana</div><div class="mv">${S.atendimentos.filter(a => a.data >= hoje && a.data <= fimSemanaStr).length}</div></div>
      <div class="metric" style="--clr:var(--gold)"><div class="ml">Consulentes únicos</div><div class="mv">${S.consulentes.filter(c=>!c.arquivado).length}</div></div>
    </div>

    <div class="tabs">
      <button class="${agendaFiltro==='hoje'?'active':''}" onclick="window._app.setAgendaFiltro('hoje')">Hoje</button>
      <button class="${agendaFiltro==='semana'?'active':''}" onclick="window._app.setAgendaFiltro('semana')">7 dias</button>
      <button class="${agendaFiltro==='mes'?'active':''}" onclick="window._app.setAgendaFiltro('mes')">30 dias</button>
      <button class="${agendaFiltro==='todos'?'active':''}" onclick="window._app.setAgendaFiltro('todos')">Todos</button>
    </div>

    <div>
      ${lista.length === 0 ? '<div class="empty"><div class="empty-t">Nenhum atendimento</div><div class="empty-s">Clique em "Novo atendimento" pra agendar.</div></div>' : lista.map(a => {
        const isHoje = a.data === hoje;
        const isPassado = a.data < hoje;
        const isBuzios = a.tipo_oraculo === 'buzios';
        const statusPag = a.status_pagamento || 'pendente';
        const corPag = statusPag.startsWith('pago') ? 'chip-green' : (statusPag === 'isento' ? 'chip' : 'chip-amber');
        const labelPag = statusPag === 'pendente' ? 'pendente' : (statusPag === 'isento' ? 'isento' : statusPag.replace('pago_','pago '));
        const corAtend = a.status_atendimento === 'realizado' ? 'chip-green' : (a.status_atendimento === 'cancelado' || a.status_atendimento === 'nao_compareceu' ? 'chip' : 'chip-blue');
        return `
          <div class="list-item" onclick="window._app.openAtendimentoForm('${a.id}')" style="cursor:pointer;${isHoje?'border-color:var(--gold-bg)':''}">
            <div class="li-avatar" style="background:${isBuzios?'rgba(155,89,182,0.15)':'var(--gold-bg)'};color:${isBuzios?'var(--purple)':'var(--gold)'};flex-direction:column;font-size:11px;line-height:1.2">
              <div style="font-weight:700;font-size:14px">${(a.data||'').slice(8,10)}</div>
              <div style="font-size:9px;text-transform:uppercase">${new Date((a.data||'')+'T00:00:00').toLocaleDateString('pt-BR',{month:'short'}).replace('.','')}</div>
            </div>
            <div class="li-main">
              <div class="li-name">${a.consulente_nome||'—'} ${isBuzios?'<span class="chip chip-purple" style="font-size:10px">búzios · privado</span>':'<span class="chip chip-gold" style="font-size:10px">baralho cigano</span>'}</div>
              <div class="li-meta">
                <span>${a.hora||'—'}${a.duracao_min?` · ${a.duracao_min}min`:''}</span>
                <span>R$ ${a.valor||0}</span>
                <span class="chip ${corPag}">${labelPag}</span>
                <span class="chip ${corAtend}">${a.status_atendimento||'agendado'}</span>
                ${isHoje?'<span class="chip chip-gold">HOJE</span>':''}
                ${isPassado && a.status_atendimento === 'agendado'?'<span class="chip chip-amber">atrasado</span>':''}
              </div>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function setAgendaFiltro(f) { agendaFiltro = f; renderRoute(); }

async function buscarGcalEventos() {
  const sec = $('#gcal-events-section');
  if(!sec) return;
  sec.innerHTML = `<div class="card" style="margin-bottom:14px;text-align:center;color:var(--text3);padding:24px"><div class="spinner" style="width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px"></div>Buscando do Google Calendar...</div>`;
  const events = await gcalListEvents(30);
  renderGcalEventos(events);
}

function renderGcalEventos(events) {
  const sec = $('#gcal-events-section');
  if(!sec) return;
  if(!events || events.length === 0) {
    sec.innerHTML = `<div class="card" style="margin-bottom:14px;text-align:center;color:var(--text3);padding:20px;font-size:13px">Nenhum evento no Calendar nos próximos 30 dias.</div>`;
    return;
  }

  // Match com atendimentos existentes (mesmo google_event_id)
  const atendByGcalId = {};
  S.atendimentos.forEach(a => { if(a.google_event_id) atendByGcalId[a.google_event_id] = a; });

  sec.innerHTML = `
    <div class="card" style="margin-bottom:14px">
      <div class="card-h">
        <div class="card-title">📅 Google Calendar do Pai (próximos 30 dias)</div>
        <div style="font-size:12px;color:var(--text3)">${events.length} evento${events.length===1?'':'s'} · cache local</div>
      </div>
      ${events.map(ev => {
        const isAllDay = !!ev.start?.date;
        const startStr = ev.start?.dateTime || ev.start?.date;
        const endStr = ev.end?.dateTime || ev.end?.date;
        const start = new Date(startStr);
        const end = endStr ? new Date(endStr) : null;
        const dataBr = start.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
        const diaSem = start.toLocaleDateString('pt-BR',{weekday:'short'}).replace('.','');
        const horaStr = isAllDay ? 'dia todo' : `${start.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}${end?` – ${end.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}`:''}`;
        const atendVinculado = atendByGcalId[ev.id];
        const nome = (ev.summary || '(sem título)').slice(0,80);
        const desc = (ev.description || '').replace(/\n/g,' · ').slice(0,120);
        const localStr = ev.location || '';
        const status = ev.status === 'cancelled' ? 'cancelado' : null;
        return `
          <div class="list-item" ${atendVinculado?`onclick="window._app.openAtendimentoForm('${atendVinculado.id}')" style="cursor:pointer"`:''}>
            <div class="li-avatar" style="background:${atendVinculado?'var(--green-bg)':'var(--blue-bg)'};color:${atendVinculado?'var(--green)':'var(--blue)'};flex-direction:column;font-size:10px;line-height:1.1">
              <div style="font-weight:700;font-size:13px">${start.getDate()}</div>
              <div style="font-size:8px;text-transform:uppercase">${start.toLocaleDateString('pt-BR',{month:'short'}).replace('.','')}</div>
            </div>
            <div class="li-main">
              <div class="li-name">${nome}${atendVinculado?' <span class="chip chip-green" style="font-size:10px;margin-left:6px">vinculado ao admin</span>':''}${status?' <span class="chip" style="font-size:10px">cancelado</span>':''}</div>
              <div class="li-meta">
                <span style="text-transform:capitalize">${diaSem}, ${dataBr}</span>
                <span>${horaStr}</span>
                ${localStr?`<span>📍 ${localStr}</span>`:''}
              </div>
              ${desc?`<div style="font-size:12px;color:var(--text3);margin-top:4px">${desc}${ev.description && ev.description.length>120?'…':''}</div>`:''}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function openAtendimentoForm(id=null) {
  const a = id ? S.atendimentos.find(x=>x.id===id) : null;
  const isEdit = !!a;
  const consulentesAtivos = S.consulentes.filter(c=>!c.arquivado).sort((a,b)=>a.nome.localeCompare(b.nome));

  openModal(`
    <div class="modal-h"><h3>${isEdit?'Editar atendimento':'Novo atendimento'}</h3><button class="btn-close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="modal-c">
      <div class="fi-group"><label>Consulente *</label>
        <select class="fi" id="at-cons">
          <option value="">— Selecione ou crie novo —</option>
          ${consulentesAtivos.map(c => `<option value="${c.id}" ${a?.consulente_id===c.id?'selected':''}>${c.nome}${c.tel?' · '+c.tel:''}</option>`).join('')}
        </select>
        <button class="btn btn-sm" style="margin-top:6px" onclick="window._app.openConsulenteForm(null,true)">+ Novo consulente</button>
      </div>
      <div class="row-2">
        <div class="fi-group"><label>Data *</label><input type="date" class="fi" id="at-data" value="${a?.data||new Date().toISOString().slice(0,10)}"/></div>
        <div class="fi-group"><label>Hora *</label><input type="time" class="fi" id="at-hora" value="${a?.hora||''}"/></div>
      </div>
      <div class="row-2">
        <div class="fi-group"><label>Tipo de oráculo *</label>
          <select class="fi" id="at-tipo">
            <option value="baralho_cigano" ${(!a||a?.tipo_oraculo==='baralho_cigano')?'selected':''}>Baralho cigano (público)</option>
            <option value="buzios" ${a?.tipo_oraculo==='buzios'?'selected':''}>Búzios (privado)</option>
          </select>
        </div>
        <div class="fi-group"><label>Duração (min)</label><input type="number" class="fi" id="at-dur" value="${a?.duracao_min||60}" min="15" step="15"/></div>
      </div>
      <div class="row-2">
        <div class="fi-group"><label>Valor (R$) *</label><input type="number" class="fi" id="at-valor" value="${a?.valor||100}" min="0" step="10"/></div>
        <div class="fi-group"><label>Status do pagamento</label>
          <select class="fi" id="at-pag">
            <option value="pendente" ${(!a||a?.status_pagamento==='pendente')?'selected':''}>Pendente</option>
            <option value="pago_pix" ${a?.status_pagamento==='pago_pix'?'selected':''}>Pago via PIX</option>
            <option value="pago_dinheiro" ${a?.status_pagamento==='pago_dinheiro'?'selected':''}>Pago em dinheiro</option>
            <option value="pago_cartao" ${a?.status_pagamento==='pago_cartao'?'selected':''}>Pago no cartão</option>
            <option value="isento" ${a?.status_pagamento==='isento'?'selected':''}>Isento</option>
          </select>
        </div>
      </div>
      <div class="fi-group"><label>Status do atendimento</label>
        <select class="fi" id="at-st">
          <option value="agendado" ${(!a||a?.status_atendimento==='agendado')?'selected':''}>Agendado</option>
          <option value="confirmado" ${a?.status_atendimento==='confirmado'?'selected':''}>Confirmado</option>
          <option value="realizado" ${a?.status_atendimento==='realizado'?'selected':''}>Realizado</option>
          <option value="nao_compareceu" ${a?.status_atendimento==='nao_compareceu'?'selected':''}>Não compareceu</option>
          <option value="cancelado" ${a?.status_atendimento==='cancelado'?'selected':''}>Cancelado</option>
        </select>
      </div>
      <div class="fi-group"><label>Observação (privada, só você e o Pai veem)</label><textarea class="fi" id="at-obs">${a?.observacao||''}</textarea></div>
    </div>
    <div class="modal-f">
      ${isEdit?'<button class="btn btn-danger" id="at-del">Excluir</button>':''}
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="at-save">${isEdit?'Salvar':'Agendar'}</button>
    </div>
  `, { lg: true });

  $('#at-save').onclick = async () => {
    const consId = $('#at-cons').value;
    if(!consId) { toast('Selecione um consulente','err'); return; }
    const cons = S.consulentes.find(x=>x.id===consId);
    if(!cons) { toast('Consulente não encontrado','err'); return; }
    const data = $('#at-data').value;
    const hora = $('#at-hora').value;
    if(!data || !hora) { toast('Informe data e hora','err'); return; }
    const tipo = $('#at-tipo').value;
    const valor = parseFloat($('#at-valor').value) || 0;
    const stPag = $('#at-pag').value;
    const stAt = $('#at-st').value;

    const payload = {
      consulente_id: consId,
      consulente_nome: cons.nome,
      consulente_tel: cons.tel || '',
      data, hora,
      duracao_min: parseInt($('#at-dur').value) || 60,
      tipo_oraculo: tipo,
      publico: tipo !== 'buzios',
      valor,
      status_pagamento: stPag,
      pago_em: stPag.startsWith('pago') && (!a || !a.status_pagamento || !a.status_pagamento.startsWith('pago')) ? serverTimestamp() : (a?.pago_em||null),
      status_atendimento: stAt,
      observacao: $('#at-obs').value.trim(),
      atualizadoEm: serverTimestamp()
    };
    try {
      let docId = id;
      if(isEdit) {
        await updateDoc(doc(dbPvd,'adm_atendimentos',id), payload);
      } else {
        payload.criadoEm = serverTimestamp();
        const ref = await addDoc(collection(dbPvd,'adm_atendimentos'), payload);
        docId = ref.id;
      }
      // se foi marcado como realizado, atualiza consulente (ultima_vez, qtd)
      if(stAt === 'realizado' && (!a || a.status_atendimento !== 'realizado')) {
        const novosAtends = (cons.qtd_atendimentos||0) + 1;
        await updateDoc(doc(dbPvd,'adm_consulentes',consId), {
          ultima_vez: serverTimestamp(),
          qtd_atendimentos: novosAtends,
          atualizadoEm: serverTimestamp()
        });
      }

      // Sync com Google Calendar (se conectado e não cancelado)
      if(gcalIsConnected() && stAt !== 'cancelado') {
        const atendFull = { ...payload, ...(a||{}) };
        if(a?.google_event_id) {
          await gcalUpdateEvent(a.google_event_id, atendFull);
        } else {
          const gevId = await gcalCreateEvent(atendFull);
          if(gevId) await updateDoc(doc(dbPvd,'adm_atendimentos',docId), { google_event_id: gevId });
        }
      } else if(gcalIsConnected() && stAt === 'cancelado' && a?.google_event_id) {
        await gcalDeleteEvent(a.google_event_id);
        await updateDoc(doc(dbPvd,'adm_atendimentos',docId), { google_event_id: null });
      }

      toast(isEdit?'Atendimento atualizado':'Atendimento agendado','ok');
      closeModal();
    } catch(e) { toast('Erro: '+e.message,'err'); }
  };

  if(isEdit) $('#at-del').onclick = () => {
    confirmar('Excluir este atendimento?', async () => {
      try {
        if(gcalIsConnected() && a?.google_event_id) await gcalDeleteEvent(a.google_event_id);
        await deleteDoc(doc(dbPvd,'adm_atendimentos',id)); toast('Atendimento excluído','ok');
      }
      catch(e) { toast('Erro: '+e.message,'err'); }
    });
  };
}

// ── CONSULENTES ────────────────────────────────────────────────────────────
let filtroConsulentes = { busca:'', arquivados:false };

function renderConsulentes(c) {
  let lista = S.consulentes.filter(x => {
    if(!filtroConsulentes.arquivados && x.arquivado) return false;
    if(filtroConsulentes.arquivados && !x.arquivado) return false;
    if(filtroConsulentes.busca) {
      const q = filtroConsulentes.busca.toLowerCase();
      return (x.nome||'').toLowerCase().includes(q) || (x.tel||'').includes(q);
    }
    return true;
  }).sort((a,b) => (b.ultima_vez?.seconds||0) - (a.ultima_vez?.seconds||0));

  c.innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">Consulentes</div>
        <div class="page-sub">${S.consulentes.filter(x=>!x.arquivado).length} ativos · ${S.consulentes.filter(x=>x.arquivado).length} arquivados</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-primary" onclick="window._app.openConsulenteForm()">+ Novo consulente</button>
      </div>
    </div>

    <div class="card" style="margin-bottom:14px">
      <div class="row-2">
        <div class="fi-group" style="margin:0">
          <label>Buscar</label>
          <input class="fi" id="cn-busca" placeholder="Nome ou telefone..." value="${filtroConsulentes.busca}"/>
        </div>
        <div class="fi-group" style="margin:0">
          <label>Mostrar</label>
          <select class="fi" id="cn-arq">
            <option value="false" ${!filtroConsulentes.arquivados?'selected':''}>Ativos</option>
            <option value="true" ${filtroConsulentes.arquivados?'selected':''}>Arquivados</option>
          </select>
        </div>
      </div>
    </div>

    <div>
      ${lista.length === 0 ? '<div class="empty"><div class="empty-t">Nenhum consulente</div></div>' : lista.map(x => `
        <div class="list-item" onclick="window._app.openConsulenteForm('${x.id}')" style="cursor:pointer">
          <div class="li-avatar">${fmt.initials(x.nome)}</div>
          <div class="li-main">
            <div class="li-name">${x.nome}</div>
            <div class="li-meta">
              ${x.tel ? `<span>📱 ${x.tel}</span>` : ''}
              <span>${x.qtd_atendimentos||0} atendimento${(x.qtd_atendimentos||0)===1?'':'s'}</span>
              ${x.ultima_vez ? `<span>último: ${fmt.rel(x.ultima_vez)}</span>` : '<span class="chip chip-blue">nunca atendido</span>'}
              ${x.origem ? `<span class="chip">${x.origem}</span>` : ''}
            </div>
          </div>
        </div>
      `).join('')}
    </div>
  `;

  $('#cn-busca').oninput = e => { filtroConsulentes.busca = e.target.value; renderConsulentes(c); };
  $('#cn-arq').onchange = e => { filtroConsulentes.arquivados = e.target.value === 'true'; renderConsulentes(c); };
}

function openConsulenteForm(id=null, fromAtendimento=false) {
  const x = id ? S.consulentes.find(c=>c.id===id) : null;
  const isEdit = !!x;
  const historico = x ? S.atendimentos.filter(a => a.consulente_id === id).sort((a,b)=>(b.data+b.hora).localeCompare(a.data+a.hora)) : [];

  openModal(`
    <div class="modal-h"><h3>${isEdit?'Consulente':'Novo consulente'}</h3><button class="btn-close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="modal-c">
      <div class="fi-group"><label>Nome *</label><input class="fi" id="cn-nome" value="${x?.nome||''}"/></div>
      <div class="row-2">
        <div class="fi-group"><label>Telefone</label><input class="fi" id="cn-tel" value="${x?.tel||''}" placeholder="11999999999"/></div>
        <div class="fi-group"><label>Email</label><input class="fi" id="cn-email" value="${x?.email||''}"/></div>
      </div>
      <div class="fi-group"><label>Como chegou aqui?</label>
        <select class="fi" id="cn-origem">
          <option value="">— Não especificado —</option>
          <option value="instagram" ${x?.origem==='instagram'?'selected':''}>Instagram</option>
          <option value="indicacao" ${x?.origem==='indicacao'?'selected':''}>Indicação</option>
          <option value="site" ${x?.origem==='site'?'selected':''}>Site</option>
          <option value="anuncio" ${x?.origem==='anuncio'?'selected':''}>Anúncio</option>
          <option value="gira_aberta" ${x?.origem==='gira_aberta'?'selected':''}>Gira aberta</option>
          <option value="outro" ${x?.origem==='outro'?'selected':''}>Outro</option>
        </select>
      </div>
      <div class="fi-group"><label>Observações do Pai (privadas — notas entre sessões)</label><textarea class="fi" id="cn-obs" style="min-height:100px">${x?.observacoes||''}</textarea></div>

      ${isEdit && historico.length ? `
        <div class="divider"></div>
        <div class="sec-lbl" style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin:14px 0 10px">Histórico — ${historico.length} atendimento${historico.length===1?'':'s'}</div>
        ${historico.slice(0,10).map(a => `
          <div style="padding:10px 12px;background:var(--glass);border-radius:8px;margin-bottom:6px;font-size:13px">
            <div style="display:flex;justify-content:space-between;gap:10px">
              <span><strong>${fmt.data(a.data)}</strong> · ${a.hora||'—'} · ${a.tipo_oraculo==='buzios'?'búzios':'baralho'}</span>
              <span class="chip ${a.status_atendimento==='realizado'?'chip-green':'chip'}">${a.status_atendimento}</span>
            </div>
            ${a.observacao?`<div style="color:var(--text2);margin-top:4px;font-size:12.5px">${a.observacao}</div>`:''}
          </div>
        `).join('')}
      ` : ''}
    </div>
    <div class="modal-f">
      ${isEdit?`<button class="btn" onclick="window._app.toggleArquivarConsulente('${id}',${!x.arquivado});closeModal()">${x.arquivado?'Restaurar':'Arquivar'}</button>`:''}
      <button class="btn" onclick="closeModal()">Cancelar</button>
      ${isEdit?`<button class="btn btn-primary" onclick="closeModal();window._app.openAtendimentoForm()" style="margin-right:6px">+ Novo atendimento</button>`:''}
      <button class="btn btn-primary" id="cn-save">${isEdit?'Salvar':(fromAtendimento?'Criar e voltar':'Criar')}</button>
    </div>
  `, { lg: true });

  $('#cn-save').onclick = async () => {
    const nome = $('#cn-nome').value.trim();
    if(!nome) { toast('Informe o nome','err'); return; }
    const data = {
      nome,
      tel: $('#cn-tel').value.replace(/\D/g,''),
      email: $('#cn-email').value.trim() || null,
      origem: $('#cn-origem').value || null,
      observacoes: $('#cn-obs').value.trim(),
      atualizadoEm: serverTimestamp()
    };
    try {
      if(isEdit) {
        await updateDoc(doc(dbPvd,'adm_consulentes',id), data);
        toast('Consulente atualizado','ok');
        closeModal();
      } else {
        data.criadoEm = serverTimestamp();
        data.primeira_vez = serverTimestamp();
        data.qtd_atendimentos = 0;
        data.arquivado = false;
        const ref = await addDoc(collection(dbPvd,'adm_consulentes'), data);
        toast('Consulente criado','ok');
        closeModal();
        if(fromAtendimento) {
          setTimeout(() => {
            openAtendimentoForm();
            setTimeout(() => { const sel = $('#at-cons'); if(sel) sel.value = ref.id; }, 100);
          }, 200);
        }
      }
    } catch(e) { toast('Erro: '+e.message,'err'); }
  };
}

async function toggleArquivarConsulente(id, valor) {
  try { await updateDoc(doc(dbPvd,'adm_consulentes',id), { arquivado: valor, atualizadoEm: serverTimestamp() }); toast(valor?'Arquivado':'Restaurado','ok'); }
  catch(e) { toast('Erro: '+e.message,'err'); }
}

// ── CONTROLE DE DISPONIBILIDADE (quem já marcou) ──────────────────────────
function renderControleDisp(c) {
  const now = new Date();
  const meses = [
    now.toISOString().slice(0,7),
    new Date(now.getFullYear(), now.getMonth()+1, 1).toISOString().slice(0,7)
  ];
  const labelMes = m => {
    const [a,mm] = m.split('-').map(Number);
    return new Date(a, mm-1, 1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  };

  const filhosAtivos = S.filhos.filter(f => !f.status || f.status === 'ativo');
  const filhosOrd = [...filhosAtivos].sort((a,b) => a.nome.localeCompare(b.nome));

  const linkPublico = window.location.origin + window.location.pathname.replace(/index\.html$/,'').replace(/\/$/,'') + '/disponibilidade.html';

  const linhaFilho = (f, m) => {
    const docId = `${f.id}_${m}`;
    const disp = S.disponibilidade.find(d => d.id === docId);
    const marcou = !!disp;
    const totalDias = disp?.datas_indisponivel?.length || 0;
    const totalFuncs = disp?.funcoes_indisponivel?.length || 0;
    const atualizadoEm = disp?.atualizadoEm ? fmt.rel(disp.atualizadoEm) : null;
    const msg = encodeURIComponent(`Olá ${f.nome.split(' ')[0]}! Lembra de marcar sua disponibilidade pra ${labelMes(m)}? É só entrar no link e escolher o seu nome:\n\n${linkPublico}\n\nObrigado! 🙏`);
    const wppLink = f.tel ? `https://wa.me/55${f.tel}?text=${msg}` : null;

    return `
      <div class="list-item">
        <div class="li-avatar" style="background:${marcou?'var(--green-bg)':'var(--glass2)'};color:${marcou?'var(--green)':'var(--text3)'}">
          ${marcou ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="width:18px;height:18px"><polyline points="20 6 9 17 4 12"/></svg>' : fmt.initials(f.nome)}
        </div>
        <div class="li-main">
          <div class="li-name">${f.nome}</div>
          <div class="li-meta">
            ${marcou ? `
              <span class="chip chip-green">marcou</span>
              <span>${totalDias} dia${totalDias===1?'':'s'} indisponível</span>
              ${totalFuncs?`<span>${totalFuncs} função(ões) recusada(s)</span>`:''}
              ${atualizadoEm?`<span style="color:var(--text3)">atualizou ${atualizadoEm}</span>`:''}
              ${disp?.obs?`<span style="font-style:italic">"${disp.obs}"</span>`:''}
            ` : `
              <span class="chip">não marcou</span>
              ${f.tel?'':'<span style="color:var(--amber)">sem telefone cadastrado</span>'}
            `}
          </div>
        </div>
        <div class="li-actions">
          ${wppLink ? `<a class="btn btn-sm" href="${wppLink}" target="_blank" title="Lembrar via WhatsApp">
            <svg viewBox="0 0 24 24" fill="currentColor" style="width:13px;height:13px;color:#25d366"><path d="M17.6 6.32A8 8 0 005.74 17l-1.07 4.04 4.13-1.08A8 8 0 1017.6 6.32zM12 19.67c-1.36 0-2.69-.37-3.84-1.06l-.28-.16-2.86.75.76-2.79-.18-.29A6.66 6.66 0 0118.66 12 6.67 6.67 0 0112 19.67z"/></svg>
            Lembrar
          </a>` : ''}
        </div>
      </div>
    `;
  };

  const cardMes = m => {
    const docsM = filhosOrd.map(f => ({ f, marcou: S.disponibilidade.some(d => d.id === `${f.id}_${m}`) }));
    const marcaram = docsM.filter(x => x.marcou).length;
    const pct = filhosOrd.length ? Math.round((marcaram/filhosOrd.length)*100) : 0;
    const semTel = filhosOrd.filter(f => !f.tel).length;

    return `
      <div class="card" style="margin-bottom:14px">
        <div class="card-h">
          <div class="card-title" style="text-transform:capitalize">${labelMes(m)}</div>
          <div style="font-size:13px;color:var(--text3)">
            <strong style="color:${pct>=70?'var(--green)':(pct>=40?'var(--amber)':'var(--red)')}">${marcaram}/${filhosOrd.length}</strong> marcaram · ${pct}%
          </div>
        </div>

        <div style="background:var(--glass2);border-radius:6px;height:8px;overflow:hidden;margin-bottom:14px">
          <div style="width:${pct}%;height:100%;background:linear-gradient(90deg,var(--green),var(--gold));transition:width .3s"></div>
        </div>

        ${semTel > 0 ? `<div style="font-size:12px;color:var(--amber);margin-bottom:12px;padding:8px 12px;background:var(--amber-bg);border-radius:6px">⚠️ ${semTel} filho(s) sem telefone cadastrado — não dá pra mandar lembrete por WhatsApp.</div>` : ''}

        ${docsM.filter(x => !x.marcou).length > 0 ? `
          <div style="font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin:6px 0 10px">Ainda não marcaram (${docsM.filter(x => !x.marcou).length})</div>
          ${docsM.filter(x => !x.marcou).map(x => linhaFilho(x.f, m)).join('')}
        `:''}

        ${docsM.filter(x => x.marcou).length > 0 ? `
          <div style="font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin:18px 0 10px">Já marcaram (${docsM.filter(x => x.marcou).length})</div>
          ${docsM.filter(x => x.marcou).map(x => linhaFilho(x.f, m)).join('')}
        `:''}
      </div>
    `;
  };

  c.innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">Controle de disponibilidade</div>
        <div class="page-sub">Quem já marcou e quem ainda falta · ${filhosOrd.length} filhos ativos</div>
      </div>
      <div class="page-actions">
        <a class="btn" href="disponibilidade.html" target="_blank">↗ Abrir página pública</a>
        <button class="btn btn-primary" id="ctd-broadcast">Lembrar todos por WhatsApp</button>
      </div>
    </div>

    ${meses.map(cardMes).join('')}
  `;

  // Broadcast: abre vários links de WhatsApp em sequência (browser pode bloquear popups múltiplos)
  $('#ctd-broadcast').onclick = () => {
    const msg = encodeURIComponent(`Salve! Lembre-se de marcar sua disponibilidade do mês:\n\n${linkPublico}\n\nÉ só escolher seu nome no dropdown. Obrigado!`);
    // Pega um filho sem marcação do mês atual com tel pra abrir
    const pendentes = filhosOrd.filter(f => f.tel && !S.disponibilidade.some(d => d.id === `${f.id}_${meses[0]}`));
    if(pendentes.length === 0) { toast('Todos já marcaram esse mês ou não têm telefone','ok'); return; }
    // Abrir links seria intrusivo — em vez disso, copia o link de WhatsApp do GRUPO (se tiver) ou só copia o link
    navigator.clipboard.writeText(`Salve! Lembrem de marcar a disponibilidade do mês: ${linkPublico}`).then(() => {
      toast('Mensagem copiada — cola no grupo do WhatsApp','ok');
    });
  };
}

// ── REGA (rodízio voluntário diário) ──────────────────────────────────────
function renderRega(c) {
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const hojeStr = hoje.toISOString().slice(0,10);
  const linkPublico = window.location.origin + window.location.pathname.replace(/index\.html$/,'').replace(/\/$/,'') + '/disponibilidade.html';

  // Map: data → reserva
  const porDia = {};
  S.regas.forEach(r => { porDia[r.data] = r; });

  // Mês atual e próximo
  const mes1 = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
  const mes2 = new Date(hoje.getFullYear(), hoje.getMonth()+1, 1);

  // Cobertura por mês: quantos dias do mês a partir de hoje estão cobertos
  function coberturaMes(mesDate) {
    const ano = mesDate.getFullYear(), mes = mesDate.getMonth();
    const last = new Date(ano, mes+1, 0);
    const inicio = mesDate.toISOString().slice(0,10) < hojeStr ? hojeStr : mesDate.toISOString().slice(0,10);
    let total = 0, cobertos = 0;
    for(let d = 1; d <= last.getDate(); d++) {
      const dStr = `${ano}-${pad(mes+1)}-${pad(d)}`;
      if(dStr < inicio) continue;
      total++;
      if(porDia[dStr]) cobertos++;
    }
    return { total, cobertos };
  }

  function pad(n) { return String(n).padStart(2,'0'); }

  function renderMesCal(mesDate) {
    const ano = mesDate.getFullYear(), mes = mesDate.getMonth();
    const first = new Date(ano, mes, 1);
    const last = new Date(ano, mes+1, 0);
    const firstDow = first.getDay();
    const daysInMonth = last.getDate();
    const nomeMes = first.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
    const { total, cobertos } = coberturaMes(mesDate);
    const pct = total ? Math.round((cobertos/total)*100) : 0;

    let cells = '';
    for(let i=0; i<firstDow; i++) cells += `<div></div>`;
    for(let d=1; d<=daysInMonth; d++) {
      const dStr = `${ano}-${pad(mes+1)}-${pad(d)}`;
      const passado = dStr < hojeStr;
      const reserva = porDia[dStr];
      const confirmado = reserva?.realizado;
      const ehHoje = dStr === hojeStr;
      // Verde forte = confirmado, verde claro = reservado, âmbar = sem cobertura
      let bg, bd, col;
      if(confirmado) { bg='rgba(46,204,113,0.22)'; bd='var(--green)'; col='var(--green)'; }
      else if(reserva) { bg='var(--green-bg)'; bd='var(--green-bd)'; col='var(--green)'; }
      else { bg = passado ? 'transparent' : 'rgba(243,156,18,0.08)'; bd = 'var(--border)'; col = passado ? 'var(--text3)' : 'var(--amber)'; }
      if(ehHoje) bd = 'var(--red)';
      const nome = reserva ? (reserva.realizado_por_nome||reserva.filho_nome||'').split(' ')[0] : '';
      const tip = confirmado ? `✓ ${reserva.realizado_por_nome||reserva.filho_nome} confirmou` : (reserva ? `Reservado por ${reserva.filho_nome}` : (passado?'':'Sem cobertura'));
      cells += `
        <div style="aspect-ratio:1;background:${bg};border:1px solid ${bd};border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:14px;color:${col};opacity:${passado&&!confirmado?'.3':'1'};padding:4px;position:relative" title="${tip}">
          ${confirmado ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="width:9px;height:9px;position:absolute;top:3px;right:3px"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
          <div style="font-weight:700">${d}</div>
          ${nome ? `<div style="font-size:9px;font-weight:600;line-height:1;margin-top:2px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:48px">${nome}</div>` : ''}
        </div>
      `;
    }

    return `
      <div class="card" style="margin-bottom:14px">
        <div class="card-h">
          <div class="card-title" style="text-transform:capitalize">${nomeMes}</div>
          <div style="font-size:13px;color:var(--text3)"><strong style="color:${pct>=70?'var(--green)':(pct>=40?'var(--amber)':'var(--red)')}">${cobertos}/${total}</strong> dias cobertos · ${pct}%</div>
        </div>
        <div style="background:var(--glass2);border-radius:6px;height:6px;overflow:hidden;margin-bottom:12px">
          <div style="width:${pct}%;height:100%;background:linear-gradient(90deg,var(--green),var(--gold))"></div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px">
          ${['D','S','T','Q','Q','S','S'].map(d=>`<div style="text-align:center;font-size:10px;color:var(--text3);font-weight:600;padding:4px">${d}</div>`).join('')}
          ${cells}
        </div>
      </div>
    `;
  }

  const reservaHoje = porDia[hojeStr];
  const semCobertura = [];
  for(let i = 0; i < 14; i++) {
    const d = new Date(hoje); d.setDate(hoje.getDate()+i);
    const dStr = d.toISOString().slice(0,10);
    if(!porDia[dStr]) semCobertura.push(dStr);
  }

  c.innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">Rega</div>
        <div class="page-sub">1 pessoa por dia · filhos reservam pela página pública</div>
      </div>
      <div class="page-actions">
        <a class="btn" href="disponibilidade.html" target="_blank">↗ Página pública</a>
      </div>
    </div>

    <div class="card" style="margin-bottom:14px;border-color:${reservaHoje?(reservaHoje.realizado?'var(--green)':'var(--green-bd)'):'var(--amber-bg)'}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <span class="chip ${reservaHoje?(reservaHoje.realizado?'chip-green':'chip-green'):'chip-amber'}">HOJE · ${new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'})}</span>
        ${reservaHoje?.realizado ? '<span class="chip chip-green">✓ CONFIRMADO</span>' : (reservaHoje?'<span class="chip chip-amber">PENDENTE DE CONFIRMAÇÃO</span>':'')}
      </div>
      ${reservaHoje && reservaHoje.realizado ? `
        <div style="font-size:18px;font-weight:700;color:var(--green)">${reservaHoje.realizado_por_nome || reservaHoje.filho_nome} regou hoje 🌱</div>
        <div style="font-size:12px;color:var(--text3);margin-top:4px">Confirmado pelo QR code ${reservaHoje.realizadoEm ? '· ' + fmt.rel(reservaHoje.realizadoEm) : ''}</div>
      ` : reservaHoje ? `
        <div style="font-size:18px;font-weight:700;color:var(--green)">${reservaHoje.filho_nome}</div>
        <div style="font-size:13px;color:var(--text2);margin-top:4px">Reservou — ainda não confirmou que regou (esperando QR no terreiro)</div>
      ` : `
        <div style="font-size:15px;color:var(--amber);font-weight:600">Sem cobertura pra hoje 😬</div>
        <div style="font-size:13px;color:var(--text2);margin-top:6px">Nenhum filho assumiu este dia. Manda a página pra galera ou peça no grupo.</div>
        <button class="btn btn-primary" style="margin-top:10px" onclick="navigator.clipboard.writeText('Salve! Faltam dias na escala de rega da casa: ${linkPublico}').then(()=>window._app.toast('Mensagem copiada','ok'))">Copiar mensagem pro grupo</button>
      `}
    </div>

    <details class="card" style="margin-bottom:14px;padding:0">
      <summary style="padding:16px 22px;cursor:pointer;list-style:none;display:flex;align-items:center;gap:10px;user-select:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;color:var(--gold);flex-shrink:0"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h7v7"/></svg>
        <div style="flex:1">
          <div style="font-size:15px;font-weight:700">QR code pra confirmação no terreiro</div>
          <div style="font-size:12px;color:var(--text3);margin-top:2px">Imprime e cola no espaço · filho escaneia depois de regar</div>
        </div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;color:var(--text3)"><polyline points="6 9 12 15 18 9"/></svg>
      </summary>
      <div style="padding:0 22px 22px;text-align:center">
        ${(() => {
          const urlConf = window.location.origin + window.location.pathname.replace(/index\.html$/,'').replace(/\/$/,'') + '/confirma-rega.html';
          const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(urlConf)}&bgcolor=ffffff&color=000000&margin=10`;
          return `
            <div style="background:#fff;display:inline-block;padding:14px;border-radius:10px;margin-bottom:14px">
              <img src="${qrUrl}" alt="QR confirma rega" style="display:block;width:240px;height:240px"/>
            </div>
            <div style="font-size:12px;color:var(--text3);margin-bottom:8px">URL que o QR aponta:</div>
            <div style="font-family:monospace;font-size:12px;color:var(--text);background:var(--glass2);padding:8px 12px;border-radius:6px;word-break:break-all;margin-bottom:14px">${urlConf}</div>
            <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
              <a class="btn btn-sm" href="${qrUrl}" target="_blank" download="qr-rega-candieiro.png">Baixar PNG</a>
              <button class="btn btn-sm" onclick="window.print()">Imprimir esta página</button>
              <a class="btn btn-sm" href="confirma-rega.html" target="_blank">Testar página</a>
            </div>
            <div style="font-size:12px;color:var(--text3);margin-top:14px;line-height:1.5">
              Sugestão: imprime, plastifica e cola perto das plantas. Filho escaneia com o celular, escolhe o nome, confirma. Sistema marca como ✓.
            </div>
          `;
        })()}
      </div>
    </details>

    ${semCobertura.length > 0 ? `
      <div class="card" style="margin-bottom:14px;border-color:var(--amber-bg)">
        <div class="card-h">
          <div class="card-title" style="color:var(--amber)">⚠️ Próximos 14 dias sem cobertura (${semCobertura.length})</div>
        </div>
        <div class="chips">
          ${semCobertura.slice(0,14).map(d => `<span class="chip chip-amber">${fmt.data(d)}</span>`).join('')}
        </div>
      </div>
    `:''}

    ${renderMesCal(mes1)}
    ${renderMesCal(mes2)}
  `;
}

// ── DESPENSA DO ILÊ ───────────────────────────────────────────────────────

async function seedDespensa() {
  if(S.despensa.length > 0) {
    if(!confirm(`Já existem ${S.despensa.length} itens cadastrados. Importar mesmo assim (vai criar duplicatas)?`)) return;
  }
  toast(`Importando ${DESPENSA_INICIAL.length} itens... aguarde`,'ok');
  let ok = 0, erros = 0;
  for(const [nome, categoria] of DESPENSA_INICIAL) {
    try {
      await addDoc(collection(dbPvd,'adm_despensa'), {
        nome,
        categoria,
        unidade: 'un',
        estoque: 0,
        minimo: 0,
        obs: '',
        criadoEm: serverTimestamp(),
        atualizadoEm: serverTimestamp()
      });
      ok++;
    } catch(e) { console.error(e); erros++; }
  }
  toast(`${ok} itens importados${erros?` · ${erros} com erro`:''}. Agora ajusta quantidades e mínimos.`,ok?'ok':'err');
}

function renderDespensa(c) {
  const categorias = [...new Set(S.despensa.map(p => p.categoria).filter(Boolean))].sort();
  let lista = [...S.despensa].sort((a,b) => (a.nome||'').localeCompare(b.nome||''));

  if(filtroDespensa.busca) {
    const q = filtroDespensa.busca.toLowerCase();
    lista = lista.filter(p => (p.nome||'').toLowerCase().includes(q));
  }
  if(filtroDespensa.categoria !== 'todas') {
    lista = lista.filter(p => p.categoria === filtroDespensa.categoria);
  }
  if(filtroDespensa.stockOnly === 'baixo') {
    lista = lista.filter(p => (p.estoque||0) <= (p.minimo||0));
  } else if(filtroDespensa.stockOnly === 'zerado') {
    lista = lista.filter(p => (p.estoque||0) === 0);
  }

  const baixos = S.despensa.filter(p => (p.estoque||0) <= (p.minimo||0) && (p.estoque||0) > 0).length;
  const zerados = S.despensa.filter(p => (p.estoque||0) === 0).length;

  c.innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">Despensa</div>
        <div class="page-sub">${S.despensa.length} item${S.despensa.length===1?'':'s'} cadastrado${S.despensa.length===1?'':'s'} · velas, ervas, defumadores, suprimentos do ilê</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-primary" onclick="window._app.openItemDespensaForm()">+ Novo item</button>
      </div>
    </div>

    <div class="grid grid-3" style="margin-bottom:18px">
      <div class="metric" style="--clr:var(--gold)"><div class="ml">Itens cadastrados</div><div class="mv">${S.despensa.length}</div></div>
      <div class="metric" style="--clr:${zerados>0?'var(--red)':'var(--green)'}"><div class="ml">Zerados</div><div class="mv">${zerados}</div><div class="mh">precisam repor</div></div>
      <div class="metric" style="--clr:var(--amber)"><div class="ml">Estoque baixo</div><div class="mv">${baixos}</div><div class="mh">≤ mínimo</div></div>
    </div>

    <div class="card" style="margin-bottom:14px">
      <div class="grid grid-3">
        <div class="fi-group" style="margin:0"><label>Buscar</label><input class="fi" id="dp-busca" placeholder="Nome do item" value="${filtroDespensa.busca}"/></div>
        <div class="fi-group" style="margin:0"><label>Categoria</label>
          <select class="fi" id="dp-cat">
            <option value="todas">Todas</option>
            ${categorias.map(c => `<option value="${c}" ${filtroDespensa.categoria===c?'selected':''}>${c}</option>`).join('')}
          </select>
        </div>
        <div class="fi-group" style="margin:0"><label>Estoque</label>
          <select class="fi" id="dp-stock">
            <option value="todos">Todos</option>
            <option value="baixo" ${filtroDespensa.stockOnly==='baixo'?'selected':''}>Abaixo do mínimo</option>
            <option value="zerado" ${filtroDespensa.stockOnly==='zerado'?'selected':''}>Zerado</option>
          </select>
        </div>
      </div>
    </div>

    <div>
      ${lista.length === 0 ? `
        <div class="empty">
          <div class="empty-t">${S.despensa.length === 0 ? 'Despensa vazia' : 'Nenhum item bate os filtros'}</div>
          ${S.despensa.length === 0 ? `
            <div class="empty-s">Posso importar a lista do terreiro (${DESPENSA_INICIAL.length} itens · velas, ervas, pós, raízes, cascas, sementes, terras) com estoque zerado.<br>Depois você ajusta quantidades e mínimos item por item.</div>
            <button class="btn btn-primary" style="margin-top:18px" onclick="window._app.seedDespensa()">Importar lista do terreiro (${DESPENSA_INICIAL.length} itens)</button>
          ` : ''}
        </div>
      ` : lista.map(p => {
        const baixo = (p.estoque||0) <= (p.minimo||0);
        const zerado = (p.estoque||0) === 0;
        const corBg = zerado ? 'var(--red-bg)' : (baixo ? 'rgba(243,156,18,0.08)' : 'var(--glass)');
        const corBd = zerado ? 'var(--red-bd)' : (baixo ? 'rgba(243,156,18,0.2)' : 'var(--border)');
        return `
        <div class="list-item" style="background:${corBg};border-color:${corBd}" onclick="window._app.openItemDespensaForm('${p.id}')">
          <div class="li-avatar" style="background:${zerado?'var(--red-bg)':(baixo?'var(--amber-bg)':'var(--gold-bg)')};color:${zerado?'var(--red)':(baixo?'var(--amber)':'var(--gold)')};flex-direction:column;font-size:11px;line-height:1.1">
            <div style="font-size:16px;font-weight:700">${p.estoque||0}</div>
            <div style="font-size:9px;text-transform:uppercase">${p.unidade||'un'}</div>
          </div>
          <div class="li-main">
            <div class="li-name">${p.nome||'—'}</div>
            <div class="li-meta">
              ${p.categoria ? `<span class="chip">${p.categoria}</span>` : ''}
              <span style="color:var(--text3)">mínimo: ${p.minimo||0}</span>
              ${p.obs ? `<span style="color:var(--text3);font-style:italic">${p.obs}</span>` : ''}
              ${zerado ? '<span class="chip chip-red">ZERADO</span>' : (baixo ? '<span class="chip chip-amber">baixo</span>' : '')}
            </div>
          </div>
          <div class="li-actions">
            <button class="btn btn-sm" onclick="event.stopPropagation();window._app.movimentarDespensa('${p.id}','entrada')">+ Entrada</button>
            <button class="btn btn-sm" onclick="event.stopPropagation();window._app.movimentarDespensa('${p.id}','saida')">− Saída</button>
          </div>
        </div>
        `;
      }).join('')}
    </div>
  `;

  $('#dp-busca').oninput = e => { filtroDespensa.busca = e.target.value; renderDespensa(c); };
  $('#dp-cat').onchange = e => { filtroDespensa.categoria = e.target.value; renderDespensa(c); };
  $('#dp-stock').onchange = e => { filtroDespensa.stockOnly = e.target.value; renderDespensa(c); };
}

function openItemDespensaForm(id=null) {
  const p = id ? S.despensa.find(x=>x.id===id) : null;
  const isEdit = !!p;
  const categorias = [...new Set(S.despensa.map(x => x.categoria).filter(Boolean))].sort();
  const categoriasSugeridas = ['velas','ervas','defumadores','bebidas','grãos e farinhas','flores','imagens','material'];
  const catsListadas = [...new Set([...categorias, ...categoriasSugeridas])];

  openModal(`
    <div class="modal-h"><h3>${isEdit?'Editar item':'Novo item da despensa'}</h3><button class="btn-close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="modal-c">
      <div class="fi-group"><label>Nome *</label><input class="fi" id="dp-nome" value="${p?.nome||''}" placeholder="ex: Vela branca 7 dias, Alfazema, Cachaça..."/></div>
      <div class="row-2">
        <div class="fi-group"><label>Categoria</label>
          <input class="fi" id="dp-cat-i" value="${p?.categoria||''}" placeholder="ex: velas, ervas..." list="dp-cats-list"/>
          <datalist id="dp-cats-list">${catsListadas.map(c=>`<option value="${c}"></option>`).join('')}</datalist>
        </div>
        <div class="fi-group"><label>Unidade</label>
          <select class="fi" id="dp-un">
            ${['un','kg','g','L','ml','cx','mç','par','dz'].map(u=>`<option value="${u}" ${p?.unidade===u?'selected':(!p&&u==='un'?'selected':'')}>${u}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="row-2">
        <div class="fi-group"><label>Estoque atual</label><input type="number" step="0.01" class="fi" id="dp-est" value="${p?.estoque||0}"/></div>
        <div class="fi-group"><label>Estoque mínimo (alerta)</label><input type="number" step="0.01" class="fi" id="dp-min" value="${p?.minimo||0}"/></div>
      </div>
      <div class="fi-group"><label>Observação (opcional)</label><textarea class="fi" id="dp-obs" placeholder="onde compra, marca preferida, uso ritual...">${p?.obs||''}</textarea></div>
    </div>
    <div class="modal-f">
      ${isEdit?'<button class="btn btn-danger" id="dp-del">Excluir</button>':''}
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="dp-save">${isEdit?'Salvar':'Criar'}</button>
    </div>
  `, { lg: true });

  $('#dp-save').onclick = async () => {
    const nome = $('#dp-nome').value.trim();
    if(!nome) { toast('Informe o nome','err'); return; }
    const data = {
      nome,
      categoria: $('#dp-cat-i').value.trim(),
      unidade: $('#dp-un').value,
      estoque: parseFloat($('#dp-est').value) || 0,
      minimo: parseFloat($('#dp-min').value) || 0,
      obs: $('#dp-obs').value.trim(),
      atualizadoEm: serverTimestamp()
    };
    try {
      if(isEdit) {
        await updateDoc(doc(dbPvd,'adm_despensa',id), data);
      } else {
        data.criadoEm = serverTimestamp();
        await addDoc(collection(dbPvd,'adm_despensa'), data);
      }
      toast(isEdit?'Item atualizado':'Item cadastrado','ok');
      closeModal();
    } catch(e) { toast('Erro: '+e.message,'err'); }
  };

  if(isEdit) $('#dp-del').onclick = () => {
    confirmar(`Excluir <strong>${p.nome}</strong> da despensa?`, async () => {
      try { await deleteDoc(doc(dbPvd,'adm_despensa',id)); toast('Item excluído','ok'); }
      catch(e) { toast('Erro: '+e.message,'err'); }
    });
  };
}

async function movimentarDespensa(id, tipo) {
  const p = S.despensa.find(x => x.id === id);
  if(!p) return;
  const label = tipo === 'entrada' ? 'Entrada (compra/reposição)' : 'Saída (uso ritual / consumo)';
  openModal(`
    <div class="modal-h"><h3>${label} — ${p.nome}</h3><button class="btn-close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="modal-c">
      <div style="font-size:13px;color:var(--text3);margin-bottom:14px">Estoque atual: <strong style="color:var(--text)">${p.estoque||0} ${p.unidade||''}</strong></div>
      <div class="fi-group"><label>Quantidade *</label><input type="number" step="0.01" class="fi" id="mv-qtd" value="1" min="0.01" autofocus/></div>
      <div class="fi-group"><label>Observação (opcional)</label><input class="fi" id="mv-obs" placeholder="${tipo==='entrada'?'ex: comprado em casa de umbanda X':'ex: usado em gira / oferenda pra Iansã'}"/></div>
    </div>
    <div class="modal-f">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="mv-save">Confirmar ${tipo === 'entrada' ? 'entrada' : 'saída'}</button>
    </div>
  `);

  $('#mv-save').onclick = async () => {
    const qtd = parseFloat($('#mv-qtd').value) || 0;
    if(qtd <= 0) { toast('Quantidade inválida','err'); return; }
    const delta = tipo === 'entrada' ? qtd : -qtd;
    const novoEstoque = (p.estoque||0) + delta;
    if(novoEstoque < 0) { toast('Estoque ficaria negativo','err'); return; }
    try {
      await updateDoc(doc(dbPvd,'adm_despensa',id), { estoque: novoEstoque, atualizadoEm: serverTimestamp() });
      toast(`${tipo === 'entrada' ? 'Entrada' : 'Saída'} registrada · agora: ${novoEstoque} ${p.unidade||''}`,'ok');
      closeModal();
    } catch(e) { toast('Erro: '+e.message,'err'); }
  };
}

function atualizarBadgeSolicitacoes() {
  const pendentes = S.solicitacoes.filter(s => s.status === 'pendente').length;
  const badge = $('#sol-badge');
  if(!badge) return;
  if(pendentes > 0) { badge.textContent = pendentes; badge.style.display = ''; }
  else badge.style.display = 'none';
}

async function aprovarSolicitacao(id) {
  const s = S.solicitacoes.find(x => x.id === id);
  if(!s) return;
  confirmar(`Aprovar agendamento de <strong>${s.nome}</strong> em ${fmt.data(s.data)} às ${s.hora}? Vou criar o consulente e o atendimento automaticamente.`, async () => {
    try {
      // 1. Verifica se consulente já existe (pelo tel)
      let consId = null;
      if(s.tel) {
        const existente = S.consulentes.find(c => c.tel === s.tel || c.nome.toLowerCase() === s.nome.toLowerCase());
        if(existente) consId = existente.id;
      }
      // 2. Cria consulente se necessário
      if(!consId) {
        const ref = await addDoc(collection(dbPvd,'adm_consulentes'), {
          nome: s.nome,
          tel: s.tel || '',
          email: s.email || null,
          origem: 'site',
          observacoes: s.observacao || '',
          primeira_vez: serverTimestamp(),
          qtd_atendimentos: 0,
          arquivado: false,
          criadoEm: serverTimestamp(),
          atualizadoEm: serverTimestamp()
        });
        consId = ref.id;
      }
      // 3. Cria atendimento agendado
      await addDoc(collection(dbPvd,'adm_atendimentos'), {
        consulente_id: consId,
        consulente_nome: s.nome,
        consulente_tel: s.tel || '',
        data: s.data,
        hora: s.hora,
        duracao_min: s.duracao_min || 60,
        tipo_oraculo: s.tipo_oraculo || 'baralho_cigano',
        publico: true,
        valor: s.valor_proposto || 0,
        status_pagamento: 'pendente',
        pago_em: null,
        status_atendimento: 'agendado',
        observacao: s.observacao || '',
        origem_solicitacao_id: id,
        criadoEm: serverTimestamp(),
        atualizadoEm: serverTimestamp()
      });
      // 4. Marca solicitação como aprovada
      await updateDoc(doc(dbPvd,'adm_solicitacoes',id), {
        status: 'aprovada',
        atualizadoEm: serverTimestamp()
      });
      toast('Aprovado · agendamento criado','ok');
    } catch(e) { toast('Erro: '+e.message,'err'); }
  });
}

async function rejeitarSolicitacao(id) {
  const s = S.solicitacoes.find(x => x.id === id);
  if(!s) return;
  confirmar(`Rejeitar pedido de <strong>${s.nome}</strong>? O slot fica livre de novo.`, async () => {
    try {
      await updateDoc(doc(dbPvd,'adm_solicitacoes',id), { status: 'rejeitada', atualizadoEm: serverTimestamp() });
      toast('Rejeitada','ok');
    } catch(e) { toast('Erro: '+e.message,'err'); }
  });
}

// ── VIEWS DO FILHO ─────────────────────────────────────────────────────────
function renderMeuDashboard(c) {
  const f = S.filhoDoc;
  const hoje = new Date().toISOString().slice(0,10);
  // Ordena pela data efetiva (limpeza depois conta como +1 dia)
  const minhasEscalas = S.escalas
    .filter(es => (es.alocacoes||[]).some(a => a.filho_id === f.id))
    .map(es => {
      const aloc = es.alocacoes.find(a => a.filho_id === f.id);
      return { es, aloc, dataReal: dataEfetivaAloc(es, aloc) };
    })
    .filter(x => x.dataReal >= hoje)
    .sort((a,b) => a.dataReal.localeCompare(b.dataReal));
  const prox = minhasEscalas[0];
  const proxima = prox?.es;
  const proxEvento = proxima ? S.eventos.find(e => e.id === proxima.evento_id) : null;
  const minhaFuncaoProx = prox?.aloc?.funcao_id;
  const nomeFuncao = minhaFuncaoProx ? S.funcoes.find(fn=>fn.id===minhaFuncaoProx)?.nome : '';
  const dataReal = prox?.dataReal;
  const ehDepois = dataReal && dataReal !== proxima?.data;

  const avisosAtivos = S.avisos.filter(a=>!a.arquivado).slice(0,3);
  const meusCards = S.kanban.filter(k => !k.arquivado && k.status!=='done' && (k.responsaveis||[]).includes(f.id));

  c.innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">Olá, ${f.nome.split(' ')[0]}</div>
        <div class="page-sub">${proxima ? `Próxima: ${nomeFuncao} em ${proxEvento?.nome||''} (${fmt.data(dataReal)})` : 'Sem escalas próximas'}</div>
      </div>
    </div>

    ${proxima ? `
      <div class="card" style="margin-bottom:18px;border-color:var(--gold);box-shadow:0 0 24px rgba(212,168,67,0.08)">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span class="chip chip-gold">PRÓXIMA ESCALA</span></div>
        <div style="font-size:18px;font-weight:700;margin-bottom:4px">${proxEvento?.nome||'Evento'}</div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:12px">${fmt.dataLong(dataReal)} ${ehDepois?'<span style="color:var(--gold)">(dia seguinte à gira)</span>':`· ${proxEvento?.hora||'—'}`}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <span class="chip chip-gold">Função: ${nomeFuncao}</span>
          <span class="chip">${proxEvento?.local||'Terreiro'}</span>
        </div>
      </div>
    ` : ''}

    <div class="grid grid-2">
      <div class="card">
        <div class="card-h"><div class="card-title">Avisos recentes</div></div>
        ${avisosAtivos.length===0 ? '<div class="empty"><div class="empty-s">Nenhum aviso</div></div>' : avisosAtivos.map(a=>`
          <div class="list-item">
            ${a.importante?'<div class="chip chip-red">!</div>':''}
            <div class="li-main">
              <div class="li-name">${a.titulo}</div>
              <div class="li-meta">${fmt.rel(a.publicadoEm)}</div>
            </div>
          </div>
        `).join('')}
      </div>
      <div class="card">
        <div class="card-h"><div class="card-title">Minhas tarefas</div></div>
        ${meusCards.length===0 ? '<div class="empty"><div class="empty-s">Nenhuma tarefa atribuída</div></div>' : meusCards.map(k=>`
          <div class="list-item">
            <div class="chip chip-${k.status==='blocked'?'amber':(k.status==='doing'?'blue':'')}">${k.status==='todo'?'a fazer':(k.status==='doing'?'em andamento':'bloqueado')}</div>
            <div class="li-main">
              <div class="li-name">${k.titulo}</div>
              ${k.prazo?`<div class="li-meta">Prazo: ${fmt.data(k.prazo)}</div>`:''}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function renderMinhasEscalas(c) {
  const f = S.filhoDoc;
  const hoje = new Date().toISOString().slice(0,10);
  const minhas = S.escalas.filter(es => (es.alocacoes||[]).some(a => a.filho_id === f.id));
  const futuras = minhas.filter(es => es.data >= hoje).sort((a,b)=>a.data.localeCompare(b.data));
  const passadas = minhas.filter(es => es.data < hoje).sort((a,b)=>b.data.localeCompare(a.data));

  const card = (es) => {
    const ev = S.eventos.find(e=>e.id===es.evento_id);
    const aloc = es.alocacoes.find(a=>a.filho_id===f.id);
    const fn = S.funcoes.find(fn=>fn.id===aloc?.funcao_id);
    const dataReal = dataEfetivaAloc(es, aloc);
    const ehDepois = dataReal !== es.data;
    return `
      <div class="list-item">
        <div class="li-avatar" style="background:var(--gold-bg);color:var(--gold)">${(dataReal||'').slice(8,10)}</div>
        <div class="li-main">
          <div class="li-name">${ev?.nome||'Evento'} — <span style="color:var(--gold)">${fn?.nome||'—'}</span></div>
          <div class="li-meta">
            <span>${fmt.dataLong(dataReal)} ${ehDepois?'<span style="color:var(--text3)">(dia seguinte à gira)</span>':`· ${ev?.hora||'—'}`}</span>
            <span class="chip">${aloc?.status||'escalado'}</span>
          </div>
        </div>
      </div>
    `;
  };

  c.innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">Minhas escalas</div>
        <div class="page-sub">${futuras.length} futura${futuras.length===1?'':'s'} · ${passadas.length} passada${passadas.length===1?'':'s'}</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:14px">
      <div class="card-h"><div class="card-title">Próximas</div></div>
      ${futuras.length===0?'<div class="empty"><div class="empty-s">Sem escalas futuras</div></div>':futuras.map(card).join('')}
    </div>

    ${passadas.length?`
      <div class="card">
        <div class="card-h"><div class="card-title">Histórico</div></div>
        ${passadas.slice(0,20).map(card).join('')}
      </div>
    `:''}
  `;
}

function renderDisponibilidade(c) {
  const f = S.filhoDoc;
  // Mes atual + próximo
  const now = new Date();
  const meses = [
    now.toISOString().slice(0,7),
    new Date(now.getFullYear(), now.getMonth()+1, 1).toISOString().slice(0,7)
  ];

  c.innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">Minha disponibilidade</div>
        <div class="page-sub">Marque os dias que <strong>NÃO</strong> pode comparecer. Vazio = totalmente disponível.</div>
      </div>
    </div>
    ${meses.map(m => `<div class="card" style="margin-bottom:18px" id="disp-${m}"></div>`).join('')}
  `;

  meses.forEach(m => renderDispMes(m));
}

async function renderDispMes(m) {
  const f = S.filhoDoc;
  const docId = `${f.id}_${m}`;
  const disp = S.disponibilidade.find(d => d.id === docId) || { datas_indisponivel:[], funcoes_indisponivel:[] };
  const [ano, mes] = m.split('-').map(Number);
  const first = new Date(ano, mes-1, 1);
  const last = new Date(ano, mes, 0);
  const firstDow = first.getDay();
  const daysInMonth = last.getDate();
  const nomeMes = first.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});

  let cells = '';
  for(let i=0; i<firstDow; i++) cells += `<div class="disp-day out"></div>`;
  for(let d=1; d<=daysInMonth; d++) {
    const dStr = `${ano}-${String(mes).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const indisp = disp.datas_indisponivel?.includes(dStr);
    cells += `<div class="disp-day ${indisp?'indisp':''}" data-d="${dStr}" data-m="${m}">${d}</div>`;
  }

  const funcoesAtivas = S.funcoes.filter(f=>!f.arquivada);
  const card = $(`#disp-${m}`);
  card.innerHTML = `
    <div class="card-h"><div class="card-title" style="text-transform:capitalize">${nomeMes}</div></div>
    <div class="disp-cal" style="margin-bottom:14px">
      ${['D','S','T','Q','Q','S','S'].map(d=>`<div style="text-align:center;font-size:11px;color:var(--text3);padding:4px">${d}</div>`).join('')}
      ${cells}
    </div>
    <div class="fi-group">
      <label>Funções que NÃO posso fazer esse mês</label>
      <div class="chips" id="disp-funcs-${m}">
        ${funcoesAtivas.map(fn => {
          const sel = (disp.funcoes_indisponivel||[]).includes(fn.id);
          return `<button type="button" class="chip ${sel?'chip-red':''}" data-fid="${fn.id}" data-sel="${sel}" onclick="this.dataset.sel = this.dataset.sel==='true'?'false':'true'; this.classList.toggle('chip-red')">${fn.nome}</button>`;
        }).join('')}
      </div>
    </div>
    <div class="fi-group">
      <label>Observação opcional</label>
      <input class="fi" id="disp-obs-${m}" value="${disp.obs||''}" placeholder="Ex: estou de luto / vou viajar dia X"/>
    </div>
    <div style="display:flex;justify-content:flex-end"><button class="btn btn-primary" onclick="window._app.salvarDisp('${m}')">Salvar disponibilidade</button></div>
  `;

  card.querySelectorAll('.disp-day:not(.out)').forEach(el => {
    el.onclick = () => el.classList.toggle('indisp');
  });
}

async function salvarDisp(m) {
  const f = S.filhoDoc;
  const docId = `${f.id}_${m}`;
  const datas = $$(`#disp-${m} .disp-day.indisp[data-d]`).map(el => el.dataset.d);
  const funcs = $$(`#disp-funcs-${m} [data-sel="true"]`).map(el => el.dataset.fid);
  const obs = $(`#disp-obs-${m}`).value.trim();
  try {
    await setDoc(doc(dbPvd,'adm_disponibilidade',docId), {
      filho_id: f.id,
      mes: m,
      datas_indisponivel: datas,
      funcoes_indisponivel: funcs,
      obs,
      atualizadoEm: serverTimestamp()
    }, { merge:true });
    toast('Disponibilidade salva','ok');
  } catch(e) { toast('Erro: '+e.message,'err'); }
}
