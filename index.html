function openAvisoForm(id=null) {
  const a = id ? S.avisos.find(x=>x.id===id) : null;
  const isEdit = !!a;
  openModal(`
    <div class="modal-h"><h3>${isEdit?'Editar aviso':'Novo aviso'}</h3><button class="btn-close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="modal-c">
      <div class="fi-group"><label>Título *</label><input class="fi" id="av-titulo" value="${a?.titulo||''}"/></div>
      <div class="fi-group"><label>Corpo *</label><textarea class="fi" id="av-corpo" style="min-height:160px">${a?.corpo||''}</textarea></div>
      <label class="checkbox-row"><input type="checkbox" id="av-imp" ${a?.importante?'checked':''}/> Marcar como importante</label>
    </div>
    <div class="modal-f">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="av-save">${isEdit?'Salvar':'Publicar'}</button>
    </div>
  `, { lg: true });

  $('#av-save').onclick = async () => {
    const titulo = $('#av-titulo').value.trim();
    const corpo = $('#av-corpo').value.trim();
    if(!titulo || !corpo) { toast('Preencha título e corpo','err'); return; }
    const data = {
      titulo, corpo,
      importante: $('#av-imp').checked,
      arquivado: false,
      publicadoPor: S.user.uid
    };
    try {
      if(isEdit) await updateDoc(doc(dbPvd,'adm_avisos',id), { ...data, atualizadoEm: serverTimestamp() });
      else await addDoc(collection(dbPvd,'adm_avisos'), { ...data, publicadoEm: serverTimestamp(), criadoEm: serverTimestamp() });
      toast(isEdit?'Aviso atualizado':'Aviso publicado','ok');
      closeModal();
    } catch(e) { toast('Erro: '+e.message,'err'); }
  };
}

async function arquivarAviso(id) {
  confirmar('Arquivar este aviso?', async () => {
    try { await updateDoc(doc(dbPvd,'adm_avisos',id), { arquivado:true, atualizadoEm: serverTimestamp() }); toast('Aviso arquivado','ok'); }
    catch(e) { toast('Erro: '+e.message,'err'); }
  });
}

// ── AGENDA DO PAI ─────────────────────────────────────────────────────────
let agendaFiltro = 'semana'; // 'hoje' | 'semana' | 'mes' | 'todos'

function renderAgenda(c) {
  const hoje = new Date().toISOString().slice(0,10);
  const fimSemana = new Date(); fimSemana.setDate(fimSemana.getDate()+7);
  const fimSemanaStr = fimSemana.toISOString().slice(0,10);
  const fimMes = new Date(); fimMes.setDate(fimMes.getDate()+30);
  const fimMesStr = fimMes.toISOString().slice(0,10);

  let lista = [...S.atendimentos].sort((a,b) => (a.data+a.hora).localeCompare(b.data+b.hora));
  if(agendaFiltro === 'hoje') lista = lista.filter(a => a.data === hoje);
  else if(agendaFiltro === 'semana') lista = lista.filter(a => a.data >= hoje && a.data <= fimSemanaStr);
  else if(agendaFiltro === 'mes') lista = lista.filter(a => a.data >= hoje && a.data <= fimMesStr);

  // KPIs do mês
  const mesAtual = hoje.slice(0,7);
  const atendsMes = S.atendimentos.filter(a => a.data && a.data.startsWith(mesAtual));
  const realizadosMes = atendsMes.filter(a => a.status_atendimento === 'realizado');
  const receitaMes = realizadosMes.filter(a => a.status_pagamento && a.status_pagamento.startsWith('pago')).reduce((s,a)=>s+(a.valor||0),0);
  const pendentes = atendsMes.filter(a => a.status_pagamento === 'pendente' && a.status_atendimento === 'realizado').reduce((s,a)=>s+(a.valor||0),0);

  const gcalOn = gcalIsConnected();
  const gcalEm = gcalEmail();

  c.innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">Agenda do Pai</div>
        <div class="page-sub">${atendsMes.length} atendimento${atendsMes.length===1?'':'s'} esse mês · ${realizadosMes.length} realizado${realizadosMes.length===1?'':'s'}</div>
      </div>
      <div class="page-actions">
        ${gcalOn
          ? `<button class="btn" onclick="window._app.gcalDisconnect()" title="${gcalEm||''}">✓ Google Calendar conectado${gcalEm?` (${gcalEm.split('@')[0]})`:''}</button>`
          : `<button class="btn" onclick="window._app.gcalConnect()">🔗 Conectar Google Calendar</button>`}
        <button class="btn btn-primary" onclick="window._app.openAtendimentoForm()">+ Novo atendimento</button>
      </div>
    </div>

    ${gcalOn ? `
      <div style="padding:10px 14px;background:var(--green-bg);border:1px solid var(--green-bd);border-radius:8px;margin-bottom:14px;font-size:13px;color:var(--green);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
        <span>🟢 Sync ativo · Calendar de <strong>${gcalEm||'(conta google)'}</strong></span>
        <button class="btn btn-sm" onclick="window._app.buscarGcalEventos()">🔄 Buscar eventos do Calendar</button>
      </div>
    ` : `
      <div style="padding:10px 14px;background:var(--amber-bg);border:1px solid rgba(243,156,18,0.3);border-radius:8px;margin-bottom:14px;font-size:13px;color:var(--amber)">
        ⚠️ Sem sync · atendimentos ficam só aqui no admin. Clica "Conectar Google Calendar" pra sincronizar com o calendar do terreiro.
      </div>
    `}
    <div id="gcal-events-section"></div>

    <div class="grid grid-4" style="margin-bottom:18px">
      <div class="metric" style="--clr:var(--green)"><div class="ml">Receita do mês</div><div class="mv">R$ ${receitaMes.toFixed(0)}</div><div class="mh">de ${realizadosMes.length} jogo${realizadosMes.length===1?'':'s'}</div></div>
      <div class="metric" style="--clr:var(--amber)"><div class="ml">Pendente receber</div><div class="mv">R$ ${pendentes.toFixed(0)}</div></div>
      <div class="metric" style="--clr:var(--blue)"><div class="ml">Esta semana</div><div class="mv">${S.atendimentos.filter(a => a.data >= hoje && a.data <= fimSemanaStr).length}</div></div>
      <div class="metric" style="--clr:var(--gold)"><div class="ml">Consulentes únicos</div><div class="mv">${S.consulentes.filter(c=>!c.arquivado).length}</div></div>
    </div>

    <div class="tabs">
      <button class="${agendaFiltro==='hoje'?'active':''}" onclick="window._app.setAgendaFiltro('hoje')">Hoje</button>
      <button class="${agendaFiltro==='semana'?'active':''}" onclick="window._app.setAgendaFiltro('semana')">7 dias</button>
      <button class="${agendaFiltro==='mes'?'active':''}" onclick="window._app.setAgendaFiltro('mes')">30 dias</button>
      <button class="${agendaFiltro==='todos'?'active':''}" onclick="window._app.setAgendaFiltro('todos')">Todos</button>
    </div>

    <div>
      ${lista.length === 0 ? '<div class="empty"><div class="empty-t">Nenhum atendimento</div><div class="empty-s">Clique em "Novo atendimento" pra agendar.</div></div>' : lista.map(a => {
        const isHoje = a.data === hoje;
        const isPassado = a.data < hoje;
        const isBuzios = a.tipo_oraculo === 'buzios';
        const statusPag = a.status_pagamento || 'pendente';
        const corPag = statusPag.startsWith('pago') ? 'chip-green' : (statusPag === 'isento' ? 'chip' : 'chip-amber');
        const labelPag = statusPag === 'pendente' ? 'pendente' : (statusPag === 'isento' ? 'isento' : statusPag.replace('pago_','pago '));
        const corAtend = a.status_atendimento === 'realizado' ? 'chip-green' : (a.status_atendimento === 'cancelado' || a.status_atendimento === 'nao_compareceu' ? 'chip' : 'chip-blue');
        return `
          <div class="list-item" onclick="window._app.openAtendimentoForm('${a.id}')" style="cursor:pointer;${isHoje?'border-color:var(--gold-bg)':''}">
            <div class="li-avatar" style="background:${isBuzios?'rgba(155,89,182,0.15)':'var(--gold-bg)'};color:${isBuzios?'var(--purple)':'var(--gold)'};flex-direction:column;font-size:11px;line-height:1.2">
              <div style="font-weight:700;font-size:14px">${(a.data||'').slice(8,10)}</div>
              <div style="font-size:9px;text-transform:uppercase">${new Date((a.data||'')+'T00:00:00').toLocaleDateString('pt-BR',{month:'short'}).replace('.','')}</div>
            </div>
            <div class="li-main">
              <div class="li-name">${a.consulente_nome||'—'} ${isBuzios?'<span class="chip chip-purple" style="font-size:10px">búzios · privado</span>':'<span class="chip chip-gold" style="font-size:10px">baralho cigano</span>'}</div>
              <div class="li-meta">
                <span>${a.hora||'—'}${a.duracao_min?` · ${a.duracao_min}min`:''}</span>
                <span>R$ ${a.valor||0}</span>
                <span class="chip ${corPag}">${labelPag}</span>
                <span class="chip ${corAtend}">${a.status_atendimento||'agendado'}</span>
                ${isHoje?'<span class="chip chip-gold">HOJE</span>':''}
                ${isPassado && a.status_atendimento === 'agendado'?'<span class="chip chip-amber">atrasado</span>':''}
              </div>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function setAgendaFiltro(f) { agendaFiltro = f; renderRoute(); }

async function buscarGcalEventos() {
  const sec = $('#gcal-events-section');
  if(!sec) return;
  sec.innerHTML = `<div class="card" style="margin-bottom:14px;text-align:center;color:var(--text3);padding:24px"><div class="spinner" style="width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px"></div>Buscando do Google Calendar...</div>`;
  const events = await gcalListEvents(30);
  renderGcalEventos(events);
}

function renderGcalEventos(events) {
  const sec = $('#gcal-events-section');
  if(!sec) return;
  if(!events || events.length === 0) {
    sec.innerHTML = `<div class="card" style="margin-bottom:14px;text-align:center;color:var(--text3);padding:20px;font-size:13px">Nenhum evento no Calendar nos próximos 30 dias.</div>`;
    return;
  }

  // Match com atendimentos existentes (mesmo google_event_id)
  const atendByGcalId = {};
  S.atendimentos.forEach(a => { if(a.google_event_id) atendByGcalId[a.google_event_id] = a; });

  sec.innerHTML = `
    <div class="card" style="margin-bottom:14px">
      <div class="card-h">
        <div class="card-title">📅 Google Calendar do Pai (próximos 30 dias)</div>
        <div style="font-size:12px;color:var(--text3)">${events.length} evento${events.length===1?'':'s'} · cache local</div>
      </div>
      ${events.map(ev => {
        const isAllDay = !!ev.start?.date;
        const startStr = ev.start?.dateTime || ev.start?.date;
        const endStr = ev.end?.dateTime || ev.end?.date;
        const start = new Date(startStr);
        const end = endStr ? new Date(endStr) : null;
        const dataBr = start.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
        const diaSem = start.toLocaleDateString('pt-BR',{weekday:'short'}).replace('.','');
        const horaStr = isAllDay ? 'dia todo' : `${start.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}${end?` – ${end.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}`:''}`;
        const atendVinculado = atendByGcalId[ev.id];
        const nome = (ev.summary || '(sem título)').slice(0,80);
        const desc = (ev.description || '').replace(/\n/g,' · ').slice(0,120);
        const localStr = ev.location || '';
        const status = ev.status === 'cancelled' ? 'cancelado' : null;
        return `
          <div class="list-item" ${atendVinculado?`onclick="window._app.openAtendimentoForm('${atendVinculado.id}')" style="cursor:pointer"`:''}>
            <div class="li-avatar" style="background:${atendVinculado?'var(--green-bg)':'var(--blue-bg)'};color:${atendVinculado?'var(--green)':'var(--blue)'};flex-direction:column;font-size:10px;line-height:1.1">
              <div style="font-weight:700;font-size:13px">${start.getDate()}</div>
              <div style="font-size:8px;text-transform:uppercase">${start.toLocaleDateString('pt-BR',{month:'short'}).replace('.','')}</div>
            </div>
            <div class="li-main">
              <div class="li-name">${nome}${atendVinculado?' <span class="chip chip-green" style="font-size:10px;margin-left:6px">vinculado ao admin</span>':''}${status?' <span class="chip" style="font-size:10px">cancelado</span>':''}</div>
              <div class="li-meta">
                <span style="text-transform:capitalize">${diaSem}, ${dataBr}</span>
                <span>${horaStr}</span>
                ${localStr?`<span>📍 ${localStr}</span>`:''}
              </div>
              ${desc?`<div style="font-size:12px;color:var(--text3);margin-top:4px">${desc}${ev.description && ev.description.length>120?'…':''}</div>`:''}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

            <option value="pendente" ${(!a||a?.status_pagamento==='pendente')?'selected':''}>Pendente</option>
            <option value="pago_pix" ${a?.status_pagamento==='pago_pix'?'selected':''}>Pago via PIX</option>
            <option value="pago_dinheiro" ${a?.status_pagamento==='pago_dinheiro'?'selected':''}>Pago em dinheiro</option>
            <option value="pago_cartao" ${a?.status_pagamento==='pago_cartao'?'selected':''}>Pago no cartão</option>
            <option value="isento" ${a?.status_pagamento==='isento'?'selected':''}>Isento</option>
          </select>

      <div class="row-2">
        <div class="fi-group"><label>Status do atendimento</label>

            <option value="realizado" ${a?.status_atendimento==='realizado'?'selected':''}>Realizado</option>
            <option value="nao_compareceu" ${a?.status_atendimento==='nao_compareceu'?'selected':''}>Não compareceu</option>

          <select class="fi" id="at-tema">
            <option value="" ${!a?.tema?'selected':''}>— Não informado —</option>
            <option value="amor" ${a?.tema==='amor'?'selected':''}>💕 Amor / relacionamento</option>
            <option value="saude" ${a?.tema==='saude'?'selected':''}>🌿 Saúde</option>
            <option value="familia" ${a?.tema==='familia'?'selected':''}>👨‍👩‍👧 Família</option>
            <option value="financeiro" ${a?.tema==='financeiro'?'selected':''}>💰 Financeiro / trabalho</option>
            <option value="luto" ${a?.tema==='luto'?'selected':''}>🕯️ Luto</option>
            <option value="orientacao" ${a?.tema==='orientacao'?'selected':''}>🧭 Orientação espiritual</option>
            <option value="outro" ${a?.tema==='outro'?'selected':''}>Outro</option>
          </select>
        </div>
      </div>
      <div class="fi-group"><label>Observação (privada, só você e o Pai veem)</label><textarea class="fi" id="at-obs">${a?.observacao||''}</textarea></div>
    </div>
    <div class="modal-f">
      ${isEdit?'<button class="btn btn-danger" id="at-del">Excluir</button>':''}
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="at-save">${isEdit?'Salvar':'Agendar'}</button>
    </div>
  `, { lg: true });

  $('#at-save').onclick = async () => {
    const consId = $('#at-cons').value;
    if(!consId) { toast('Selecione um consulente','err'); return; }
    const cons = S.consulentes.find(x=>x.id===consId);
    if(!cons) { toast('Consulente não encontrado','err'); return; }
    const data = $('#at-data').value;
    const hora = $('#at-hora').value;
    if(!data || !hora) { toast('Informe data e hora','err'); return; }
    const tipo = $('#at-tipo').value;
    const valor = parseFloat($('#at-valor').value) || 0;
    const stPag = $('#at-pag').value;
    const stAt = $('#at-st').value;

    const payload = {
      consulente_id: consId,
      consulente_nome: cons.nome,
      consulente_tel: cons.tel || '',
      data, hora,
      duracao_min: parseInt($('#at-dur').value) || 60,
      tipo_oraculo: tipo,
      publico: tipo !== 'buzios',
      valor,
      status_pagamento: stPag,
      pago_em: stPag.startsWith('pago') && (!a || !a.status_pagamento || !a.status_pagamento.startsWith('pago')) ? serverTimestamp() : (a?.pago_em||null),
      status_atendimento: stAt,
      tema: $('#at-tema').value || null,
      observacao: $('#at-obs').value.trim(),
      atualizadoEm: serverTimestamp()
    };
    try {
      let docId = id;
      if(isEdit) {
        await updateDoc(doc(dbPvd,'adm_atendimentos',id), payload);
      } else {
        payload.criadoEm = serverTimestamp();
        const ref = await addDoc(collection(dbPvd,'adm_atendimentos'), payload);
        docId = ref.id;
      }
      // Sync slot público (sem PII) — cancelado vira delete, resto vira upsert
      if(stAt === 'cancelado') {
        await delSlotPub('atend_'+docId);
      } else {
        await syncSlotPub('atend_'+docId, payload.data, payload.hora, payload.duracao_min, 'atendimento');
      }
      // se foi marcado como realizado, atualiza consulente (ultima_vez, qtd)
      if(stAt === 'realizado' && (!a || a.status_atendimento !== 'realizado')) {
        const novosAtends = (cons.qtd_atendimentos||0) + 1;
        await updateDoc(doc(dbPvd,'adm_consulentes',consId), {
          ultima_vez: serverTimestamp(),
          qtd_atendimentos: novosAtends,
          atualizadoEm: serverTimestamp()
        });
      }

      // Sync com Google Calendar (se conectado e não cancelado)
      if(gcalIsConnected() && stAt !== 'cancelado') {
        const atendFull = { ...payload, ...(a||{}) };
        if(a?.google_event_id) {
          await gcalUpdateEvent(a.google_event_id, atendFull);
        } else {
          const gevId = await gcalCreateEvent(atendFull);
          if(gevId) await updateDoc(doc(dbPvd,'adm_atendimentos',docId), { google_event_id: gevId });
        }
      } else if(gcalIsConnected() && stAt === 'cancelado' && a?.google_event_id) {
        await gcalDeleteEvent(a.google_event_id);
        await updateDoc(doc(dbPvd,'adm_atendimentos',docId), { google_event_id: null });
      }

      toast(isEdit?'Atendimento atualizado':'Atendimento agendado','ok');
      closeModal();
    } catch(e) { toast('Erro: '+e.message,'err'); }
  };

  if(isEdit) $('#at-del').onclick = () => {
    confirmar('Excluir este atendimento?', async () => {
      try {
        if(gcalIsConnected() && a?.google_event_id) await gcalDeleteEvent(a.google_event_id);
        await deleteDoc(doc(dbPvd,'adm_atendimentos',id));
        await delSlotPub('atend_'+id);
        toast('Atendimento excluído','ok');
      }
      catch(e) { toast('Erro: '+e.message,'err'); }
    });
  };
}

let filtroConsulentes = { busca:'', arquivados:false };

    if(filtroConsulentes.busca) {

  }).sort((a,b) => (b.ultima_vez?.seconds||0) - (a.ultima_vez?.seconds||0));

  c.innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">Consulentes</div>

      <div class="row-2">

          <input class="fi" id="cn-busca" placeholder="Nome ou telefone..." value="${filtroConsulentes.busca}"/>
        </div>
        <div class="fi-group" style="margin:0">
          <label>Mostrar</label>
          <select class="fi" id="cn-arq">
            <option value="false" ${!filtroConsulentes.arquivados?'selected':''}>Ativos</option>
            <option value="true" ${filtroConsulentes.arquivados?'selected':''}>Arquivados</option>
          </select>
        </div>
      </div>
    </div>

    <div>
      ${lista.length === 0 ? '<div class="empty"><div class="empty-t">Nenhum consulente</div></div>' : lista.map(x => `
        <div class="list-item" onclick="window._app.openConsulenteForm('${x.id}')" style="cursor:pointer">
          <div class="li-avatar">${fmt.initials(x.nome)}</div>
          <div class="li-main">
            <div class="li-name">${x.nome}</div>

              ${x.tel ? `<span>📱 ${x.tel}</span>` : ''}

              ${x.ultima_vez ? `<span>último: ${fmt.rel(x.ultima_vez)}</span>` : '<span class="chip chip-blue">nunca atendido</span>'}
              ${x.origem ? `<span class="chip">${x.origem}</span>` : ''}
            </div>
          </div>

      `).join('')}
    </div>

  $('#cn-busca').oninput = e => { filtroConsulentes.busca = e.target.value; renderConsulentes(c); };
  $('#cn-arq').onchange = e => { filtroConsulentes.arquivados = e.target.value === 'true'; renderConsulentes(c); };

// ── CONTROLE DE DISPONIBILIDADE (quem já marcou) ──────────────────────────
function renderControleDisp(c) {
  const now = new Date();
  const meses = [
    now.toISOString().slice(0,7),
    new Date(now.getFullYear(), now.getMonth()+1, 1).toISOString().slice(0,7)
  ];
  const labelMes = m => {
    const [a,mm] = m.split('-').map(Number);
    return new Date(a, mm-1, 1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  };

  const filhosAtivos = S.filhos.filter(f => !f.status || f.status === 'ativo');
  const filhosOrd = [...filhosAtivos].sort((a,b) => a.nome.localeCompare(b.nome));

  const linkPublico = window.location.origin + window.location.pathname.replace(/index\.html$/,'').replace(/\/$/,'') + '/area-filho.html';

  const linhaFilho = (f, m) => {
    const docId = `${f.id}_${m}`;
    const disp = S.disponibilidade.find(d => d.id === docId);
    const marcou = !!disp;
    const totalDias = disp?.datas_indisponivel?.length || 0;
    const totalFuncs = disp?.funcoes_indisponivel?.length || 0;
    const atualizadoEm = disp?.atualizadoEm ? fmt.rel(disp.atualizadoEm) : null;
    const msg = encodeURIComponent(`Olá ${f.nome.split(' ')[0]}! Lembra de marcar sua disponibilidade pra ${labelMes(m)}? É só entrar no link e escolher o seu nome:\n\n${linkPublico}\n\nObrigado! 🙏`);
    const wppLink = f.tel ? `https://wa.me/55${f.tel}?text=${msg}` : null;

    return `
      <div class="list-item">
        <div class="li-avatar" style="background:${marcou?'var(--green-bg)':'var(--glass2)'};color:${marcou?'var(--green)':'var(--text3)'}">
          ${marcou ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="width:18px;height:18px"><polyline points="20 6 9 17 4 12"/></svg>' : fmt.initials(f.nome)}
        </div>
        <div class="li-main">
          <div class="li-name">${f.nome}</div>
          <div class="li-meta">
            ${marcou ? `
              <span class="chip chip-green">marcou</span>
              <span>${totalDias} dia${totalDias===1?'':'s'} indisponível</span>
              ${totalFuncs?`<span>${totalFuncs} função(ões) recusada(s)</span>`:''}
              ${atualizadoEm?`<span style="color:var(--text3)">atualizou ${atualizadoEm}</span>`:''}
              ${disp?.obs?`<span style="font-style:italic">"${disp.obs}"</span>`:''}
            ` : `
              <span class="chip">não marcou</span>
              ${f.tel?'':'<span style="color:var(--amber)">sem telefone cadastrado</span>'}
            `}
          </div>
        </div>
        <div class="li-actions">
          ${wppLink ? `<a class="btn btn-sm" href="${wppLink}" target="_blank" title="Lembrar via WhatsApp">
            <svg viewBox="0 0 24 24" fill="currentColor" style="width:13px;height:13px;color:#25d366"><path d="M17.6 6.32A8 8 0 005.74 17l-1.07 4.04 4.13-1.08A8 8 0 1017.6 6.32zM12 19.67c-1.36 0-2.69-.37-3.84-1.06l-.28-.16-2.86.75.76-2.79-.18-.29A6.66 6.66 0 0118.66 12 6.67 6.67 0 0112 19.67z"/></svg>
            Lembrar
          </a>` : ''}
        </div>
      </div>
    `;
  };

  const cardMes = m => {
    const docsM = filhosOrd.map(f => ({ f, marcou: S.disponibilidade.some(d => d.id === `${f.id}_${m}`) }));
    const marcaram = docsM.filter(x => x.marcou).length;
    const pct = filhosOrd.length ? Math.round((marcaram/filhosOrd.length)*100) : 0;
    const semTel = filhosOrd.filter(f => !f.tel).length;

    return `
      <div class="card" style="margin-bottom:14px">
        <div class="card-h">
          <div class="card-title" style="text-transform:capitalize">${labelMes(m)}</div>
          <div style="font-size:13px;color:var(--text3)">
            <strong style="color:${pct>=70?'var(--green)':(pct>=40?'var(--amber)':'var(--red)')}">${marcaram}/${filhosOrd.length}</strong> marcaram · ${pct}%
          </div>

// ── REGA (rodízio voluntário diário) ──────────────────────────────────────
function renderRega(c) {
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const hojeStr = hoje.toISOString().slice(0,10);
  const linkPublico = window.location.origin + window.location.pathname.replace(/index\.html$/,'').replace(/\/$/,'') + '/area-filho.html';

  // Map: data → reserva
  const porDia = {};
  S.regas.forEach(r => { porDia[r.data] = r; });

  // Mês atual e próximo
  const mes1 = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
  const mes2 = new Date(hoje.getFullYear(), hoje.getMonth()+1, 1);

  // Cobertura por mês: quantos dias do mês a partir de hoje estão cobertos
  function coberturaMes(mesDate) {
    const ano = mesDate.getFullYear(), mes = mesDate.getMonth();
    const last = new Date(ano, mes+1, 0);
    const inicio = mesDate.toISOString().slice(0,10) < hojeStr ? hojeStr : mesDate.toISOString().slice(0,10);
    let total = 0, cobertos = 0;
    for(let d = 1; d <= last.getDate(); d++) {
      const dStr = `${ano}-${pad(mes+1)}-${pad(d)}`;
      if(dStr < inicio) continue;
      total++;
      if(porDia[dStr]) cobertos++;
    }
    return { total, cobertos };
  }

  function pad(n) { return String(n).padStart(2,'0'); }

  function renderMesCal(mesDate) {
    const ano = mesDate.getFullYear(), mes = mesDate.getMonth();
    const first = new Date(ano, mes, 1);
    const last = new Date(ano, mes+1, 0);
    const firstDow = first.getDay();
    const daysInMonth = last.getDate();
    const nomeMes = first.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
    const { total, cobertos } = coberturaMes(mesDate);
    const pct = total ? Math.round((cobertos/total)*100) : 0;

    let cells = '';
    for(let i=0; i<firstDow; i++) cells += `<div></div>`;
    for(let d=1; d<=daysInMonth; d++) {
      const dStr = `${ano}-${pad(mes+1)}-${pad(d)}`;
      const passado = dStr < hojeStr;
      const reserva = porDia[dStr];
      const confirmado = reserva?.realizado;
      const ehHoje = dStr === hojeStr;
      // Verde forte = confirmado, verde claro = reservado, âmbar = sem cobertura
      let bg, bd, col;
      if(confirmado) { bg='rgba(46,204,113,0.22)'; bd='var(--green)'; col='var(--green)'; }
      else if(reserva) { bg='var(--green-bg)'; bd='var(--green-bd)'; col='var(--green)'; }
      else { bg = passado ? 'transparent' : 'rgba(243,156,18,0.08)'; bd = 'var(--border)'; col = passado ? 'var(--text3)' : 'var(--amber)'; }
      if(ehHoje) bd = 'var(--red)';
      const nome = reserva ? (reserva.realizado_por_nome||reserva.filho_nome||'').split(' ')[0] : '';
      const tip = confirmado ? `✓ ${reserva.realizado_por_nome||reserva.filho_nome} confirmou` : (reserva ? `Reservado por ${reserva.filho_nome}` : (passado?'':'Sem cobertura'));
      cells += `
        <div style="aspect-ratio:1;background:${bg};border:1px solid ${bd};border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:14px;color:${col};opacity:${passado&&!confirmado?'.3':'1'};padding:4px;position:relative" title="${tip}">
          ${confirmado ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="width:9px;height:9px;position:absolute;top:3px;right:3px"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
          <div style="font-weight:700">${d}</div>
          ${nome ? `<div style="font-size:9px;font-weight:600;line-height:1;margin-top:2px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:48px">${nome}</div>` : ''}
        </div>
      `;
    }

    return `
      <div class="card" style="margin-bottom:14px">
        <div class="card-h">
          <div class="card-title" style="text-transform:capitalize">${nomeMes}</div>
          <div style="font-size:13px;color:var(--text3)"><strong style="color:${pct>=70?'var(--green)':(pct>=40?'var(--amber)':'var(--red)')}">${cobertos}/${total}</strong> dias cobertos · ${pct}%</div>
        </div>
        <div style="background:var(--glass2);border-radius:6px;height:6px;overflow:hidden;margin-bottom:12px">
          <div style="width:${pct}%;height:100%;background:linear-gradient(90deg,var(--green),var(--gold))"></div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px">
          ${['D','S','T','Q','Q','S','S'].map(d=>`<div style="text-align:center;font-size:10px;color:var(--text3);font-weight:600;padding:4px">${d}</div>`).join('')}
          ${cells}
        </div>
      </div>
    `;
  }

  const reservaHoje = porDia[hojeStr];
  const semCobertura = [];
  for(let i = 0; i < 14; i++) {
    const d = new Date(hoje); d.setDate(hoje.getDate()+i);
    const dStr = d.toISOString().slice(0,10);
    if(!porDia[dStr]) semCobertura.push(dStr);
  }

  c.innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">Rega</div>
        <div class="page-sub">1 pessoa por dia · filhos reservam pela página pública</div>
      </div>
      <div class="page-actions">
        <a class="btn" href="area-filho.html" target="_blank">↗ Página pública</a>
      </div>
    </div>

    <div class="card" style="margin-bottom:14px;border-color:${reservaHoje?(reservaHoje.realizado?'var(--green)':'var(--green-bd)'):'var(--amber-bg)'}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <span class="chip ${reservaHoje?(reservaHoje.realizado?'chip-green':'chip-green'):'chip-amber'}">HOJE · ${new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'})}</span>
        ${reservaHoje?.realizado ? '<span class="chip chip-green">✓ CONFIRMADO</span>' : (reservaHoje?'<span class="chip chip-amber">PENDENTE DE CONFIRMAÇÃO</span>':'')}
      </div>
      ${reservaHoje && reservaHoje.realizado ? `
        <div style="font-size:18px;font-weight:700;color:var(--green)">${reservaHoje.realizado_por_nome || reservaHoje.filho_nome} regou hoje 🌱</div>
        <div style="font-size:12px;color:var(--text3);margin-top:4px">Confirmado pelo QR code ${reservaHoje.realizadoEm ? '· ' + fmt.rel(reservaHoje.realizadoEm) : ''}</div>
      ` : reservaHoje ? `
        <div style="font-size:18px;font-weight:700;color:var(--green)">${reservaHoje.filho_nome}</div>
        <div style="font-size:13px;color:var(--text2);margin-top:4px">Reservou — ainda não confirmou que regou (esperando QR no terreiro)</div>
      ` : `
        <div style="font-size:15px;color:var(--amber);font-weight:600">Sem cobertura pra hoje 😬</div>
        <div style="font-size:13px;color:var(--text2);margin-top:6px">Nenhum filho assumiu este dia. Manda a página pra galera ou peça no grupo.</div>
        <button class="btn btn-primary" style="margin-top:10px" onclick="navigator.clipboard.writeText('Salve! Faltam dias na escala de rega da casa: ${linkPublico}').then(()=>window._app.toast('Mensagem copiada','ok'))">Copiar mensagem pro grupo</button>
      `}
    </div>

    <details class="card" style="margin-bottom:14px;padding:0">
      <summary style="padding:16px 22px;cursor:pointer;list-style:none;display:flex;align-items:center;gap:10px;user-select:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;color:var(--gold);flex-shrink:0"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h7v7"/></svg>
        <div style="flex:1">
          <div style="font-size:15px;font-weight:700">QR code pra confirmação no terreiro</div>
          <div style="font-size:12px;color:var(--text3);margin-top:2px">Imprime e cola no espaço · filho escaneia depois de regar</div>
        </div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;color:var(--text3)"><polyline points="6 9 12 15 18 9"/></svg>
      </summary>
      <div style="padding:0 22px 22px;text-align:center">
        ${(() => {
          const urlConf = window.location.origin + window.location.pathname.replace(/index\.html$/,'').replace(/\/$/,'') + '/confirma-rega.html';
          const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(urlConf)}&bgcolor=ffffff&color=000000&margin=10`;
          return `
            <div style="background:#fff;display:inline-block;padding:14px;border-radius:10px;margin-bottom:14px">
              <img src="${qrUrl}" alt="QR confirma rega" style="display:block;width:240px;height:240px"/>
            </div>
            <div style="font-size:12px;color:var(--text3);margin-bottom:8px">URL que o QR aponta:</div>
            <div style="font-family:monospace;font-size:12px;color:var(--text);background:var(--glass2);padding:8px 12px;border-radius:6px;word-break:break-all;margin-bottom:14px">${urlConf}</div>
            <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
              <a class="btn btn-sm" href="${qrUrl}" target="_blank" download="qr-rega-candieiro.png">Baixar PNG</a>
              <button class="btn btn-sm" onclick="window.print()">Imprimir esta página</button>
              <a class="btn btn-sm" href="confirma-rega.html" target="_blank">Testar página</a>
            </div>
            <div style="font-size:12px;color:var(--text3);margin-top:14px;line-height:1.5">
              Sugestão: imprime, plastifica e cola perto das plantas. Filho escaneia com o celular, escolhe o nome, confirma. Sistema marca como ✓.
            </div>
          `;
        })()}
      </div>
    </details>

    ${semCobertura.length > 0 ? `
      <div class="card" style="margin-bottom:14px;border-color:var(--amber-bg)">
        <div class="card-h">
          <div class="card-title" style="color:var(--amber)">⚠️ Próximos 14 dias sem cobertura (${semCobertura.length})</div>
        </div>
        <div class="chips">
          ${semCobertura.slice(0,14).map(d => `<span class="chip chip-amber">${fmt.data(d)}</span>`).join('')}
        </div>
      </div>
    `:''}

    ${renderMesCal(mes1)}
    ${renderMesCal(mes2)}
  `;
}

async function seedDespensa() {
  if(S.despensa.length > 0) {
    if(!confirm(`Já existem ${S.despensa.length} itens cadastrados. Importar mesmo assim (vai criar duplicatas)?`)) return;
  }
  toast(`Importando ${DESPENSA_INICIAL.length} itens... aguarde`,'ok');
  let ok = 0, erros = 0;
  for(const [nome, categoria] of DESPENSA_INICIAL) {
    try {
      await addDoc(collection(dbPvd,'adm_despensa'), {
        nome,
        categoria,
        unidade: 'un',
        estoque: 0,
        minimo: 0,
        obs: '',
        criadoEm: serverTimestamp(),
        atualizadoEm: serverTimestamp()
      });
      ok++;
    } catch(e) { console.error(e); erros++; }
  }
  toast(`${ok} itens importados${erros?` · ${erros} com erro`:''}. Agora ajusta quantidades e mínimos.`,ok?'ok':'err');
}

          <select class="fi" id="dp-cat">
            <option value="todas">Todas</option>
            ${categorias.map(c => `<option value="${c}" ${filtroDespensa.categoria===c?'selected':''}>${c}</option>`).join('')}
          </select>
        </div>
        <div class="fi-group" style="margin:0"><label>Estoque</label>
          <select class="fi" id="dp-stock">
            <option value="todos">Todos</option>
            <option value="baixo" ${filtroDespensa.stockOnly==='baixo'?'selected':''}>Abaixo do mínimo</option>
            <option value="zerado" ${filtroDespensa.stockOnly==='zerado'?'selected':''}>Zerado</option>
          </select>
        </div>
      </div>
    </div>

    <div>
      ${lista.length === 0 ? `
        <div class="empty">
          <div class="empty-t">${S.despensa.length === 0 ? 'Despensa vazia' : 'Nenhum item bate os filtros'}</div>
          ${S.despensa.length === 0 ? `
            <div class="empty-s">Posso importar a lista do terreiro (${DESPENSA_INICIAL.length} itens · velas, ervas, pós, raízes, cascas, sementes, terras) com estoque zerado.<br>Depois você ajusta quantidades e mínimos item por item.</div>
            <button class="btn btn-primary" style="margin-top:18px" onclick="window._app.seedDespensa()">Importar lista do terreiro (${DESPENSA_INICIAL.length} itens)</button>
          ` : ''}
        </div>
      ` : lista.map(p => {
        const baixo = (p.estoque||0) <= (p.minimo||0);
        const zerado = (p.estoque||0) === 0;
        const corBg = zerado ? 'var(--red-bg)' : (baixo ? 'rgba(243,156,18,0.08)' : 'var(--glass)');
        const corBd = zerado ? 'var(--red-bd)' : (baixo ? 'rgba(243,156,18,0.2)' : 'var(--border)');
        return `
        <div class="list-item" style="background:${corBg};border-color:${corBd}" onclick="window._app.openItemDespensaForm('${p.id}')">
          <div class="li-avatar" style="background:${zerado?'var(--red-bg)':(baixo?'var(--amber-bg)':'var(--gold-bg)')};color:${zerado?'var(--red)':(baixo?'var(--amber)':'var(--gold)')};flex-direction:column;font-size:11px;line-height:1.1">
            <div style="font-size:16px;font-weight:700">${p.estoque||0}</div>
            <div style="font-size:9px;text-transform:uppercase">${p.unidade||'un'}</div>
          </div>
          <div class="li-main">
            <div class="li-name">${p.nome||'—'}</div>
            <div class="li-meta">
              ${p.categoria ? `<span class="chip">${p.categoria}</span>` : ''}
              <span style="color:var(--text3)">mínimo: ${p.minimo||0}</span>
              ${p.obs ? `<span style="color:var(--text3);font-style:italic">${p.obs}</span>` : ''}
              ${zerado ? '<span class="chip chip-red">ZERADO</span>' : (baixo ? '<span class="chip chip-amber">baixo</span>' : '')}
            </div>
          </div>
          <div class="li-actions">
            <button class="btn btn-sm" onclick="event.stopPropagation();window._app.movimentarDespensa('${p.id}','entrada')">+ Entrada</button>
            <button class="btn btn-sm" onclick="event.stopPropagation();window._app.movimentarDespensa('${p.id}','saida')">− Saída</button>
          </div>
        </div>
        `;
      }).join('')}
    </div>
  `;

  $('#dp-busca').oninput = e => { filtroDespensa.busca = e.target.value; renderDespensa(c); };
  $('#dp-cat').onchange = e => { filtroDespensa.categoria = e.target.value; renderDespensa(c); };
  $('#dp-stock').onchange = e => { filtroDespensa.stockOnly = e.target.value; renderDespensa(c); };
}

function openItemDespensaForm(id=null) {
  const p = id ? S.despensa.find(x=>x.id===id) : null;
  const isEdit = !!p;
  const categorias = [...new Set(S.despensa.map(x => x.categoria).filter(Boolean))].sort();
  const categoriasSugeridas = ['velas','ervas','defumadores','bebidas','grãos e farinhas','flores','imagens','material'];
  const catsListadas = [...new Set([...categorias, ...categoriasSugeridas])];

  openModal(`
    <div class="modal-h"><h3>${isEdit?'Editar item':'Novo item da despensa'}</h3><button class="btn-close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="modal-c">
      <div class="fi-group"><label>Nome *</label><input class="fi" id="dp-nome" value="${p?.nome||''}" placeholder="ex: Vela branca 7 dias, Alfazema, Cachaça..."/></div>
      <div class="row-2">
        <div class="fi-group"><label>Categoria</label>
          <input class="fi" id="dp-cat-i" value="${p?.categoria||''}" placeholder="ex: velas, ervas..." list="dp-cats-list"/>
          <datalist id="dp-cats-list">${catsListadas.map(c=>`<option value="${c}"></option>`).join('')}</datalist>
        </div>
        <div class="fi-group"><label>Unidade</label>
          <select class="fi" id="dp-un">
            ${['un','kg','g','L','ml','cx','mç','par','dz'].map(u=>`<option value="${u}" ${p?.unidade===u?'selected':(!p&&u==='un'?'selected':'')}>${u}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="row-2">
        <div class="fi-group"><label>Estoque atual</label><input type="number" step="0.01" class="fi" id="dp-est" value="${p?.estoque||0}"/></div>
        <div class="fi-group"><label>Estoque mínimo (alerta)</label><input type="number" step="0.01" class="fi" id="dp-min" value="${p?.minimo||0}"/></div>
      </div>
      <div class="fi-group"><label>Observação (opcional)</label><textarea class="fi" id="dp-obs" placeholder="onde compra, marca preferida, uso ritual...">${p?.obs||''}</textarea></div>
    </div>
    <div class="modal-f">
      ${isEdit?'<button class="btn btn-danger" id="dp-del">Excluir</button>':''}
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="dp-save">${isEdit?'Salvar':'Criar'}</button>
    </div>
  `, { lg: true });

  $('#dp-save').onclick = async () => {
    const nome = $('#dp-nome').value.trim();
    if(!nome) { toast('Informe o nome','err'); return; }
    const data = {
      nome,
      categoria: $('#dp-cat-i').value.trim(),
      unidade: $('#dp-un').value,
      estoque: parseFloat($('#dp-est').value) || 0,
      minimo: parseFloat($('#dp-min').value) || 0,
      obs: $('#dp-obs').value.trim(),
      atualizadoEm: serverTimestamp()
    };
    try {
      if(isEdit) {
        await updateDoc(doc(dbPvd,'adm_despensa',id), data);
      } else {
        data.criadoEm = serverTimestamp();
        await addDoc(collection(dbPvd,'adm_despensa'), data);
      }
      toast(isEdit?'Item atualizado':'Item cadastrado','ok');
      closeModal();
    } catch(e) { toast('Erro: '+e.message,'err'); }
  };

  if(isEdit) $('#dp-del').onclick = () => {
    confirmar(`Excluir <strong>${p.nome}</strong> da despensa?`, async () => {
      try { await deleteDoc(doc(dbPvd,'adm_despensa',id)); toast('Item excluído','ok'); }
      catch(e) { toast('Erro: '+e.message,'err'); }
    });
  };
}

async function movimentarDespensa(id, tipo) {
  const p = S.despensa.find(x => x.id === id);
  if(!p) return;
  const label = tipo === 'entrada' ? 'Entrada (compra/reposição)' : 'Saída (uso ritual / consumo)';
  openModal(`
    <div class="modal-h"><h3>${label} — ${p.nome}</h3><button class="btn-close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="modal-c">
      <div style="font-size:13px;color:var(--text3);margin-bottom:14px">Estoque atual: <strong style="color:var(--text)">${p.estoque||0} ${p.unidade||''}</strong></div>
      <div class="fi-group"><label>Quantidade *</label><input type="number" step="0.01" class="fi" id="mv-qtd" value="1" min="0.01" autofocus/></div>
      <div class="fi-group"><label>Observação (opcional)</label><input class="fi" id="mv-obs" placeholder="${tipo==='entrada'?'ex: comprado em casa de umbanda X':'ex: usado em gira / oferenda pra Iansã'}"/></div>
    </div>
    <div class="modal-f">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="mv-save">Confirmar ${tipo === 'entrada' ? 'entrada' : 'saída'}</button>
    </div>
  `);

  $('#mv-save').onclick = async () => {
    const qtd = parseFloat($('#mv-qtd').value) || 0;
    if(qtd <= 0) { toast('Quantidade inválida','err'); return; }
    const delta = tipo === 'entrada' ? qtd : -qtd;
    const novoEstoque = (p.estoque||0) + delta;
    if(novoEstoque < 0) { toast('Estoque ficaria negativo','err'); return; }
    try {
      await updateDoc(doc(dbPvd,'adm_despensa',id), { estoque: novoEstoque, atualizadoEm: serverTimestamp() });
      toast(`${tipo === 'entrada' ? 'Entrada' : 'Saída'} registrada · agora: ${novoEstoque} ${p.unidade||''}`,'ok');
      closeModal();
    } catch(e) { toast('Erro: '+e.message,'err'); }
  };
}

// ── SLOTS PÚBLICOS (espelho sem PII pro agendar.html) ─────────────────────
// Mantém pub_slots_ocupados/{atend_<id>|sol_<id>} com só {data,hora,dur,fonte}.
// O agendar.html lê DAQUI em vez de adm_atendimentos/adm_solicitacoes — assim
// fechamos a leitura pública dessas collections que têm PII (nome, tel, valor).
async function syncSlotPub(slotId, data, hora, dur, fonte) {
  if(!data || !hora) return;
  try {
    await setDoc(doc(dbPvd,'pub_slots_ocupados', slotId), {
      data, hora, dur: dur||60, fonte: fonte||'atendimento', atualizadoEm: serverTimestamp()
    });
  } catch(e) { console.warn('syncSlotPub falhou:', e); }
}
async function delSlotPub(slotId) {
  try { await deleteDoc(doc(dbPvd,'pub_slots_ocupados', slotId)); }
  catch(e) { console.warn('delSlotPub falhou:', e); }
}

function atualizarBadgeSolicitacoes() {
  const pendentes = S.solicitacoes.filter(s => s.status === 'pendente').length;
  const badge = $('#sol-badge');
  if(!badge) return;
  if(pendentes > 0) { badge.textContent = pendentes; badge.style.display = ''; }
  else badge.style.display = 'none';
}

const METODO_PAG_LABEL = {
  pix: '💳 PIX',
  dinheiro: '💵 Dinheiro (no dia)',
  cartao_credito: '💳 Crédito',
  cartao_debito: '💳 Débito',
  transferencia: '🏦 Transferência'
};

function telLimpoBR(tel) {
  if(!tel) return '';
  let d = String(tel).replace(/\D/g,'');
  if(d.length === 10 || d.length === 11) d = '55' + d; // adiciona DDI se veio sem
  return d;
}

function linkWaConfirmacao(s) {
  const num = telLimpoBR(s.tel);
  if(!num) return null;
  const dataBr = s.data ? new Date(s.data+'T00:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'}) : '';
  const valor = s.valor_proposto || 0;
  const primeiroNome = (s.nome||'').split(' ')[0];
  const metPag = METODO_PAG_LABEL[s.metodo_pagamento] || s.metodo_pagamento || '';
  const linhas = [
    `Oi ${primeiroNome}, é do Terreiro do Candieiro 🪷`,
    '',
    `Tô confirmando seu agendamento:`,
    `🪷 ${s.servico_nome || 'Consulta'}`,
    `📅 ${dataBr} às ${s.hora}`,
    `📍 ${s.modalidade==='online'?'Online (mando o link mais perto da hora)':'Presencial · R. Angelo Vicentim 236, Barão Geraldo'}`,
    `💰 R$ ${valor}${metPag?` · ${metPag.replace(/^[^A-Za-zÀ-ÿ]+/,'')}`:''}`
  ];
  if(s.metodo_pagamento === 'pix') {
    const pixKey = S.cfgAgendamento?.pix || '19992494267';
    const pixTit = S.cfgAgendamento?.pix_titular || 'Nando';
    linhas.push('', `PIX: ${pixKey}${pixTit?` (${pixTit})`:''} — pode me mandar o comprovante por aqui pra eu confirmar.`);
  } else if(s.comprovante_anexado) {
    linhas.push('', 'Você disse que tem o comprovante — pode me mandar por aqui?');
  }
  linhas.push('', 'Qualquer dúvida, é só me chamar.', 'Axé!');
  return `https://wa.me/${num}?text=${encodeURIComponent(linhas.join('\n'))}`;
}

async function aprovarSolicitacao(id) {
  const s = S.solicitacoes.find(x => x.id === id);
  if(!s) return;
  const metPag = METODO_PAG_LABEL[s.metodo_pagamento] || s.metodo_pagamento || '—';
  const dataBr = fmt.data(s.data);
  openModal(`
    <div class="modal-h">
      <h3>Aprovar agendamento</h3>
      <button class="btn-close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-c">
      <div style="padding:12px 14px;background:rgba(212,168,67,0.08);border:1px solid rgba(212,168,67,0.25);border-radius:10px;margin-bottom:16px;font-size:13.5px;line-height:1.6">
        <div><strong style="color:var(--text)">${s.nome}</strong> · ${s.servico_nome||'Consulta'}</div>
        <div>${dataBr} às ${s.hora} · R$ ${s.valor_proposto||0}</div>
        <div>Modalidade: <strong>${s.modalidade==='online'?'Online':'Presencial'}</strong></div>
        <div>Método indicado: ${metPag}</div>
        ${s.comprovante_anexado?'<div style="margin-top:6px"><span class="chip chip-green">comprovante anexado</span></div>':''}
      </div>
      <div class="fi-group">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px;text-transform:none;letter-spacing:0;color:var(--text)">
          <input type="checkbox" id="ap-pago" ${s.comprovante_anexado?'checked':''} style="width:18px;height:18px;cursor:pointer"/>
          <span>Pagamento já confirmado (recebi PIX/dinheiro/etc)</span>
        </label>
        <div style="font-size:12px;color:var(--text3);margin-top:6px;padding-left:28px">Se ainda não recebeu, deixa desmarcado. Dá pra mudar depois editando o atendimento.</div>
      </div>
    </div>
    <div class="modal-f">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="ap-ok">Aprovar</button>
    </div>
  `);
  $('#ap-ok').onclick = async () => {
    const jaPago = $('#ap-pago').checked;
    closeModal();
    try {
      // 1. Verifica se consulente já existe (pelo tel)
      let consId = null;
      if(s.tel) {
        const existente = S.consulentes.find(c => c.tel === s.tel || c.nome.toLowerCase() === s.nome.toLowerCase());
        if(existente) consId = existente.id;
      }
      // 2. Cria consulente se necessário
      if(!consId) {
        const ref = await addDoc(collection(dbPvd,'adm_consulentes'), {
          nome: s.nome,
          tel: s.tel || '',
          email: s.email || null,
          origem: 'site',
          observacoes: s.observacao || '',
          primeira_vez: serverTimestamp(),
          qtd_atendimentos: 0,
          arquivado: false,
          criadoEm: serverTimestamp(),
          atualizadoEm: serverTimestamp()
        });
        consId = ref.id;
      }
      // Determina status_pagamento a partir do checkbox + método indicado
      let status_pagamento = 'pendente';
      let pago_em = null;
      if(jaPago) {
        const m = (s.metodo_pagamento||'').toLowerCase();
        if(m.includes('pix')) status_pagamento = 'pago_pix';
        else if(m.includes('dinheiro')) status_pagamento = 'pago_dinheiro';
        else if(m.includes('cartao') || m.includes('cartão') || m.includes('credito') || m.includes('debito')) status_pagamento = 'pago_cartao';
        else status_pagamento = 'pago_pix'; // fallback razoável
        pago_em = serverTimestamp();
      }
      // 3. Cria atendimento agendado (com servico_nome + modalidade pra calendar)
      const atendPayload = {
        consulente_id: consId,
        consulente_nome: s.nome,
        consulente_tel: s.tel || '',
        data: s.data,
        hora: s.hora,
        duracao_min: s.duracao_min || 60,
        tipo_oraculo: s.tipo_oraculo || 'baralho_cigano',
        servico_nome: s.servico_nome || null,
        servico_id: s.servico_id || null,
        modalidade: s.modalidade || 'presencial',
        publico: true,
        valor: s.valor_proposto || 0,
        status_pagamento,
        pago_em,
        status_atendimento: 'agendado',
        observacao: s.observacao || '',
        origem_solicitacao_id: id,
        criadoEm: serverTimestamp(),
        atualizadoEm: serverTimestamp()
      };
      const atendRef = await addDoc(collection(dbPvd,'adm_atendimentos'), atendPayload);
      // 4. Transfere slot público: sol_ → atend_
      await syncSlotPub('atend_'+atendRef.id, s.data, s.hora, s.duracao_min||60, 'atendimento');
      await delSlotPub('sol_'+id);
      // 5. Cria evento no Google Calendar (se conectado)
      if(gcalIsConnected()) {
        try {
          const gevId = await gcalCreateEvent(atendPayload);
          if(gevId) {
            await updateDoc(doc(dbPvd,'adm_atendimentos', atendRef.id), { google_event_id: gevId });
          }
        } catch(e) { console.warn('gcal create falhou na aprovação:', e); }
      }
      // 6. Marca solicitação como aprovada
      await updateDoc(doc(dbPvd,'adm_solicitacoes',id), {
        status: 'aprovada',
        atualizadoEm: serverTimestamp()
      });
      const sufixo = jaPago ? ' (marcado pago)' : '';
      toast((gcalIsConnected() ? 'Aprovado · atendimento + calendar criado' : 'Aprovado · atendimento criado')+sufixo,'ok');
    } catch(e) { toast('Erro: '+e.message,'err'); }
  };
}

      for(const canonico of SERVICOS_CANDIEIRO) {
        const existente = S.servicos.find(s => (s.nome||'').trim().toLowerCase() === canonico.nome.toLowerCase());

            ...canonico,

            atualizadoEm: serverTimestamp()

function slugify(txt) {
  return (txt||'')
    .toString()
    .normalize('NFD').replace(/[̀-ͯ]/g,'')
    .toLowerCase()
    .replace(/[^a-z0-9]+/g,'-')
    .replace(/^-+|-+$/g,'')
    .slice(0,60);
}

// Calcula o preço efetivo HOJE: se promo ativa e dentro da data, retorna o promo
function precoEfetivoProduto(p) {
  if(!p.promo_ativa || !p.promo_valor || !p.promo_ate) return { valor: p.valor||0, ehPromo: false };
  const hoje = new Date().toISOString().slice(0,10);
  if(hoje <= p.promo_ate) return { valor: p.promo_valor, ehPromo: true, label: p.promo_label, ate: p.promo_ate, valorCheio: p.valor||0 };
  return { valor: p.valor||0, ehPromo: false };
}

                ${arrecadado>0?`<span style="color:var(--green)">R$ ${arrecadado} arrecadado</span>`:''}
              </div>
              <div class="li-meta" style="margin-top:6px">
                <span style="font-size:11px;font-family:monospace;color:var(--text3);user-select:all;cursor:text">${urlPub}</span>
              </div>
            </div>
            <div class="li-actions">
              <button class="btn btn-sm" onclick="window._app.copiarLinkProduto('${p.slug}')" title="Copia o link público">📋</button>
              <a class="btn btn-sm" href="${urlPub}" target="_blank" rel="noopener" title="Abre o link público">↗</a>
              <button class="btn btn-sm btn-primary" onclick="window._app.abrirPagamentosProduto('${p.id}')">💰 Pagamentos</button>
              <button class="btn btn-sm" onclick="window._app.openProdutoForm('${p.id}')">Editar</button>
            </div>
          </div>
        `;}).join('')}
      </div>
    `}
  `;
}

function copiarLinkProduto(slug) {
  const url = `https://terreirodocandieiro.com.br/vendas.html?p=${slug}`;
  navigator.clipboard.writeText(url).then(() => {
    toast('Link copiado!','ok');
  }).catch(() => {
    toast('Não foi possível copiar (use o ↗)','err');
  });
}

function copiarLinkServico(slug) {
  const url = `https://terreirodocandieiro.com.br/agendar.html?s=${slug}`;
  navigator.clipboard.writeText(url).then(() => {
    toast('Link copiado!','ok');
  }).catch(() => {
    toast('Não foi possível copiar (use o ↗)','err');
  });
}

// Adiciona uma linha de turma vazia no editor de produto (chamado pelo "+ Adicionar turma")
function addTurmaRow() {
  const list = document.getElementById('pd-turmas-list');
  if (!list) return;
  const idx = list.querySelectorAll('.pd-turma-row').length;
  const row = document.createElement('div');
  row.className = 'pd-turma-row';
  row.dataset.idx = idx;
  row.style.cssText = 'padding:10px;background:var(--glass2);border:1px solid var(--border);border-radius:8px;margin-bottom:8px';
  row.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:start">
      <div><label style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Nome da turma</label><input class="fi pd-turma-nome" placeholder="Ex: Turma 1 — Sábado"/></div>
      <div><label style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Detalhes (dia/hora/início)</label><input class="fi pd-turma-detalhes" placeholder="Ex: Sábados 10h às 12h · início 25/07"/></div>
      <button type="button" class="btn btn-sm" style="border-color:var(--red-bd);color:var(--red);margin-top:18px" onclick="this.closest('.pd-turma-row').remove()">×</button>
    </div>
  `;
  list.appendChild(row);
  row.querySelector('.pd-turma-nome')?.focus();
}

        <label class="checkbox-row"><input type="checkbox" id="pd-desc-on" ${p?.desconto_afirmativo?.ativo?'checked':''} onchange="document.getElementById('pd-desc-box').style.display=this.checked?'block':'none'"/> <strong>✊🏿 Desconto afirmativo (pretos, indígenas, pessoas trans)</strong></label>

      <!-- DADOS DEMOGRÁFICOS — coleta no checkout (cursos, festas, etc) -->
      <div class="fi-group" style="padding:14px;background:rgba(52,152,219,0.06);border:1px solid rgba(52,152,219,0.2);border-radius:10px">

        <label class="checkbox-row"><input type="checkbox" id="pd-parc-on" ${p?.parcelamento?.ativo?'checked':''} onchange="document.getElementById('pd-parc-box').style.display=this.checked?'block':'none'"/> <strong>📅 Parcelamento (curso com mensalidade)</strong></label>
        <div style="font-size:11.5px;color:var(--text3);margin-top:6px;line-height:1.45">Mostra no checkout que tem parcelas. A primeira (matrícula) é o pagamento atual; as outras são manuais via PIX.</div>
        <div id="pd-parc-box" style="display:${p?.parcelamento?.ativo?'block':'none'};margin-top:12px">

          </div>
          <div style="margin-top:8px"><label style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Texto extra (opcional)</label><input class="fi" id="pd-parc-texto" value="${(p?.parcelamento?.texto||'1ª parcela paga no ato da matrícula. Demais via PIX.').replace(/"/g,'&quot;')}"/></div>
        </div>
      </div>

      <!-- AULA/SERVIÇO RECORRENTE -->
      <div class="fi-group" style="padding:14px;background:rgba(155,89,182,0.06);border:1px solid rgba(155,89,182,0.2);border-radius:10px">
        <label class="checkbox-row"><input type="checkbox" id="pd-rec-on" ${p?.recorrente?'checked':''} onchange="document.getElementById('pd-rec-box').style.display=this.checked?'block':'none'"/> <strong>🔁 Aula ou serviço recorrente</strong></label>
        <div style="font-size:11.5px;color:var(--text3);margin-top:6px;line-height:1.45">Pra pilates, ninjutsu, curso com mensalidade: aluno antigo digita o email pra pagar de novo sem refazer o cadastro. Cria automaticamente em <code>vendas_alunos</code> quando você confirma o primeiro pedido.</div>

          <input type="date" class="fi" id="pd-rec-data" value="${p?.aceita_aluno_a_partir_de||''}"/>

      <div class="fi-group"><label>Ordem na lista</label><input type="number" class="fi" id="pd-ord" value="${p?.ordem||(S.produtos.length+1)}"/></div>
    </div>
    <div class="modal-f">
      ${isEdit?'<button class="btn btn-danger" id="pd-del">Excluir</button>':''}
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="pd-save">${isEdit?'Salvar':'Criar'}</button>
    </div>
  `, { lg: true });

  // Auto-slug do nome se vazio
  const updatePreview = () => {
    let s = $('#pd-slug').value.trim();
    if(!s) s = slugify($('#pd-nome').value);
    $('#pd-slug-preview').textContent = s || '...';
  };
  $('#pd-nome').oninput = updatePreview;
  $('#pd-slug').oninput = updatePreview;

  $('#pd-save').onclick = async () => {
    const nome = $('#pd-nome').value.trim();
    if(!nome) { toast('Informe o nome','err'); return; }
    let slug = ($('#pd-slug').value || '').trim();
    if(!slug) slug = slugify(nome);
    if(!slug) { toast('Slug inválido','err'); return; }
    // Conflito de slug?
    const conflito = S.produtos.find(x => x.slug === slug && x.id !== id);
    if(conflito) { toast('Já existe produto com esse slug','err'); return; }
    const promoOn = $('#pd-promo-on').checked;
    const promoValor = parseFloat($('#pd-promo-valor').value);
    const promoAte = $('#pd-promo-ate').value;
    if(promoOn && (!promoValor || !promoAte)) {
      toast('Pra ativar promoção precisa do valor + data limite','err'); return;
    }
    const data = {
      nome,
      slug,
      descricao: $('#pd-desc').value.trim(),
      valor: parseFloat($('#pd-valor').value) || 0,
      promo_ativa: promoOn,
      promo_valor: promoOn ? promoValor : null,
      promo_ate: promoOn ? promoAte : null,
      promo_label: promoOn ? ($('#pd-promo-lbl').value.trim() || null) : null,
      data_evento: $('#pd-data').value || null,
      local: $('#pd-local').value.trim() || null,
      pix: $('#pd-pix').value.trim() || null,
      infinity_link: $('#pd-infinity').value.trim() || null,
      infinity_link_promo: $('#pd-infinity-promo').value.trim() || null,
      publico: $('#pd-pub').checked,
      ativo: $('#pd-ativo').checked,
      evento_filho: $('#pd-eh-filho').checked,
      coleta_demografia: $('#pd-demo-on')?.checked || false,
      recorrente: $('#pd-rec-on')?.checked || false,
      aceita_aluno_a_partir_de: ($('#pd-rec-on')?.checked && $('#pd-rec-data')?.value) ? $('#pd-rec-data').value : null,
      ordem: parseInt($('#pd-ord').value) || 999,
      atualizadoEm: serverTimestamp()
    };
    // Turmas
    if ($('#pd-tem-turmas').checked) {
      const turmas = [];
      document.querySelectorAll('.pd-turma-row').forEach(row => {
        const nome = row.querySelector('.pd-turma-nome').value.trim();
        const detalhes = row.querySelector('.pd-turma-detalhes').value.trim();
        if (nome) turmas.push({ id: 't_'+Math.random().toString(36).slice(2,8), nome, detalhes });
      });
      data.turmas = turmas;
    } else {
      data.turmas = [];
    }
    // Desconto afirmativo
    if ($('#pd-desc-on').checked) {
      const dvalor = parseFloat($('#pd-desc-valor').value);
      data.desconto_afirmativo = {
        ativo: true,
        valor: isNaN(dvalor) ? null : dvalor,
        texto: $('#pd-desc-texto').value.trim() || 'Sou pessoa preta, indígena ou trans',
        infinity_link: $('#pd-desc-infinity').value.trim() || null
      };
    } else {
      data.desconto_afirmativo = { ativo: false };
    }
    // Parcelamento
    if ($('#pd-parc-on').checked) {
      data.parcelamento = {
        ativo: true,
        qtd: parseInt($('#pd-parc-qtd').value) || 4,
        vencimento_dia: parseInt($('#pd-parc-dia').value) || 10,
        texto: $('#pd-parc-texto').value.trim() || ''
      };
    } else {
      data.parcelamento = { ativo: false };
    }
    try {
      if(isEdit) await updateDoc(doc(dbPvd,'vendas_produtos',id), data);
      else { data.criadoEm = serverTimestamp(); await addDoc(collection(dbPvd,'vendas_produtos'), data); }
      toast(isEdit?'Produto atualizado':'Produto criado · use o 📋 pra copiar o link','ok');
      closeModal();
    } catch(e) { toast('Erro: '+e.message,'err'); }
  };

  if(isEdit) $('#pd-del').onclick = () => {
    const ped = S.pedidos.filter(x => x.produto_id === id);
    confirmar(`Excluir produto <strong>${p.nome}</strong>?${ped.length?` <br>Atenção: ${ped.length} pedido${ped.length===1?'':'s'} vinculado${ped.length===1?'':'s'} continuarão existindo.`:''}`, async () => {
      try { await deleteDoc(doc(dbPvd,'vendas_produtos',id)); toast('Produto excluído','ok'); closeModal(); }
      catch(e) { toast('Erro: '+e.message,'err'); }
    });
  };
}

// ── EVENTOS PROS FILHOS ──────────────────────────────────────────────────
// Lista enxuta de eventos tipo='evento_filho' com botão de criar e acesso rápido
// à lista de pagamentos. Compartilha o mesmo modal (openEventoForm) — só pré-fila
// o tipo pra evento_filho.
function renderEventosFilhos(c) {
  const hoje = new Date().toISOString().slice(0,10);
  const futuros = S.eventos
    .filter(e => e.tipo === 'evento_filho' && !e.arquivado && (e.data||'') >= hoje)
    .sort((a,b) => (a.data+(a.hora||'')).localeCompare(b.data+(b.hora||'')));
  const passados = S.eventos
    .filter(e => e.tipo === 'evento_filho' && !e.arquivado && (e.data||'') < hoje)
    .sort((a,b) => (b.data+(b.hora||'')).localeCompare(a.data+(a.hora||'')))
    .slice(0,12);

  // Totais arrecadados (todos eventos)
  const arrecGeral = (S.eventoInscricoes||[])
    .filter(i => i.status === 'pago')
    .reduce((s,i) => s + (Number(i.valor)||0), 0);
  const brl = v => 'R$ ' + Number(v||0).toFixed(2).replace('.',',');

  const cardEv = (e) => {
    const insc = (S.eventoInscricoes||[]).filter(i => i.evento_id === e.id);
    const pagas = insc.filter(i => i.status === 'pago');
    const aguardando = insc.filter(i => i.status === 'aguardando' || !i.status);
    const arrec = pagas.reduce((s,i) => s + (Number(i.valor)||0), 0);
    const valor = Number(e.valor) || 0;
    const url = window.location.origin + window.location.pathname.replace(/index\.html$/,'').replace(/\/$/,'') + '/evento.html?id=' + e.id;
    return `
      <div class="list-item">
        <div class="li-avatar" style="background:var(--gold-bg);color:var(--gold)">${(e.data||'').slice(8,10)}</div>
        <div class="li-main">
          <div class="li-name">${e.nome || e.titulo || 'Evento'}</div>
          <div class="li-meta">
            <span>${fmt.dataLong(e.data)}${e.hora?' · '+e.hora:''}</span>
            ${valor?`<span class="chip chip-gold">${brl(valor)}</span>`:''}
            ${pagas.length?`<span class="chip chip-green">${pagas.length} pago${pagas.length===1?'':'s'} · ${brl(arrec)}</span>`:''}
            ${aguardando.length?`<span class="chip chip-amber">${aguardando.length} aguardando</span>`:''}
          </div>
        </div>
        <div class="li-actions">
          <button class="btn btn-sm" onclick="window._app.copiarLinkEvento('${e.id}', this)">📋 Link</button>
          <button class="btn btn-sm btn-primary" onclick="window._app.abrirPagamentosEvento('${e.id}')">💰 Pagamentos</button>
          <button class="btn btn-sm" onclick="window._app.openEventoForm('${e.id}')">Editar</button>
        </div>
      </div>
    `;
  };

  c.innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">Eventos pros filhos</div>
        <div class="page-sub">Festas, jantares e outros eventos pagos só pra galera da casa. <strong style="color:var(--green)">Arrecadado total: ${brl(arrecGeral)}</strong></div>
      </div>
      <div class="page-actions">
        <button class="btn btn-primary" onclick="window._app.openEventoForm(null, null, 'evento_filho')">+ Novo evento pros filhos</button>
      </div>
    </div>

    <div class="card" style="margin-bottom:14px">
      <div class="card-h"><div class="card-title">Próximos eventos (${futuros.length})</div></div>
      ${futuros.length === 0
        ? '<div class="empty"><div class="empty-t">Nenhum evento futuro</div><div class="empty-s">Clica em "+ Novo evento pros filhos" pra criar.</div></div>'
        : futuros.map(cardEv).join('')}
    </div>

    ${passados.length > 0 ? `
      <div class="card">
        <div class="card-h"><div class="card-title">Histórico (${passados.length})</div></div>
        ${passados.map(cardEv).join('')}
      </div>
    ` : ''}
  `;
}

function copiarLinkEvento(id, btn) {
  const url = window.location.origin + window.location.pathname.replace(/index\.html$/,'').replace(/\/$/,'') + '/evento.html?id=' + id;
  navigator.clipboard.writeText(url).then(() => {
    if(btn) {
      const orig = btn.textContent;
      btn.textContent = '✓ Copiado!';
      setTimeout(() => btn.textContent = orig, 1800);
    } else { toast('Link copiado','ok'); }
  }).catch(() => alert('Link: ' + url));
};

// ── INTELIGÊNCIA ─────────────────────────────────────────────────────────
// Cruza dados de adm_atendimentos + adm_consulentes + vendas_pedidos pra
// construir perfil de pessoas + segmentos + insights de produtos + oportunidades.
// Não inclui PDV/sales (vendas anônimas de gira ficam fora por design).
let _intelTab = 'oportunidades';
let _intelPeriodo = '12m';

function _intelDataLimite() {
  if (_intelPeriodo === 'tudo') return null;
  const d = new Date();
  if (_intelPeriodo === '30d') d.setDate(d.getDate()-30);
  else if (_intelPeriodo === '90d') d.setDate(d.getDate()-90);
  else if (_intelPeriodo === '12m') d.setFullYear(d.getFullYear()-1);
  return d.toISOString().slice(0,10);
}
function _intelNormTel(tel) { return (tel||'').replace(/\D/g,'').slice(-11); }
function _intelNormNome(nome) {
  return (nome||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().replace(/\s+/g,' ').trim();
}

function _intelConstruirPessoas() {
  const limite = _intelDataLimite();
  const pessoas = new Map();
  const acharOuCriar = (filhoId, nome, tel, email) => {
    const tn = _intelNormTel(tel);
    const nn = _intelNormNome(nome);
    let key = null;
    if (filhoId) {
      for (const [k,p] of pessoas) if (p.filhoId === filhoId) { key = k; break; }
      if (!key) key = 'f:'+filhoId;
    } else if (tn && tn.length >= 8) {
      for (const [k,p] of pessoas) if (p.tel && _intelNormTel(p.tel) === tn) { key = k; break; }
      if (!key) key = 't:'+tn;
    } else if (nn) {
      for (const [k,p] of pessoas) if (_intelNormNome(p.nome) === nn) { key = k; break; }
      if (!key) key = 'n:'+nn;
    }
    if (!key) return null;
    if (!pessoas.has(key)) {
      pessoas.set(key, { key, nome, tel, email, filhoId, interacoes: [] });
    } else {
      const p = pessoas.get(key);
      if (!p.tel && tel) p.tel = tel;
      if (!p.email && email) p.email = email;
      if (!p.filhoId && filhoId) p.filhoId = filhoId;
      if ((p.nome||'').length < (nome||'').length) p.nome = nome;
    }
    return pessoas.get(key);
  };

  // Atendimentos
  (S.atendimentos||[]).forEach(at => {
    if (limite && at.data && at.data < limite) return;
    if (at.status_atendimento === 'cancelado') return;
    const cons = (S.consulentes||[]).find(c => c.id === at.consulente_id);
    const nome = at.consulente_nome || cons?.nome || '?';
    const tel = at.consulente_tel || cons?.tel || '';
    const email = cons?.email || null;
    const p = acharOuCriar(null, nome, tel, email);
    if (p) p.interacoes.push({
      type: 'atendimento', data: at.data || '',
      valor: Number(at.valor) || 0,
      pago: (at.status_pagamento||'').startsWith('pago') || at.status_pagamento === 'isento',
      tema: at.tema || null,
      ref: at.id,
      label: at.tipo_oraculo === 'buzios' ? 'Búzios' : 'Baralho cigano'
    });
  });

  // Pedidos
  (S.pedidos||[]).forEach(pd => {
    const dt = pd.criadoEm?.toDate ? pd.criadoEm.toDate() : (pd.criadoEm?.seconds ? new Date(pd.criadoEm.seconds*1000) : null);
    const dataISO = dt ? dt.toISOString().slice(0,10) : '';
    if (limite && dataISO && dataISO < limite) return;
    if (pd.status === 'cancelado') return;
    const prod = (S.produtos||[]).find(x => x.id === pd.produto_id);
    const p = acharOuCriar(pd.filho_id, pd.nome, pd.tel, pd.email);
    if (p) p.interacoes.push({
      type: 'pedido', data: dataISO,
      valor: Number(pd.valor) || 0,
      pago: pd.status === 'confirmado',
      ref: pd.id,
      label: pd.produto_nome || 'Pedido',
      produtoId: pd.produto_id,
      categoria: prod?.evento_filho ? 'evento_filho' : 'produto',
      comoSoube: pd.como_soube || null
    });
  });

  const lista = [];
  for (const [, p] of pessoas) {
    p.qtdAtendimentos = p.interacoes.filter(i => i.type === 'atendimento').length;
    p.qtdAtendimentosPagos = p.interacoes.filter(i => i.type === 'atendimento' && i.pago).length;
    p.valorAtendimentos = p.interacoes.filter(i => i.type === 'atendimento' && i.pago).reduce((s,i)=>s+i.valor,0);
    p.qtdPedidos = p.interacoes.filter(i => i.type === 'pedido').length;
    p.qtdPedidosPagos = p.interacoes.filter(i => i.type === 'pedido' && i.pago).length;
    p.valorPedidos = p.interacoes.filter(i => i.type === 'pedido' && i.pago).reduce((s,i)=>s+i.valor,0);
    p.valorTotal = p.valorAtendimentos + p.valorPedidos;
    p.qtdTotal = p.qtdAtendimentos + p.qtdPedidos;
    const datas = p.interacoes.map(i => i.data).filter(Boolean).sort();
    p.primeiraData = datas[0] || null;
    p.ultimaData = datas[datas.length-1] || null;
    lista.push(p);
  }
  return lista.sort((a,b) => b.valorTotal - a.valorTotal);
}

function renderInteligencia(c) {
  const pessoas = _intelConstruirPessoas();
  const totalReceita = pessoas.reduce((s,p)=>s+p.valorTotal, 0);
  const totalAtPagos = pessoas.reduce((s,p)=>s+p.qtdAtendimentosPagos, 0);
  const totalPdPagos = pessoas.reduce((s,p)=>s+p.qtdPedidosPagos, 0);
  const pessoasComReceita = pessoas.filter(p => p.valorTotal > 0).length;

  c.innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">Inteligência</div>
        <div class="page-sub">${pessoas.length} pessoa${pessoas.length===1?'':'s'} cruzada${pessoas.length===1?'':'s'} · ${pessoasComReceita} com receita · ${totalAtPagos} atendimentos + ${totalPdPagos} pedidos pagos · <strong style="color:var(--green)">R$ ${totalReceita.toFixed(0)}</strong></div>
      </div>
      <div class="page-actions">
        <select class="fi" id="intel-periodo" onchange="window._app.setIntelPeriodo(this.value)" style="min-width:170px;padding:8px 12px">
          <option value="30d" ${_intelPeriodo==='30d'?'selected':''}>Últimos 30 dias</option>
          <option value="90d" ${_intelPeriodo==='90d'?'selected':''}>Últimos 90 dias</option>
          <option value="12m" ${_intelPeriodo==='12m'?'selected':''}>Últimos 12 meses</option>
          <option value="tudo" ${_intelPeriodo==='tudo'?'selected':''}>Tudo</option>
        </select>
      </div>
    </div>

    <div class="tabs">
      <button class="${_intelTab==='oportunidades'?'active':''}" onclick="window._app.setIntelTab('oportunidades')">💡 Oportunidades</button>
      <button class="${_intelTab==='segmentos'?'active':''}" onclick="window._app.setIntelTab('segmentos')">🎯 Segmentos</button>
      <button class="${_intelTab==='produtos'?'active':''}" onclick="window._app.setIntelTab('produtos')">📦 Produtos</button>
      <button class="${_intelTab==='pessoas'?'active':''}" onclick="window._app.setIntelTab('pessoas')">👥 Pessoas</button>
    </div>

    <div id="intel-body"></div>
  `;

  if (_intelTab === 'oportunidades') _renderIntelOportunidades(pessoas);
  else if (_intelTab === 'segmentos') _renderIntelSegmentos(pessoas);
  else if (_intelTab === 'produtos') _renderIntelProdutos(pessoas);
  else _renderIntelPessoas(pessoas);
}

function setIntelTab(t) { _intelTab = t; renderRoute(); }
function setIntelPeriodo(p) { _intelPeriodo = p; renderRoute(); }

function _renderIntelPessoas(pessoas) {
  const body = $('#intel-body');
  if (pessoas.length === 0) {
    body.innerHTML = '<div class="card"><div class="empty"><div class="empty-t">Sem dados</div><div class="empty-s">Nenhum atendimento ou pedido no período selecionado.</div></div></div>';
    return;
  }
  body.innerHTML = `
    <div class="card">
      ${pessoas.slice(0, 100).map(p => {
        const chips = [];
        if (p.filhoId) chips.push('<span class="chip chip-gold" style="font-size:9.5px">🏠 filha</span>');
        if (p.qtdAtendimentos > 0) chips.push('<span class="chip" style="font-size:9.5px">👁 consulente</span>');
        if (p.qtdPedidos > 0) chips.push('<span class="chip" style="font-size:9.5px">🛒 comprador</span>');
        const ultima = p.ultimaData ? new Date(p.ultimaData+'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}) : '—';
        return `
          <div class="list-item">
            <div class="li-avatar" style="background:var(--gold-bg);color:var(--gold);font-size:11px">${fmt.initials(p.nome)}</div>
            <div class="li-main">
              <div class="li-name">${p.nome} ${chips.join(' ')}</div>
              <div class="li-meta">
                ${p.tel ? `<span>${p.tel}</span>` : ''}
                ${p.qtdAtendimentosPagos > 0 ? `<span>👁 ${p.qtdAtendimentosPagos}× · R$ ${p.valorAtendimentos.toFixed(0)}</span>` : ''}
                ${p.qtdPedidosPagos > 0 ? `<span>🛒 ${p.qtdPedidosPagos}× · R$ ${p.valorPedidos.toFixed(0)}</span>` : ''}
                <span style="color:var(--text3)">Última: ${ultima}</span>
              </div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div style="font-size:17px;font-weight:700;color:var(--gold)">R$ ${p.valorTotal.toFixed(0)}</div>
            </div>
          </div>
        `;
      }).join('')}
      ${pessoas.length > 100 ? `<div style="padding:14px;text-align:center;color:var(--text3);font-size:12px">+${pessoas.length-100} pessoas — refine o período pra ver tudo</div>` : ''}
    </div>
  `;
}

function _renderIntelSegmentos(pessoas) {
  const sorted = [...pessoas].filter(p => p.valorTotal > 0).sort((a,b)=>b.valorTotal-a.valorTotal);
  const pilares = sorted.slice(0, Math.max(1, Math.ceil(sorted.length * 0.1)));
  const recorrentes = pessoas.filter(p => p.qtdAtendimentos >= 3);
  const multicanal = pessoas.filter(p => p.qtdAtendimentos > 0 && p.qtdPedidos > 0);

  const hoje30 = new Date(); hoje30.setDate(hoje30.getDate()-30);
  const novos = pessoas.filter(p => p.primeiraData && p.primeiraData >= hoje30.toISOString().slice(0,10));
  const hoje90 = new Date(); hoje90.setDate(hoje90.getDate()-90);
  const dormentes = pessoas.filter(p => p.ultimaData && p.ultimaData < hoje90.toISOString().slice(0,10) && p.valorTotal >= 100);
  const hoje180 = new Date(); hoje180.setMonth(hoje180.getMonth()-6);
  const singleShot = pessoas.filter(p => p.qtdTotal === 1 && p.ultimaData && p.ultimaData < hoje180.toISOString().slice(0,10));
  const soComprou = pessoas.filter(p => p.qtdPedidos > 0 && p.qtdAtendimentos === 0);
  const soConsultou = pessoas.filter(p => p.qtdAtendimentos > 0 && p.qtdPedidos === 0);

  const segs = [
    { icon:'⭐', nome:'Pilares', sub:'Top 10% por receita', pessoas:pilares, acao:'Mantenha relacionamento próximo — essas pessoas sustentam a casa. Atenção e cuidado individuais.' },
    { icon:'🔁', nome:'Recorrentes', sub:'3+ atendimentos no período', pessoas:recorrentes, acao:'Pacote ou plano contínuo (5 sessões com 10% off). Cliente fiel adora previsibilidade.' },
    { icon:'🌐', nome:'Multicanal', sub:'Consulta + compra', pessoas:multicanal, acao:'Conhecem a casa por múltiplos ângulos. Excelentes pra testar nova oferta antes de lançar pra todos.' },
    { icon:'🆕', nome:'Novos', sub:'Primeira interação < 30d', pessoas:novos, acao:'Follow-up em 7 dias pra checar experiência. Resgate antes de virar single-shot.' },
    { icon:'😴', nome:'Dormentes', sub:'Sem atividade > 90d, histórico forte', pessoas:dormentes, acao:'Reativa por WhatsApp pessoal. Mostra novidade. Conversão típica: 15-25%.' },
    { icon:'👋', nome:'Single-shot', sub:'1 interação, > 6 meses', pessoas:singleShot, acao:'Provavelmente perdidos. Vale entender o motivo (atendimento ruim? expectativa frustrada?).' },
    { icon:'🛒→👁', nome:'Compradores sem consulta', sub:'Compraram mas nunca consultaram', pessoas:soComprou, acao:'Pitch direto: "Quer entender mais sobre seu caminho? Marca uma consulta".' },
    { icon:'👁→🛒', nome:'Consulentes sem compra', sub:'Consultaram mas nunca compraram', pessoas:soConsultou, acao:'Sugira produto correlato ao tema da consulta (amor → curso de tarô, financeiro → curso prosperidade).' }

  $('#intel-body').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px">
      ${segs.map(s => {
        const receita = s.pessoas.reduce((sum,p)=>sum+p.valorTotal, 0);
        return `
          <div class="card">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
              <span style="font-size:24px">${s.icon}</span>

                <div style="font-size:15px;font-weight:700;color:var(--text)">${s.nome}</div>

            </div>
            <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:12px">
              <div style="font-size:30px;font-weight:700;color:var(--gold);font-family:var(--font-display)">${s.pessoas.length}</div>
              <div style="font-size:12.5px;color:var(--text2)">pessoa${s.pessoas.length===1?'':'s'}</div>

            </div>
