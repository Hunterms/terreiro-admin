  $('#ev-save').onclick = async () => {
    const nome = $('#ev-nome').value.trim();
    const data = $('#ev-data').value;
    if(!nome) { toast('Informe o título','err'); return; }
    if(!data) { toast('Informe a data','err'); return; }
    const payload = {
      nome,
      data,
      hora: $('#ev-hora').value || '',
      tipo: $('#ev-tipo').value,
      publico: $('#ev-publico').checked,
      requer_limpeza: $('#ev-limpeza').checked,
      local: $('#ev-local').value.trim(),
      descricao: $('#ev-desc').value.trim(),
      ingresso_slug: $('#ev-ingresso')?.value || null,
      arquivado: false,
      atualizadoEm: serverTimestamp()
    };
    if(!isEdit) {
      payload.criadoEm = serverTimestamp();
      payload.criadoPor = S.user.uid;
      payload.status = 'Confirmada';
      payload.ts = serverTimestamp();
    }
    try {
      if(isEdit) await updateDoc(doc(dbCand,'eventos',id), payload);
      else await addDoc(collection(dbCand,'eventos'), payload);
      toast(isEdit?'Evento atualizado':'Evento criado','ok');
      closeModal();
    } catch(e) { toast('Erro: '+e.message,'err'); }
  };

  if(isEdit) $('#ev-del').onclick = () => {
    confirmar('Excluir este evento?', async () => {
      try { await deleteDoc(doc(dbCand,'eventos',id)); toast('Evento excluído','ok'); }
      catch(e) { toast('Erro: '+e.message,'err'); }
    });
  };
}

// ── PAGAMENTOS DE EVENTO ─────────────────────────────────────────────────
// Modal lista quem se inscreveu/pagou + total arrecadado + ações
async function abrirPagamentosEvento(eventoId) {
  const ev = S.eventos.find(x => x.id === eventoId);
  if(!ev) return;
  const vf = Number(ev.valor_filho) || 0;
  const vp = Number(ev.valor_publico) || 0;

  // Carrega inscrições (já listener em S.eventoInscricoes — fallback fresh fetch)
  let inscricoes = (S.eventoInscricoes||[]).filter(i => i.evento_id === eventoId);
  if(inscricoes.length === 0 && !S.eventoInscricoes) {
    try {
      const snap = await getDocs(query(collection(dbPvd,'evento_inscricoes'), where('evento_id','==',eventoId)));
      inscricoes = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    } catch(e) {}
  }

  const renderModal = () => {
    inscricoes = (S.eventoInscricoes||[]).filter(i => i.evento_id === eventoId);
    const pagas = inscricoes.filter(i => i.status === 'pago');
    const aguardando = inscricoes.filter(i => i.status === 'aguardando' || !i.status);
    const arrecadado = pagas.reduce((s,i) => s + (Number(i.valor)||0), 0);
    const previstas = inscricoes.reduce((s,i) => s + (Number(i.valor)||0), 0);

    const linha = (insc) => {
      const ehFilho = !!insc.filho_id;
      const stChip = insc.status === 'pago'
        ? '<span class="chip chip-green">Pago</span>'
        : '<span class="chip chip-amber">Aguardando</span>';
      const dt = insc.criadoEm?.toDate ? insc.criadoEm.toDate() : (insc.criadoEm?.seconds ? new Date(insc.criadoEm.seconds*1000) : null);
      const quando = dt ? dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}) + ' ' + dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : '';
      return `
        <div class="list-item" style="background:var(--glass2)">
          <div class="li-main">
            <div class="li-name">${insc.nome||'—'} ${ehFilho?'<span class="chip chip-gold" style="margin-left:6px;font-size:10px">filho</span>':''}</div>
            <div class="li-meta">
              <span style="font-weight:700;color:var(--gold)">R$ ${(Number(insc.valor)||0).toFixed(2).replace('.',',')}</span>
              ${stChip}
              ${insc.metodo?`<span class="chip">${insc.metodo}</span>`:''}
              ${quando?`<span style="color:var(--text3)">${quando}</span>`:''}
              ${insc.tel?`<span style="color:var(--text3)">📱 ${insc.tel}</span>`:''}
            </div>
          </div>
          <div class="li-actions">
            ${insc.status === 'pago'
              ? `<button class="btn btn-sm" onclick="window._app.marcarInscricao('${insc.id}','aguardando')">Marcar pendente</button>`
              : `<button class="btn btn-sm btn-primary" onclick="window._app.marcarInscricao('${insc.id}','pago')">Confirmar pago</button>`}
            <button class="btn btn-sm" style="border-color:var(--red-bd);color:var(--red)" onclick="window._app.deletarInscricao('${insc.id}')">×</button>
          </div>
        </div>
      `;
    };

    return `
      <div class="modal-h"><h3>💰 Pagamentos · ${ev.nome}</h3><button class="btn-close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
      <div class="modal-c">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px">
          <div style="padding:12px;background:var(--green-bg);border:1px solid var(--green-bd);border-radius:8px">
            <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:700">Arrecadado</div>
            <div style="font-size:18px;font-weight:700;color:var(--green);margin-top:4px">R$ ${arrecadado.toFixed(2).replace('.',',')}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px">${pagas.length} pagamento${pagas.length===1?'':'s'}</div>
          </div>
          <div style="padding:12px;background:var(--gold-bg);border:1px solid rgba(212,168,67,.3);border-radius:8px">
            <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:700">Aguardando</div>
            <div style="font-size:18px;font-weight:700;color:var(--gold);margin-top:4px">R$ ${(previstas-arrecadado).toFixed(2).replace('.',',')}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px">${aguardando.length} pendente${aguardando.length===1?'':'s'}</div>
          </div>
          <div style="padding:12px;background:var(--glass2);border:1px solid var(--border);border-radius:8px">
            <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:700">Valores</div>
            <div style="font-size:13px;color:var(--text);margin-top:4px;line-height:1.4">
              ${vp?`Público: <strong style="color:var(--gold)">R$ ${vp.toFixed(2).replace('.',',')}</strong>`:'<span style="color:var(--text3)">Sem valor público</span>'}<br>
              ${vf?`Filho: <strong style="color:var(--gold)">R$ ${vf.toFixed(2).replace('.',',')}</strong>`:'<span style="color:var(--text3)">Sem valor filho</span>'}
            </div>
          </div>
        </div>
        ${inscricoes.length === 0
          ? '<div class="empty"><div class="empty-s">Ninguém se inscreveu ainda. Compartilhe o link público pra começar.</div></div>'
          : inscricoes.sort((a,b) => (a.status==='pago'?1:-1) - (b.status==='pago'?1:-1)).map(linha).join('')}
      </div>
      <div class="modal-f">
        <button class="btn" onclick="closeModal()">Fechar</button>
      </div>
    `;
  };

  openModal(renderModal(), { lg:true });

  // Re-render quando S.eventoInscricoes mudar
  window._app.renderPagamentos = () => {
    const modal = document.getElementById('modal-body');
    if(modal) modal.innerHTML = renderModal();
  };
}

async function marcarInscricao(inscId, novoStatus) {
  try {
    const patch = { status: novoStatus, atualizadoEm: serverTimestamp() };
    if(novoStatus === 'pago') patch.confirmadoEm = serverTimestamp();
    await updateDoc(doc(dbPvd,'evento_inscricoes', inscId), patch);
    toast(novoStatus==='pago'?'Marcado como pago':'Marcado como pendente','ok');
  } catch(e) { toast('Erro: '+e.message,'err'); }
}

async function deletarInscricao(inscId) {
  if(!confirm('Apagar essa inscrição? Não dá pra desfazer.')) return;
  try {
    await deleteDoc(doc(dbPvd,'evento_inscricoes', inscId));
    toast('Inscrição apagada','ok');
  } catch(e) { toast('Erro: '+e.message,'err'); }
}

// ── PAGAMENTOS POR PRODUTO (evento pros filhos) ──────────────────────────
// Lista TODOS os filhos ativos × status de pagamento no vendas_pedidos pra
// aquele produto. Match prioriza filho_id no pedido (quando vendas.html
// salva via autocomplete); fallback é por nome normalizado.
let _pagProdState = { filtro: 'todos', produtoId: null };
function _normNome(s) { return (s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().trim(); }

function abrirPagamentosProduto(produtoId) {
  _pagProdState.produtoId = produtoId;
  _pagProdState.filtro = 'todos';
  openModal(_renderPagProdContent(), { lg: true });
  window._app.renderPagProd = () => {
    const modal = document.getElementById('modal-body');
    if(modal) modal.innerHTML = _renderPagProdContent();
  };
}

function _renderPagProdContent() {
  const produtoId = _pagProdState.produtoId;
  const filtro = _pagProdState.filtro;
  const p = S.produtos.find(x => x.id === produtoId);
  if(!p) return '<div class="modal-h"><h3>Produto não encontrado</h3></div>';

  const valorAtivo = (() => {
    if(p.promo_ativa && p.promo_valor && p.promo_ate) {
      const hojeISO = new Date().toISOString().slice(0,10);
      if(p.promo_ate >= hojeISO) return Number(p.promo_valor) || 0;
    }
    return Number(p.valor) || 0;
  })();
  const brl = v => 'R$ ' + Number(v||0).toFixed(2).replace('.',',');
  const pedidosDoProduto = (S.pedidos||[]).filter(x => x.produto_id === produtoId);

  // Para produto NORMAL: mostra apenas lista de pedidos (resumo)
  if(!p.evento_filho) return _renderPagProdSimpleList(p, pedidosDoProduto, valorAtivo, brl, filtro);

  // Para evento_filho: cruza com filhos ativos × status (com filtros)
  const filhosAtivos = S.filhos.filter(f => !f.status || f.status === 'ativo')
    .sort((a,b) => (a.nome||'').localeCompare(b.nome||''));

  // Dedup: 1 pedido por filho. Prioridade: confirmado > aguardando, mais recente.
  const rows = filhosAtivos.map(f => {
    const nomeF = _normNome(f.nome);
    const pedidos = pedidosDoProduto.filter(x =>
      (x.filho_id && x.filho_id === f.id) || (!x.filho_id && _normNome(x.nome) === nomeF)
    );
    // Pega o "melhor": primeiro tenta confirmado, depois aguardando/qualquer
    const confirmados = pedidos.filter(x => x.status === 'confirmado');
    const pedido = confirmados[0] || pedidos[0] || null;
    const status = pedido?.status === 'confirmado' ? 'pago'
                 : pedido ? 'aguardando'
                 : 'nao_pago';
    return { filho:f, pedido, status };
  });

  // Contadores dedupados por filho (mesmo se houver pedidos duplicados pra um filho, conta 1)
  const totalConfirmado = rows.filter(r => r.status === 'pago')
    .reduce((s,r) => s + (Number(r.pedido?.valor) || valorAtivo), 0);
  const qtdPago = rows.filter(r => r.status === 'pago').length;
  const qtdAguardando = rows.filter(r => r.status === 'aguardando').length;
  const qtdNaoPago = rows.filter(r => r.status === 'nao_pago').length;
  const totalEsperado = filhosAtivos.length * valorAtivo;

  let filtradas = rows;
  if(filtro === 'pagos') filtradas = rows.filter(r => r.status === 'pago');
  else if(filtro === 'nao_pagos') filtradas = rows.filter(r => r.status === 'nao_pago');
  else if(filtro === 'aguardando') filtradas = rows.filter(r => r.status === 'aguardando');

  const linha = (r) => {
    const stChip = r.status === 'pago'
      ? '<span class="chip chip-green">✓ Pago</span>'
      : r.status === 'aguardando'
      ? '<span class="chip chip-amber">⏳ Aguardando</span>'
      : '<span class="chip" style="background:var(--glass2);color:var(--text3)">— Não pago</span>';
    const valorPg = r.pedido ? `<span style="font-weight:700;color:var(--gold)">${brl(r.pedido.valor || valorAtivo)}</span>` : '';
    const dt = r.pedido?.criadoEm?.toDate ? r.pedido.criadoEm.toDate() : (r.pedido?.criadoEm?.seconds ? new Date(r.pedido.criadoEm.seconds*1000) : null);
    const quando = dt ? dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}) + ' ' + dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : '';
    return `
      <div class="list-item" style="background:var(--glass2)">
        <div class="li-avatar" style="background:var(--gold-bg);color:var(--gold);font-size:11px">${fmt.initials(r.filho.nome)}</div>
        <div class="li-main">
          <div class="li-name">${r.filho.nome}</div>
          <div class="li-meta">
            ${stChip}
            ${valorPg}
            ${quando?`<span style="color:var(--text3)">${quando}</span>`:''}
            ${r.pedido?.metodo?`<span class="chip">${r.pedido.metodo}</span>`:''}
          </div>
        </div>
        <div class="li-actions">
          ${r.status === 'aguardando' ? `<button class="btn btn-sm btn-primary" onclick="window._app.confirmarPedido('${r.pedido.id}')">Confirmar pago</button>` : ''}
          ${r.status === 'pago' ? `<button class="btn btn-sm" onclick="window._app.reverterPedido('${r.pedido.id}')">Desfazer</button>` : ''}
          ${r.status === 'nao_pago' ? `<button class="btn btn-sm" onclick="window._app.marcarPagoSemPedido('${produtoId}','${r.filho.id}', '${r.filho.nome.replace(/'/g,'')}', ${valorAtivo})" title="Cria um pedido já confirmado (ex: pagou em dinheiro)">+ Marcar pago</button>` : ''}
        </div>
      </div>
    `;
  };

  return `
    <div class="modal-h"><h3>💰 Pagamentos · ${p.nome}</h3><button class="btn-close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="modal-c">
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px">
        <div style="padding:12px;background:var(--green-bg);border:1px solid var(--green-bd);border-radius:8px">
          <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:700">Arrecadado</div>
          <div style="font-size:18px;font-weight:700;color:var(--green);margin-top:4px">${brl(totalConfirmado)}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">${qtdPago} pago${qtdPago===1?'':'s'} de ${filhosAtivos.length}</div>
        </div>
        ${qtdAguardando ? `
        <div style="padding:12px;background:var(--gold-bg);border:1px solid rgba(212,168,67,.3);border-radius:8px">
          <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:700">Aguardando</div>
          <div style="font-size:18px;font-weight:700;color:var(--gold);margin-top:4px">${qtdAguardando}</div>

async function confirmarPedido(pedidoId) {
  try {
    await updateDoc(doc(dbPvd,'vendas_pedidos', pedidoId), { status: 'confirmado', confirmadoEm: serverTimestamp() });
    toast('Pagamento confirmado','ok');
    enviarEmailConfirmacao(pedidoId); // não bloqueia o fluxo
    upsertAlunoRecorrente(pedidoId); // se produto.recorrente, registra/atualiza aluno
  } catch(e) { toast('Erro: '+e.message,'err'); }
}

// Cria/atualiza doc em vendas_alunos pra produtos recorrentes (pilates, ninjutsu, curso desenvolvimento).
// Chave: produto_id__email_normalizado. Permite o vendas.html identificar alunos antigos via email.
async function upsertAlunoRecorrente(pedidoId) {
  try {
    await new Promise(r => setTimeout(r, 250));
    const p = S.pedidos.find(x => x.id === pedidoId);
    if (!p) return;
    const produto = S.produtos.find(x => x.id === p.produto_id);
    if (!produto?.recorrente) return;
    let email = (p.email || '').trim().toLowerCase();
    if (!email && p.filho_id) {
      const filho = (S.filhos||[]).find(f => f.id === p.filho_id)
                 || (S.consulentes||[]).find(c => c.id === p.filho_id);
      email = (filho?.auth_email || filho?.email || '').trim().toLowerCase();
    }
    if (!email) return; // sem email, sem cadastro de aluno
    const docId = `${p.produto_id}__${email.replace(/[^a-z0-9@._-]/g,'')}`;
    await setDoc(doc(dbPvd, 'vendas_alunos', docId), {
      produto_id: p.produto_id,
      produto_nome: produto.nome,
      produto_slug: produto.slug,
      email,
      nome: p.nome || '',
      tel: p.tel || '',
      ultimaCompraEm: serverTimestamp(),
      ultimoPedidoId: pedidoId
    }, { merge: true });
  } catch(e) {
    console.warn('Falha ao upsert aluno:', e?.message || e);
  }
}

// ── EMAIL DE CONFIRMAÇÃO ─────────────────────────────────────────────────
// Cloudflare Worker (grátis) → Resend (grátis 3000/mês) → email customizado
// pelo domínio próprio (ex: contato@terreirodocandieiro.com.br).
//
// Setup uma vez:
// 1. Resend.com: cria conta, adiciona domínio, configura DNS (SPF/DKIM)
// 2. Cloudflare Workers: deploy o código em worker/email-worker.js (instruções no README do worker)
// 3. Cria doc adm_config/email no Firestore com:
//    { enabled: true, worker_url: 'https://...', worker_secret: '...',
//      from: 'Terreiro <contato@terreirodocandieiro.com.br>',
//      reply_to: 'contato@terreirodocandieiro.com.br' }
let _emailCfg = null;

async function _carregarEmailCfg() {
  if (_emailCfg !== null) return _emailCfg;
  try {
    const snap = await getDoc(doc(dbPvd, 'adm_config', 'email'));
    _emailCfg = snap.exists() ? snap.data() : {};
  } catch(e) { _emailCfg = {}; }
  return _emailCfg;
}

async function enviarEmailConfirmacao(pedidoId) {
  try {
    // Pequeno delay pra o listener atualizar S.pedidos com o status novo
    await new Promise(r => setTimeout(r, 250));
    const p = S.pedidos.find(x => x.id === pedidoId);
    if (!p) return;
    // Email pode vir do pedido OU do filho vinculado (pedidos antigos / mensalidades não têm email salvo)
    let email = p.email;
    if (!email && p.filho_id) {
      const filho = (S.filhos||[]).find(f => f.id === p.filho_id)
                 || (S.consulentes||[]).find(c => c.id === p.filho_id);
      email = filho?.auth_email || filho?.email || null;
    }
    if (!email) {
      console.warn('Pedido sem email — pulando', {
        pedidoId, filho_id: p.filho_id, pedido_nome: p.nome,
        achou_filho: !!(S.filhos||[]).find(f => f.id === p.filho_id),
        achou_consulente: !!(S.consulentes||[]).find(c => c.id === p.filho_id)
      });
      return;
    }
    if (p.email_confirmacao_enviado_em) return; // idempotente

    const cfg = await _carregarEmailCfg();
    if (!cfg?.enabled) { console.warn('Email desativado (adm_config/email.enabled=false)'); return; }
    if (!cfg.worker_url || !cfg.worker_secret) {
      console.warn('Config de email incompleta — pulando (worker_url ou worker_secret)');
      return;
    }

    const produto = S.produtos.find(x => x.id === p.produto_id) || {};
    const subject = _emailConfirmacaoSubject(p, produto);
    const html = _buildEmailConfirmacaoHTML(p, produto);
    const text = _buildEmailConfirmacaoText(p, produto);

    const resp = await fetch(cfg.worker_url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Auth-Secret': cfg.worker_secret
      },
      body: JSON.stringify({
        to: email,
        to_name: p.nome || '',
        from: cfg.from || undefined,
        reply_to: cfg.reply_to || undefined,
        subject, html, text
      })
    });
    if (!resp.ok) {
      const errTxt = await resp.text().catch(() => '');
      throw new Error(`Worker retornou ${resp.status}: ${errTxt.slice(0,200)}`);
    }

    await updateDoc(doc(dbPvd, 'vendas_pedidos', pedidoId), {
      email_confirmacao_enviado_em: serverTimestamp()
    });
    toast('📧 Email enviado','ok');
  } catch(e) {
    console.warn('Falha ao enviar email:', e?.message || e);
    // Não bloqueia o fluxo do admin
  }
}

// Backfill: reenvia confirmação pra todos os pedidos confirmados sem email_confirmacao_enviado_em
async function reenviarEmailsPendentes() {
  const candidatos = (S.pedidos||[]).filter(p =>
    p.status === 'confirmado' && !p.email_confirmacao_enviado_em
  );
  if (candidatos.length === 0) { toast('Nenhum pedido pendente de email','ok'); return; }
  if (!confirm(`Reenviar email de confirmação pra ${candidatos.length} pedidos confirmados?\n\nVai disparar 1 a cada ~600ms (~${Math.ceil(candidatos.length*0.6)}s no total).\nPedidos sem email cadastrado serão pulados automaticamente.`)) return;

  let ok = 0, semEmail = 0, erro = 0;
  for (let i = 0; i < candidatos.length; i++) {
    const p = candidatos[i];
    const antes = p.email_confirmacao_enviado_em;
    try {
      await enviarEmailConfirmacao(p.id);
      // Confere se realmente enviou (a função pula silenciosamente quando sem email)
      const atualizado = S.pedidos.find(x => x.id === p.id);
      if (atualizado?.email_confirmacao_enviado_em && !antes) ok++;
      else semEmail++;
    } catch(e) {
      erro++;
      console.warn('Erro no pedido', p.id, e);
    }
    // Throttle pra não floodar Resend (free tier: 2 req/seg)
    await new Promise(r => setTimeout(r, 600));
    if (i % 5 === 0 && i > 0) toast(`📧 ${i+1}/${candidatos.length}...`,'ok');
  }
  toast(`✅ ${ok} enviados · ⏭️ ${semEmail} sem email · ❌ ${erro} erros`,'ok');
}

// Backfill: popula vendas_alunos a partir de todos os pedidos confirmados de produtos recorrentes.
// Usado uma vez, depois de marcar um produto como recorrente, pra trazer alunos antigos pro novo fluxo.
async function backfillAlunosRecorrentes() {
  const produtosRec = (S.produtos||[]).filter(x => x.recorrente);
  if (produtosRec.length === 0) { toast('Nenhum produto marcado como recorrente','err'); return; }
  const candidatos = (S.pedidos||[]).filter(p =>
    p.status === 'confirmado' && produtosRec.some(pr => pr.id === p.produto_id)
  );
  if (candidatos.length === 0) { toast('Nenhum pedido confirmado pra processar','ok'); return; }
  if (!confirm(`Vou processar ${candidatos.length} pedidos confirmados de ${produtosRec.length} produto(s) recorrente(s).\n\nProdutos: ${produtosRec.map(p=>p.nome).join(', ')}\n\nVai criar/atualizar docs em vendas_alunos. Idempotente — pode rodar de novo sem problema.`)) return;

  let ok = 0, semEmail = 0, erro = 0;
  for (let i = 0; i < candidatos.length; i++) {
    try {
      const p = candidatos[i];
      const antesEmail = p.email;
      await upsertAlunoRecorrente(p.id);
      // Confere se realmente conseguiu pegar email
      const filho = !antesEmail && p.filho_id ? ((S.filhos||[]).find(f=>f.id===p.filho_id) || (S.consulentes||[]).find(c=>c.id===p.filho_id)) : null;
      const teveEmail = !!antesEmail || !!(filho?.auth_email || filho?.email);
      if (teveEmail) ok++; else semEmail++;
    } catch(e) {
      erro++;
      console.warn('Erro no backfill:', candidatos[i]?.id, e);
    }
    await new Promise(r => setTimeout(r, 200));
    if (i % 10 === 0 && i > 0) toast(`📥 ${i+1}/${candidatos.length}...`,'ok');
  }
  toast(`✅ ${ok} alunos cadastrados · ⏭️ ${semEmail} sem email · ❌ ${erro} erros`,'ok');
}

function _emailConfirmacaoSubject(p, produto) {
  const isParcelado = produto?.parcelamento?.ativo && (p.parcelas_total||1) > 1;
  const isInscricao = produto?.turmas && produto.turmas.length > 0;
  const acao = isParcelado ? 'Matrícula confirmada' : (isInscricao ? 'Inscrição confirmada' : 'Pedido confirmado');
  return `${acao} — ${p.produto_nome || 'Terreiro do Candieiro'}`;
}

function _proximasParcelas(p, produto) {
  const total = Number(p.parcelas_total) || 1;
  if (total <= 1 || !produto?.parcelamento?.ativo) return [];
  const dia = Number(produto.parcelamento.vencimento_dia) || 10;
  const valor = Number(p.valor) || 0;
  const out = [];
  const hoje = new Date();
  // Próximo dia X — se hoje > dia X do mês atual, pula pro próximo mês
  let baseMes = hoje.getDate() > dia ? hoje.getMonth() + 1 : hoje.getMonth() + 1; // sempre próximo mês como 2ª parcela
  for (let i = 2; i <= total; i++) {
    const d = new Date(hoje.getFullYear(), baseMes + (i - 2), dia);
    out.push({
      n: i,
      data: d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' }),
      valor: valor.toFixed(2).replace('.', ',')
    });
  }
  return out;
}

async function reverterPedido(pedidoId) {
  if(!confirm('Desfazer confirmação? O pagamento volta pra "aguardando".')) return;
  try {
    await updateDoc(doc(dbPvd,'vendas_pedidos', pedidoId), { status: 'pendente' });
    toast('Revertido pra pendente','ok');
  } catch(e) { toast('Erro: '+e.message,'err'); }
}

async function marcarPagoSemPedido(produtoId, filhoId, filhoNome, valor) {
  const p = S.produtos.find(x => x.id === produtoId);
  if(!p) return;
  // Anti-duplicata: se já existe pedido pra esse filho+produto, atualiza em vez de criar novo
  const existente = (S.pedidos||[]).find(x =>
    x.produto_id === produtoId &&
    ((x.filho_id && x.filho_id === filhoId) || (!x.filho_id && _normNome(x.nome||'') === _normNome(filhoNome||'')))
  );
  if(existente) {
    if(existente.status === 'confirmado') { toast('Já está marcado como pago','ok'); return; }
    try {
      await updateDoc(doc(dbPvd,'vendas_pedidos', existente.id), {
        status: 'confirmado',
        confirmadoEm: serverTimestamp()
      });
      toast(`${filhoNome} marcado como pago`,'ok');
    } catch(e) { toast('Erro: '+e.message,'err'); }
    return;
  }
  if(!confirm(`Criar pedido já confirmado pra ${filhoNome}? Use isso quando o filho pagou fora do site (dinheiro / pix direto).`)) return;
  try {
    await addDoc(collection(dbPvd,'vendas_pedidos'), {
      produto_id: produtoId,
      produto_nome: p.nome,
      produto_slug: p.slug,
      filho_id: filhoId,
      nome: filhoNome,
      tel: '',
      valor: Number(valor) || 0,
      metodo: 'manual',
      status: 'confirmado',
      origem: 'admin_manual',
      criadoEm: serverTimestamp(),
      confirmadoEm: serverTimestamp()
    });
    toast(`${filhoNome} marcado como pago`,'ok');
  } catch(e) { toast('Erro: '+e.message,'err'); }
}

async function apagarTodasEscalas() {
  const total = S.escalas.length;
  if(total === 0) return;
  confirmar(`Apagar TODAS as <strong>${total}</strong> escala${total===1?'':'s'}? Isso é irreversível — você vai precisar gerar de novo. Atenção: vai esperar dupla confirmação.`, () => {
    confirmar(`Tem certeza MESMO? Vou apagar ${total} escala${total===1?'':'s'} agora.`, async () => {
      try {
        let ok = 0, err = 0;
        // copia local porque S.escalas vai mudando via onSnapshot
        const copia = [...S.escalas];
        for(const es of copia) {
          try { await deleteDoc(doc(dbPvd,'adm_escalas',es.id)); ok++; }
          catch(e) { err++; console.warn('falha ao apagar escala', es.id, e); }
        }
        toast(`${ok} escala${ok===1?'':'s'} apagada${ok===1?'':'s'}${err?` · ${err} com erro`:''}`, ok?'ok':'err');
      } catch(e) { toast('Erro: '+e.message,'err'); }
    });
  });
}

function setEscTab(t) { escTab = t; renderRoute(); }
function setAnalisePeriodo(p) { analisePeriodo = p; renderRoute(); }

function renderEscalasAnalise() {
  const body = $('#esc-body');
  const dias = analisePeriodo === 'mes' ? 30 : (analisePeriodo === 'bi' ? 60 : 90);
  const labelPeriodo = analisePeriodo === 'mes' ? '30 dias atrás + 30 à frente' : (analisePeriodo === 'bi' ? '60 dias atrás + 60 à frente' : '90 dias atrás + 90 à frente');
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const limPas = new Date(hoje); limPas.setDate(hoje.getDate() - dias);
  const limFut = new Date(hoje); limFut.setDate(hoje.getDate() + dias);
  const limPasStr = limPas.toISOString().slice(0,10);
  const limFutStr = limFut.toISOString().slice(0,10);

  // Conta alocações por filho, por função no período (passado + futuro)
  // Não filtra por tipo: inclui escalas sem `tipo` (legado) e qualquer tipo de gira/festa
  const escalasNoPeriodo = S.escalas.filter(es =>
    es.tipo !== 'lojinha' && // lojinha tem dinâmica própria, fora da análise
    es.data && es.data >= limPasStr && es.data <= limFutStr
  );
  const filhosAtivos = S.filhos.filter(f => !f.status || f.status === 'ativo');
  const funcoesAtivas = S.funcoes.filter(f => !f.arquivada && f.entra_em_escala);

  // Map: filho_id → { total, porFuncao: { funcao_id: count } }
  const stats = {};
  filhosAtivos.forEach(f => { stats[f.id] = { total: 0, porFuncao: {} }; });
  escalasNoPeriodo.forEach(es => {
    (es.alocacoes||[]).forEach(a => {
      if(!stats[a.filho_id]) stats[a.filho_id] = { total: 0, porFuncao: {} };
      stats[a.filho_id].total++;
      stats[a.filho_id].porFuncao[a.funcao_id] = (stats[a.filho_id].porFuncao[a.funcao_id]||0) + 1;
    });
  });

  // Estatísticas globais
  const totais = filhosAtivos.map(f => stats[f.id]?.total || 0);
  const totalGeral = totais.reduce((s,n)=>s+n, 0);
  const media = filhosAtivos.length ? totalGeral / filhosAtivos.length : 0;
  const maxAloc = Math.max(...totais, 1);

  // Limiares de desequilíbrio (50% acima ou abaixo da média)
  const tetoSobrecarga = media * 1.5;
  const pisoSubcarga = media * 0.5;

  // Ordena por mais escalado primeiro
  const filhosOrd = [...filhosAtivos].sort((a,b) => (stats[b.id]?.total||0) - (stats[a.id]?.total||0));

  const sobrecarregados = filhosOrd.filter(f => (stats[f.id]?.total||0) > tetoSobrecarga && (stats[f.id]?.total||0) > 1);
  const subcarregados = filhosOrd.filter(f => (stats[f.id]?.total||0) < pisoSubcarga && totalGeral > 0);

  const janelaAtual = S.cfgEscalas?.janela_semanas || 8;
  const maxMesAtual = S.cfgEscalas?.max_por_mes ?? 2;
  body.innerHTML = `
    <div class="card" style="margin-bottom:14px;border-color:var(--gold-bg)">
      <div class="card-h">
        <div class="card-title">⚖️ Janela do gerador de escalas</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px">
        <div style="font-size:13.5px;color:var(--text2);flex:1;min-width:240px">
          O gerador olha as últimas <strong style="color:var(--gold)">${janelaAtual} semanas</strong> de escalas pra balancear (quem foi escalado menos vezes vai primeiro).
        </div>
        <select class="fi" id="janela-sel" style="width:auto">
          <option value="4" ${janelaAtual===4?'selected':''}>4 semanas (1 mês)</option>
          <option value="8" ${janelaAtual===8?'selected':''}>8 semanas (2 meses) · padrão</option>
          <option value="12" ${janelaAtual===12?'selected':''}>12 semanas (3 meses)</option>
          <option value="24" ${janelaAtual===24?'selected':''}>24 semanas (6 meses)</option>
          <option value="52" ${janelaAtual===52?'selected':''}>52 semanas (1 ano)</option>
        </select>
      </div>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding-top:14px;border-top:1px solid var(--border)">
        <div style="font-size:13.5px;color:var(--text2);flex:1;min-width:240px">
          Cada filho pode ser escalado no <strong style="color:var(--gold)">máximo ${maxMesAtual} vez${maxMesAtual===1?'':'es'}</strong> no mesmo mês. Acima disso fica injusto.
        </div>
        <select class="fi" id="maxmes-sel" style="width:auto">
          <option value="0" ${maxMesAtual===0?'selected':''}>Sem limite</option>
          <option value="1" ${maxMesAtual===1?'selected':''}>1× / mês</option>
          <option value="2" ${maxMesAtual===2?'selected':''}>2× / mês · padrão</option>
          <option value="3" ${maxMesAtual===3?'selected':''}>3× / mês</option>
          <option value="4" ${maxMesAtual===4?'selected':''}>4× / mês</option>
        </select>
      </div>
    </div>

    <div class="card" style="margin-bottom:14px">
      <div class="card-h">
        <div class="card-title">Análise de equilíbrio</div>
        <div class="chips">
          <button type="button" class="chip ${analisePeriodo==='mes'?'chip-gold':''}" onclick="window._app.setAnalisePeriodo('mes')">Mensal</button>
          <button type="button" class="chip ${analisePeriodo==='bi'?'chip-gold':''}" onclick="window._app.setAnalisePeriodo('bi')">Bimestral</button>
          <button type="button" class="chip ${analisePeriodo==='tri'?'chip-gold':''}" onclick="window._app.setAnalisePeriodo('tri')">Trimestral</button>
        </div>
      </div>
      <div class="grid grid-3">

// ── PDF de escalas (limpeza + lojinha) pra compartilhar no grupo ──────────
async function gerarPdfEscalas(eventos) {
  const btn = $('#pdf-escalas-top');
  const txtOrig = btn?.textContent || '📄 PDF pra mandar no grupo';
  if(btn) { btn.disabled = true; btn.textContent = 'Gerando...'; }
  try {
    const mod = await import('https://cdn.jsdelivr.net/npm/jspdf@2.5.1/+esm');
    const { jsPDF } = mod;
    const pdf = new jsPDF({ unit:'mm', format:'a4' });
    const W = 210, H = 297, M = 18;
    let y = 0;

    // Paleta
    const C_GOLD     = [212,168,67];
    const C_GOLD_BG  = [250,243,224];
    const C_INK      = [25,22,18];
    const C_TEXT     = [50,45,38];
    const C_MUTED    = [140,128,108];
    const C_LINE     = [220,210,190];
    const C_RED      = [196,55,45];

    const ehGiraAberta = ev => (ev?.tipo === 'gira_aberta') || (ev?.publico === true && !ev?.tipo);
    const ehGiraFechada = ev => ev?.tipo === 'gira_fechada';
    const ehFestaEv = ev => ev?.tipo === 'festa' || /festa/i.test(ev?.nome||ev?.titulo||'');

    // ── HEADER GLOBAL (faixa dourada) ─────────────────────────────────
    pdf.setFillColor(...C_GOLD);
    pdf.rect(0, 0, W, 26, 'F');
    pdf.setFont('helvetica','bold').setFontSize(20).setTextColor(255,255,255);
    pdf.text('Escala dos próximos trabalhos', M, 14);
    pdf.setFont('helvetica','normal').setFontSize(10).setTextColor(255,255,255);
    const agora = new Date();
    pdf.text(
      `Terreiro do Candieiro · gerada em ${agora.toLocaleDateString('pt-BR')} às ${agora.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}`,
      M, 21
    );
    y = 36;

    // ── Sort + filtra eventos com ao menos uma alocação ───────────────
    const ordenados = [...eventos]
      .sort((a,b) => (a.data+(a.hora||'')).localeCompare(b.data+(b.hora||'')))
      .filter(ev => {
        const escs = S.escalas.filter(es => es.evento_id === ev.id);
        return escs.flatMap(e => e.alocacoes || []).length > 0;
      });

    if(ordenados.length === 0) {
      pdf.setFont('helvetica','italic').setFontSize(11).setTextColor(...C_MUTED);
      pdf.text('Nenhuma escala criada pros próximos trabalhos.', M, y);
    }

    const ordemFn = nm => {
      const n = (nm||'').toLowerCase();
      if(n.includes('antes')) return 1;
      if(n.includes('depois')) return 2;
      if(n.includes('lojinha')) return 3;
      if(n.includes('curimba')) return 4;
      if(n.includes('atend')) return 5;
      return 6;
    };

    // ── Por trabalho/gira ─────────────────────────────────────────────
    for(const ev of ordenados) {
      const escalas = S.escalas.filter(es => es.evento_id === ev.id);
      const alocs = escalas.flatMap(e => e.alocacoes || []);
      if(alocs.length === 0) continue;

      // Agrupa alocs por função
      const porFn = {};
      for(const a of alocs) {
        const fn = S.funcoes.find(f => f.id === a.funcao_id);
        if(!fn) continue;
        const filho = S.filhos.find(f => f.id === a.filho_id);
        if(!porFn[fn.nome]) porFn[fn.nome] = [];
        porFn[fn.nome].push(filho?.nome || '(filho removido)');
      }
      const fnsOrdenadas = Object.keys(porFn).sort((a,b) => {
        const da = ordemFn(a), db = ordemFn(b);
        return da !== db ? da - db : a.localeCompare(b);
      });

      // estima altura mínima do bloco antes de desenhar
      const fnsHeight = fnsOrdenadas.reduce((acc, fnNome) => {
        const nomesStr = porFn[fnNome].join(' · ');
        const linhas = pdf.splitTextToSize(nomesStr, W-(M*2)-10).length;
        return acc + 5 + (linhas * 4.2) + 2.5;
      }, 0);
      const blocoH = 18 + fnsHeight + 6;
      if(y + blocoH > H - 14) { pdf.addPage(); y = 18; }

      // ── Card do trabalho ─────────────────────────────────────────────
      // Faixa lateral colorida (vermelho = festa, dourado = gira_aberta, cinza = fechada/outro)
      const corFaixa = ehFestaEv(ev) ? C_RED : (ehGiraAberta(ev) ? C_GOLD : [120,110,90]);
      pdf.setFillColor(...corFaixa);
      pdf.rect(M-4, y-4, 2.5, blocoH-2, 'F');

      // Título do evento + data
      const dataObj = new Date(ev.data+'T00:00:00');
      const dia = String(dataObj.getDate()).padStart(2,'0');
      const mes = String(dataObj.getMonth()+1).padStart(2,'0');
      const dowFull = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'][dataObj.getDay()];
      const mesAb = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'][dataObj.getMonth()];

      // Data destacada à esquerda
      pdf.setFont('helvetica','bold').setFontSize(22).setTextColor(...corFaixa);
      pdf.text(dia, M, y+4);
      pdf.setFont('helvetica','normal').setFontSize(10).setTextColor(...C_MUTED);
      pdf.text(mesAb, M+12, y+1);
      pdf.setFont('helvetica','bold').setFontSize(9).setTextColor(...C_TEXT);
      pdf.text(dowFull, M+12, y+5);

      // Nome + hora à direita da data
      pdf.setFont('helvetica','bold').setFontSize(13).setTextColor(...C_INK);
      const nomeEv = (ev.nome || ev.titulo || 'Gira').toString();
      pdf.text(nomeEv, M+34, y);
      pdf.setFont('helvetica','normal').setFontSize(10).setTextColor(...C_MUTED);
      const horaStr = ev.hora ? `${ev.hora}` : '—';
      const tipoLabel = ehFestaEv(ev) ? 'Festa' : (ehGiraAberta(ev) ? 'Gira aberta' : (ehGiraFechada(ev) ? 'Gira fechada' : (ev.tipo||'').replace(/_/g,' ')||'Trabalho'));
      pdf.text(`${horaStr} · ${tipoLabel}`, M+34, y+5);

      y += 11;

      // Linha sutil separando header do conteúdo
      pdf.setDrawColor(...C_LINE).setLineWidth(0.3);
      pdf.line(M, y, W-M, y);
      y += 5;

      // ── Funções dentro do trabalho ──────────────────────────────────
      for(const fnNome of fnsOrdenadas) {
        const nomes = porFn[fnNome];
        // Label da função em chip dourado claro
        pdf.setFillColor(...C_GOLD_BG);
        pdf.roundedRect(M, y-3.5, pdf.getTextWidth(fnNome.toUpperCase())+6, 5, 1, 1, 'F');
        pdf.setFont('helvetica','bold').setFontSize(8).setTextColor(...C_GOLD);
        pdf.text(fnNome.toUpperCase(), M+3, y);
        y += 5;

        // Nomes
        pdf.setFont('helvetica','normal').setFontSize(10.5).setTextColor(...C_INK);
        const nomesStr = nomes.join(' · ');
        const linhas = pdf.splitTextToSize(nomesStr, W-(M*2)-4);
        for(const ln of linhas) {
          if(y > H - 14) { pdf.addPage(); y = 18; }
          pdf.text(ln, M+2, y);
          y += 4.2;
        }
        y += 2.5;
      }

      y += 6; // gap entre trabalhos
    }

    // ── Rodapé numeração ──────────────────────────────────────────────
    const total = pdf.internal.getNumberOfPages();
    for(let i=1; i<=total; i++) {
      pdf.setPage(i);
      pdf.setFont('helvetica','normal').setFontSize(8).setTextColor(...C_MUTED);
      pdf.text('Terreiro do Candieiro · terreirodocandieiro.com.br', M, H-8);
      pdf.text(`${i}/${total}`, W-M, H-8, { align:'right' });
    }

    const hoje = new Date().toISOString().slice(0,10);
    pdf.save(`escala-candieiro-${hoje}.pdf`);
    toast('PDF gerado','ok');
  } catch(e) {
    console.error(e);
    toast('Erro ao gerar PDF: '+e.message,'err');
  } finally {
    if(btn) { btn.disabled = false; btn.textContent = txtOrig; }
  }
}

// Gera escalas automáticas em lote (sem abrir modal)
// Helper: quantos filhos escalar pra uma função específica
function qtdParaFuncao(fn) {
  const n = (fn.nome||'').toLowerCase();
  if(n.includes('antes') || n.includes('depois')) return 4;
  if(n.includes('lojinha')) return 2;
  return 1;
}

// Festas ficam pra v2 — pulamos
function ehFesta(ev) {
  return (ev.nome||ev.titulo||'').toLowerCase().includes('festa') || ev.tipo === 'festa';
}

// Filtra funções aplicáveis a um evento específico:
// - Lojinha só em gira_aberta + festa
// - Limpezas só se ev.requer_limpeza !== false (default true)
function funcoesAplicaveisAoEvento(ev, funcoesAtivas) {
  // Eventos sem tipo definido (CMS antigo) tratamos como gira aberta
  const tipo = ev?.tipo || 'gira_aberta';
  const ehGiraAberta = tipo === 'gira_aberta' || (ev?.publico === true && !ev?.tipo);
  const ehFestaEv = tipo === 'festa' || ehFesta(ev);
  const aceitaLojinha = ehGiraAberta || ehFestaEv;
  const requerLimpeza = ev?.requer_limpeza !== false; // default true

  return funcoesAtivas.filter(fn => {
    const nome = (fn.nome||'').toLowerCase();
    if(nome.includes('lojinha') && !aceitaLojinha) return false;
    if(nome.includes('limpeza') && !requerLimpeza) return false;
    return true;
  });
}

async function gerarEscalasEmLote(eventos) {
  const elegiveis = eventos.filter(ev => !ehFesta(ev));
  const festas = eventos.length - elegiveis.length;
  if(elegiveis.length === 0) {
    toast(`Nenhuma escala pra gerar — todas as ${festas} são festas (fase 2)`,'err');
    return;
  }
  const msg = festas
    ? `Gerar ${elegiveis.length} escala${elegiveis.length===1?'':'s'}? <strong>${festas} festa${festas===1?'':'s'}</strong> ${festas===1?'será ignorada':'serão ignoradas'} (fase 2).<br>Limpezas antes/depois vão com 4 pessoas cada. Distribuição justa cruzando o mês inteiro.`
    : `Gerar ${elegiveis.length} escala${elegiveis.length===1?'':'s'}? Limpezas antes/depois vão com 4 pessoas cada. Distribuição justa ao longo do mês.`;
  confirmar(msg, async () => {
    const funcoesAtivas = S.funcoes.filter(f => !f.arquivada && f.entra_em_escala);
    const filhosAtivos = S.filhos.filter(f => !f.status || f.status === 'ativo');
    // Ordena por data pra distribuir cumulativamente
    const ordenados = [...elegiveis].sort((a,b) => a.data.localeCompare(b.data));
    const alocacoesPendentes = []; // alocações criadas nessa batch, alimentam contagem da próxima
    let geradas = 0, erros = 0;
    for(const ev of ordenados) {
      try {
        const funcoesDoEvento = funcoesAplicaveisAoEvento(ev, funcoesAtivas);
        const sug = gerarSugestaoBatch(ev, funcoesDoEvento, filhosAtivos, alocacoesPendentes);
        const alocacoes = [];
        Object.keys(sug).forEach(funcaoId => {
          sug[funcaoId].forEach(filhoId => {
            alocacoes.push({ funcao_id: funcaoId, filho_id: filhoId, status: 'escalado', notificado: false });
            // Marca pra contagem cumulativa nas próximas iterações
            alocacoesPendentes.push({ data: ev.data, evento_id: ev.id, filho_id: filhoId, funcao_id: funcaoId });
          });
        });
        if(alocacoes.length === 0) continue;
        await addDoc(collection(dbPvd,'adm_escalas'), {
          tipo: 'gira',
          evento_id: ev.id,
          periodo: null,
          data: ev.data,
          data_fim: null,
          alocacoes,
          status_geral: 'rascunho',
          geradoPor: 'automatico',
          criadoEm: serverTimestamp(),
          atualizadoEm: serverTimestamp()
        });
        geradas++;
      } catch(e) { console.error(e); erros++; }
    }
    toast(`${geradas} escala${geradas===1?'':'s'} gerada${geradas===1?'':'s'}${erros?` · ${erros} com erro`:''}${festas?` · ${festas} festa${festas===1?'':'s'} ignorada${festas===1?'':'s'}`:''}. Revise antes de divulgar.`, geradas?'ok':'err');
  });
}

// Versão batch da sugestão (sem closure de modal)
// `pendentes`: alocações já criadas em escalas dessa mesma batch — contam pra contagem
function gerarSugestaoBatch(ev, funcoesAtivas, filhosAtivos, pendentes=[]) {
  const mesEv = (ev.data||'').slice(0,7);
  const indispMap = {};
  S.disponibilidade.filter(d => d.mes === mesEv).forEach(d => { indispMap[d.filho_id] = d; });

  // Contagem da janela (passado E futuro) + alocações pendentes da batch atual
  // Antes só olhava o passado — escalas pré-existentes futuras eram invisíveis
  // e o mesmo filho podia cair em plantões próximos.
  const janelaSemanas = S.cfgEscalas?.janela_semanas || 8;
  const dataIni = new Date(ev.data+'T00:00:00'); dataIni.setDate(dataIni.getDate() - janelaSemanas*7);
  const dataFim = new Date(ev.data+'T00:00:00'); dataFim.setDate(dataFim.getDate() + janelaSemanas*7);
  const limStr = dataIni.toISOString().slice(0,10);
  const limFutStr = dataFim.toISOString().slice(0,10);
  const contagem = {};
  const contagemFn = {}; // por (filho, função) pra fairness por função
  S.escalas.filter(es => es.tipo === 'gira' && es.data >= limStr && es.data <= limFutStr && es.evento_id !== ev.id)
    .forEach(es => (es.alocacoes||[]).forEach(a => {
      contagem[a.filho_id] = (contagem[a.filho_id]||0) + 1;
      const k = `${a.filho_id}__${a.funcao_id}`;
      contagemFn[k] = (contagemFn[k]||0) + 1;
    }));
  // Soma pendentes (todas as datas da janela, exceto o próprio evento)
  pendentes.filter(p => p.data >= limStr && p.data <= limFutStr && p.evento_id !== ev.id).forEach(p => {
    contagem[p.filho_id] = (contagem[p.filho_id]||0) + 1;
    const k = `${p.filho_id}__${p.funcao_id}`;
    contagemFn[k] = (contagemFn[k]||0) + 1;
  });

  const tipoEsp = fn => {
    const n = (fn.nome||'').toLowerCase();
    if(n.includes('antes')) return 'longe';
    if(n.includes('depois')) return 'perto';
    return null;
  };

  // Contagem do mês do evento — pra limitar X escalas por filho por mês
  // (regra de justiça: ninguém escala demais)
  const maxPorMes = S.cfgEscalas?.max_por_mes ?? 2; // 0 = sem limite
  const contMes = {};
  if(maxPorMes > 0) {
    S.escalas
      .filter(es => es.tipo === 'gira' && (es.data||'').slice(0,7) === mesEv && es.evento_id !== ev.id)
      .forEach(es => (es.alocacoes||[]).forEach(a => {
        contMes[a.filho_id] = (contMes[a.filho_id]||0) + 1;
      }));
    pendentes.filter(p => (p.data||'').slice(0,7) === mesEv && p.evento_id !== ev.id).forEach(p => {
      contMes[p.filho_id] = (contMes[p.filho_id]||0) + 1;
    });
  }

  const usados = new Set();
  const sug = {};
  // Casas já alocadas neste evento — pra parear caronas dentro da mesma gira
  const casasNoEvento = new Set();
  funcoesAtivas.forEach(fn => {
    const qtd = qtdParaFuncao(fn);
    let elegiveis = (fn.restrito_a_filhos && fn.restrito_a_filhos.length>0)
      ? filhosAtivos.filter(f => fn.restrito_a_filhos.includes(f.id))
      : filhosAtivos;
    elegiveis = elegiveis.filter(f => {
      const d = indispMap[f.id];
      if(!d) return true;
      if(d.datas_indisponivel?.includes(ev.data)) return false;
      if(d.funcoes_indisponivel?.includes(fn.id)) return false;
      return true;
    });
    // Filhos isentos de limpeza não entram em escalas de limpeza
    const ehLimpeza = (fn.nome||'').toLowerCase().includes('limpeza');
    const ehDepois  = (fn.nome||'').toLowerCase().includes('depois');
    if(ehLimpeza) elegiveis = elegiveis.filter(f => !f.isento_limpeza);
    // Limpeza DEPOIS: só mora perto. Quem mora longe é hard-excluído.
    if(ehLimpeza && ehDepois) elegiveis = elegiveis.filter(f => f.mora_perto);
    // Cap: filhos que já bateram o teto mensal ficam fora
    if(maxPorMes > 0) elegiveis = elegiveis.filter(f => (contMes[f.id]||0) < maxPorMes);
    // CLT não entra em limpezas de dias úteis (seg-sex)
    const dow = new Date(ev.data+'T00:00:00').getDay();
    const ehDiaUtil = dow >= 1 && dow <= 5;
    if(ehLimpeza && ehDiaUtil) elegiveis = elegiveis.filter(f => !f.trabalha_clt);
    const tipoSp = tipoEsp(fn);
    elegiveis.sort((a,b) => {
      // 0. Boost: casa já no evento (caronas)
      const casa_a = a.casa_id && casasNoEvento.has(a.casa_id) ? 1 : 0;
      const casa_b = b.casa_id && casasNoEvento.has(b.casa_id) ? 1 : 0;
      if(casa_a !== casa_b) return casa_b - casa_a;
      // 1. Menos vezes nessa função específica (fairness por função)
      const cafn_a = contagemFn[`${a.id}__${fn.id}`] || 0;
      const cafn_b = contagemFn[`${b.id}__${fn.id}`] || 0;
      if(cafn_a !== cafn_b) return cafn_a - cafn_b;
      // 2. Menos vezes em qualquer função (rodízio geral)
      const ca = contagem[a.id] || 0, cb = contagem[b.id] || 0;
      if(ca !== cb) return ca - cb;
      // 3. Regra espacial
      if(tipoSp === 'perto') {
        const pa = a.mora_perto?1:0, pb = b.mora_perto?1:0;
        if(pa !== pb) return pb - pa;
      } else if(tipoSp === 'longe') {
        const pa = a.mora_perto?0:1, pb = b.mora_perto?0:1;
        if(pa !== pb) return pb - pa;
      }
      return Math.random() - 0.5;
    });
    const escolhidos = [];
    for(const f of elegiveis) {
      if(escolhidos.length >= qtd) break;
      if(usados.has(f.id)) continue;
      escolhidos.push(f.id);
      usados.add(f.id);
      if(f.casa_id) casasNoEvento.add(f.casa_id);
    }
    sug[fn.id] = escolhidos;
  });
  return sug;
}

function isoWeek(d) {
  const date = new Date(d);
  date.setHours(0,0,0,0);
  date.setDate(date.getDate() + 4 - (date.getDay()||7));
  const yearStart = new Date(date.getFullYear(),0,1);
  const wk = Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
  return `${date.getFullYear()}-W${String(wk).padStart(2,'0')}`;
}

function openLojinhaEscalaForm(periodoId, inicio, fim, escId='') {
  const esc = escId ? S.escalas.find(x=>x.id===escId) : null;
  const fnLojinha = S.funcoes.find(f => f.nome && f.nome.toLowerCase().includes('lojinha') && !f.arquivada);
  if(!fnLojinha) { toast('Função Lojinha não encontrada','err'); return; }
  const grupo = S.filhos.filter(f => (fnLojinha.restrito_a_filhos||[]).includes(f.id));

  const dias = [];
  const startD = new Date(inicio+'T00:00:00');
  const endD = new Date(fim+'T00:00:00');
  for(let d = new Date(startD); d <= endD; d.setDate(d.getDate()+1)) {
    dias.push({ data: d.toISOString().slice(0,10), label: d.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit'}) });
  }

  const alocByDia = {};
  (esc?.alocacoes||[]).forEach(a => {
    if(a.dia) {
      alocByDia[a.dia] = alocByDia[a.dia] || [];
      alocByDia[a.dia].push(a.filho_id);
    }
  });

  openModal(`
    <div class="modal-h"><h3>Plantão da lojinha — ${periodoId}</h3><button class="btn-close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="modal-c">
      <div style="color:var(--text3);font-size:13px;margin-bottom:14px">${fmt.dataLong(inicio)} até ${fmt.dataLong(fim)}</div>
      ${dias.map(d => `
        <div class="fi-group">
          <label style="text-transform:capitalize">${d.label} (${fmt.data(d.data)})</label>
          <div class="chips" id="lj-${d.data}">
            ${grupo.map(f => {
              const sel = (alocByDia[d.data]||[]).includes(f.id);
              return `<button type="button" class="chip ${sel?'chip-gold':''}" data-fid="${f.id}" data-dia="${d.data}" data-sel="${sel}" onclick="this.dataset.sel = this.dataset.sel==='true'?'false':'true'; this.classList.toggle('chip-gold')">${f.nome.split(' ')[0]}</button>`;
            }).join('')}
          </div>
        </div>
      `).join('')}
    </div>
    <div class="modal-f">
      ${esc?'<button class="btn btn-danger" id="lj-del">Excluir</button>':''}
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="lj-save">${esc?'Salvar':'Publicar plantão'}</button>
    </div>
  `, { lg: true });

  $('#lj-save').onclick = async () => {
    const alocacoes = [];
    dias.forEach(d => {
      $$(`#lj-${d.data} [data-sel="true"]`).forEach(b => {
        alocacoes.push({
          funcao_id: fnLojinha.id,
          filho_id: b.dataset.fid,
          dia: d.data,
          status: 'escalado',
          notificado: false
        });
      });
    });
    const data = {
      tipo: 'lojinha',
      periodo: periodoId,
      evento_id: null,
      data: inicio,
      data_fim: fim,
      alocacoes,
      status_geral: 'publicada',
      geradoPor: 'manual',
      atualizadoEm: serverTimestamp()
    };
    try {
      if(esc) await updateDoc(doc(dbPvd,'adm_escalas',escId), data);
      else { data.criadoEm = serverTimestamp(); await addDoc(collection(dbPvd,'adm_escalas'), data); }
      toast('Plantão salvo','ok');
      closeModal();
    } catch(e) { toast('Erro: '+e.message,'err'); }
  };

  if(esc) $('#lj-del').onclick = () => {
    confirmar('Excluir plantão dessa semana?', async () => {
      try { await deleteDoc(doc(dbPvd,'adm_escalas',escId)); toast('Plantão excluído','ok'); }
      catch(e) { toast('Erro: '+e.message,'err'); }
    });
  };
}

function openEscalaForm(evId, escId='') {
  const ev = S.eventos.find(x=>x.id===evId);
  const esc = escId ? S.escalas.find(x=>x.id===escId) : null;
  // Funções aplicáveis ao tipo de evento (lojinha só em gira_aberta/festa, limpezas só se requer_limpeza !== false)
  const todasAtivas = S.funcoes.filter(f => !f.arquivada && f.entra_em_escala);
  const funcoesAtivas = funcoesAplicaveisAoEvento(ev, todasAtivas);
  const funcoesExcluidas = todasAtivas.filter(f => !funcoesAtivas.includes(f));
  const filhosAtivos = S.filhos.filter(f => !f.status || f.status==='ativo');

  // pega mes do evento pra checar disponibilidade
  const mesEv = (ev.data||'').slice(0,7);
  const indispMap = {};
  S.disponibilidade.filter(d => d.mes === mesEv).forEach(d => {
    indispMap[d.filho_id] = d;
  });

  // Contagem da janela histórica E FUTURA (configurável) — rodízio justo
  // Olhamos tanto passado quanto futuro pra evitar duplicar gente já alocada
  // em escalas futuras quando o admin regera uma escala isolada.
  const janelaSemanas = S.cfgEscalas?.janela_semanas || 8;
  const dataIni = new Date(ev.data+'T00:00:00'); dataIni.setDate(dataIni.getDate() - janelaSemanas*7);
  const dataFim = new Date(ev.data+'T00:00:00'); dataFim.setDate(dataFim.getDate() + janelaSemanas*7);
  const limStr = dataIni.toISOString().slice(0,10);
  const limFutStr = dataFim.toISOString().slice(0,10);
  // Inclui todas as escalas na janela, EXCETO a própria escala (esc) que tá
  // sendo regerada — caso contrário a contagem incluiria as alocações que
  // estamos prestes a substituir.
  const escNaJanela = S.escalas.filter(es =>
    es.tipo === 'gira'
    && es.data >= limStr && es.data <= limFutStr
    && (!esc || es.id !== esc.id)
  );
  const contagem = {};
  escNaJanela.forEach(es => (es.alocacoes||[]).forEach(a => {
    contagem[a.filho_id] = (contagem[a.filho_id]||0) + 1;
  }));

  const alocPreenchidas = {};
  (esc?.alocacoes||[]).forEach(a => {
    alocPreenchidas[a.funcao_id] = alocPreenchidas[a.funcao_id] || [];
    alocPreenchidas[a.funcao_id].push(a.filho_id);
  });

  // Detecta regra espacial pela função:
  // - "antes" no nome → prefere mora_longe (eles chegam cedo, não precisam voltar)
  // - "depois" no nome → prefere mora_perto (não pegam BR à noite)
  // - resto → sem preferência espacial
  function tipoEspacial(fn) {
    const n = (fn.nome||'').toLowerCase();
    if(n.includes('antes')) return 'longe';
    if(n.includes('depois')) return 'perto';
    return null;
  }

  // Contagem por (filho, função) pra fairness por função
  const contagemFn = {};
  escNaJanela.forEach(es => (es.alocacoes||[]).forEach(a => {
    const k = `${a.filho_id}__${a.funcao_id}`;
    contagemFn[k] = (contagemFn[k]||0) + 1;
  }));

  // Gerador automático: pra cada função, escolhe N candidatos
  // Critério: casa já no evento → menos vezes na função → rodízio geral → espacial → random
  function gerarSugestao() {
    const usados = new Set();
    const sug = {};
    // Casas (grupos de moradia) já alocadas neste evento — pra parear caronas
    const casasNoEvento = new Set();
    // Contagem do mês — pra cap mensal (justiça). Inclui todas as outras
    // escalas no mês, excluindo a própria que tá sendo regerada.
    const mesEvSt = (ev.data||'').slice(0,7);
    const maxPorMes = S.cfgEscalas?.max_por_mes ?? 2;
    const contMes = {};
    if(maxPorMes > 0) {
      S.escalas
        .filter(es => es.tipo === 'gira' && (es.data||'').slice(0,7) === mesEvSt && (!esc || es.id !== esc.id))
        .forEach(es => (es.alocacoes||[]).forEach(a => {
          contMes[a.filho_id] = (contMes[a.filho_id]||0) + 1;
        }));
    }
    funcoesAtivas.forEach(fn => {
      const qtd = qtdParaFuncao(fn);
      let elegiveis = (fn.restrito_a_filhos && fn.restrito_a_filhos.length>0)
        ? filhosAtivos.filter(f => fn.restrito_a_filhos.includes(f.id))
        : filhosAtivos;
      elegiveis = elegiveis.filter(f => {
        const d = indispMap[f.id];
        if(!d) return true;
        if(d.datas_indisponivel?.includes(ev.data)) return false;
        if(d.funcoes_indisponivel?.includes(fn.id)) return false;
        return true;
      });
      // Filhos isentos de limpeza não entram em escalas de limpeza
      const ehLimpeza = (fn.nome||'').toLowerCase().includes('limpeza');
      const ehDepois  = (fn.nome||'').toLowerCase().includes('depois');
      if(ehLimpeza) elegiveis = elegiveis.filter(f => !f.isento_limpeza);
      // Limpeza DEPOIS: só mora perto entra. Quem mora longe é hard-excluído.
      if(ehLimpeza && ehDepois) elegiveis = elegiveis.filter(f => f.mora_perto);
      // CLT não entra em limpezas de dias úteis (seg-sex) — horário comercial conflita
      const dow = new Date(ev.data+'T00:00:00').getDay();
      const ehDiaUtil = dow >= 1 && dow <= 5;
      if(ehLimpeza && ehDiaUtil) elegiveis = elegiveis.filter(f => !f.trabalha_clt);
      // Cap mensal — filho que já bateu o teto fica fora
      if(maxPorMes > 0) elegiveis = elegiveis.filter(f => (contMes[f.id]||0) < maxPorMes);
      const tipoSp = tipoEspacial(fn);
      elegiveis.sort((a,b) => {
        // 0. Boost: casa já presente no evento (economia de carona)
        const casa_a = a.casa_id && casasNoEvento.has(a.casa_id) ? 1 : 0;
        const casa_b = b.casa_id && casasNoEvento.has(b.casa_id) ? 1 : 0;
        if(casa_a !== casa_b) return casa_b - casa_a;
        // 1. Fairness por função
        const cafn_a = contagemFn[`${a.id}__${fn.id}`] || 0;
        const cafn_b = contagemFn[`${b.id}__${fn.id}`] || 0;
        if(cafn_a !== cafn_b) return cafn_a - cafn_b;
        // 2. Rodízio geral
        const ca = contagem[a.id] || 0, cb = contagem[b.id] || 0;
        if(ca !== cb) return ca - cb;
        // 3. Regra espacial (já não importa pra limpeza depois — todos são perto)
        if(tipoSp === 'perto') {
          const pa = a.mora_perto?1:0, pb = b.mora_perto?1:0;
          if(pa !== pb) return pb - pa;
        } else if(tipoSp === 'longe') {
          const pa = a.mora_perto?0:1, pb = b.mora_perto?0:1;
          if(pa !== pb) return pb - pa;
        }
        return Math.random() - 0.5;
      });
      const escolhidos = [];
      for(const f of elegiveis) {
        if(escolhidos.length >= qtd) break;
        if(usados.has(f.id)) continue;
        escolhidos.push(f.id);
        usados.add(f.id);
        if(f.casa_id) casasNoEvento.add(f.casa_id);
      }
      sug[fn.id] = escolhidos;
    });
    return sug;
  }

  // Bloqueia geração se for festa
  const eventoEhFesta = ehFesta(ev);

  // Se está criando nova escala (e não é festa), já pré-sugere automático
  if(!esc && !eventoEhFesta) {
    const sugestao = gerarSugestao();
    Object.keys(sugestao).forEach(fId => alocPreenchidas[fId] = sugestao[fId]);
  }

  // Lista indisponíveis pra esse dia (pra mostrar transparência ao admin)
  const indispNesseDia = filhosAtivos.filter(f => {
    const d = indispMap[f.id];
    return d && d.datas_indisponivel?.includes(ev.data);
  });

  openModal(`
    <div class="modal-h"><h3>${esc?'Editar escala':'Criar escala'} — ${ev.nome||ev.titulo}</h3><button class="btn-close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="modal-c">
      <div style="color:var(--text3);font-size:13px;margin-bottom:10px">${fmt.dataLong(ev.data)} · ${ev.hora||'—'}</div>
      ${indispNesseDia.length > 0 ? `<div style="background:var(--red-bg);border:1px solid var(--red-bd);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px"><strong style="color:var(--red)">${indispNesseDia.length} filho${indispNesseDia.length===1?'':'s'} marcou indisponibilidade nesse dia:</strong> <span style="color:var(--text2)">${indispNesseDia.map(f=>f.nome.split(' ')[0]).join(', ')}</span><br><span style="color:var(--text3);font-size:12px">Eles não aparecem como sugestão e ficam desabilitados nos chips abaixo.</span></div>` : '<div style="background:var(--green-bg);border:1px solid var(--green-bd);border-radius:8px;padding:8px 14px;margin-bottom:14px;font-size:12px;color:var(--green)">✓ Nenhum filho marcou indisponibilidade nesse dia.</div>'}
      ${eventoEhFesta ? '<div style="background:rgba(155,89,182,0.1);border:1px solid rgba(155,89,182,0.3);border-radius:8px;padding:12px 14px;margin-bottom:14px;font-size:13px;color:var(--purple)">🎉 <strong>Festa</strong> — escalas de festa têm dinâmica diferente e ficam pra v2. Você ainda pode escalar manualmente abaixo, mas o auto-gerar está desativado.</div>' : ''}
      ${funcoesExcluidas.length > 0 ? `<div style="background:var(--glass2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12.5px;color:var(--text3)"><strong style="color:var(--text2)">Funções não aplicáveis a esse evento:</strong> ${funcoesExcluidas.map(f=>f.nome).join(', ')}<br><span style="color:var(--text3);font-size:11.5px">${(ev?.requer_limpeza===false?'Marcado como "não requer limpeza" no evento. ':'')}${funcoesExcluidas.some(f=>(f.nome||'').toLowerCase().includes('lojinha'))?'Lojinha só em gira aberta ou festa.':''}</span></div>` : ''}
      ${funcoesAtivas.length === 0 ? '<div class="empty"><div class="empty-s">Nenhuma função cadastrada. Crie em Funções primeiro.</div></div>' : funcoesAtivas.map(fn => {
        const idDispLog = `e-${fn.id}`;
        // Função restrita → só os elegíveis do grupo. Senão, TODOS os ativos.
        let elegiveis = (fn.restrito_a_filhos && fn.restrito_a_filhos.length>0)
          ? filhosAtivos.filter(f => fn.restrito_a_filhos.includes(f.id))
          : filhosAtivos;
        // Hard-excluir mora-longe e isentos pra limpeza (e perto pra limpeza depois)
        const ehLimpezaFn = (fn.nome||'').toLowerCase().includes('limpeza');
        const ehDepoisFn = (fn.nome||'').toLowerCase().includes('depois');
        if(ehLimpezaFn) elegiveis = elegiveis.filter(f => !f.isento_limpeza);
        if(ehLimpezaFn && ehDepoisFn) elegiveis = elegiveis.filter(f => f.mora_perto);
        // CLT não entra em limpezas de dias úteis
        const dowPicker = new Date(ev.data+'T00:00:00').getDay();
        const ehDiaUtilPicker = dowPicker >= 1 && dowPicker <= 5;
        if(ehLimpezaFn && ehDiaUtilPicker) elegiveis = elegiveis.filter(f => !f.trabalha_clt);
        const tipoSp = tipoEspacial(fn);
        // Ordena por regra espacial pra os preferidos aparecerem primeiro
        if(tipoSp === 'perto') elegiveis = [...elegiveis].sort((a,b) => (b.mora_perto?1:0) - (a.mora_perto?1:0));
        else if(tipoSp === 'longe') elegiveis = [...elegiveis].sort((a,b) => (a.mora_perto?1:0) - (b.mora_perto?1:0));
        const restrita = fn.restrito_a_filhos && fn.restrito_a_filhos.length>0;
        const qtdAlvo = qtdParaFuncao(fn);
        const dicaQtd = qtdAlvo > 1 ? `<span style="font-size:11px;color:var(--text3);margin-left:6px">(${qtdAlvo} pessoas)</span>` : '';
        const dicaSp = tipoSp === 'perto' ? '<span style="font-size:11px;color:var(--text3);margin-left:6px">🏠 prefira mora perto</span>' : (tipoSp === 'longe' ? '<span style="font-size:11px;color:var(--text3);margin-left:6px">🏃 prefira mora longe</span>' : '');
        return `
        <div class="fi-group">
          <label>${fn.nome} ${restrita?`<span class="chip chip-purple" style="font-size:10px;margin-left:6px">restrita · ${elegiveis.length}</span>`:''}${dicaQtd}${dicaSp}</label>
          <div class="chips" id="${idDispLog}">
            ${elegiveis.length===0 ? '<span style="color:var(--text3);font-size:12px">Nenhum filho elegível pra essa função</span>' : elegiveis.map(f => {
              const sel = (alocPreenchidas[fn.id]||[]).includes(f.id);
              const indisp = indispMap[f.id];
              const indispDay = indisp && indisp.datas_indisponivel?.includes(ev.data);
              const indispFunc = indisp && indisp.funcoes_indisponivel?.includes(fn.id);
              const disabled = indispDay || indispFunc;
              // Destaca conforme regra espacial
              const destaca = tipoSp === 'perto' ? f.mora_perto : (tipoSp === 'longe' ? !f.mora_perto : false);
              const titleMsg = disabled
                ? (indispDay?'Indisponível esse dia':'Recusou essa função no mês')
                : (destaca ? (tipoSp === 'perto' ? 'Mora perto · prioridade pra essa função' : 'Mora longe · prioridade pra essa função') : '');
              const cssClass = sel ? 'chip-gold' : (destaca ? 'chip-green' : '');
              const emoji = destaca ? (tipoSp === 'perto' ? '🏠 ' : '🏃 ') : '';
              // Contagem na janela histórica — total geral e por função
              const cntTotal = contagem[f.id] || 0;
              const cntFn = contagemFn[`${f.id}__${fn.id}`] || 0;
              const tituloFinal = titleMsg + (cntTotal>0?` · escalado ${cntTotal}× no total (${cntFn}× nessa função) nas últimas ${janelaSemanas} sem`:` · nunca escalado nas últimas ${janelaSemanas} sem`);
              const sufixo = cntFn > 0 ? ` <span style="opacity:.6;font-size:10px">${cntFn}×</span>` : '';
              return `<button type="button" class="chip ${cssClass}" title="${tituloFinal}" style="${disabled?'opacity:.35;cursor:not-allowed':''}" data-fid="${f.id}" data-fnid="${fn.id}" data-sel="${sel}" ${disabled?'disabled':''} onclick="if(this.disabled)return; this.dataset.sel = this.dataset.sel==='true'?'false':'true'; this.classList.toggle('chip-gold');this.classList.remove('chip-green')">${emoji}${f.nome.split(' ')[0]}${sufixo}</button>`;
            }).join('')}
          </div>
        </div>
        `;
      }).join('')}
      <div style="color:var(--text3);font-size:11px">esmaecidos = indisponíveis no mês · 🏠 mora perto · 🏃 mora longe</div>
    </div>
    <div class="modal-f">
      ${esc?'<button class="btn btn-danger" id="es-del">Excluir</button>':''}
      <button class="btn" id="es-auto" title="Limpa seleção atual e gera de novo">🔄 Gerar automático</button>
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="es-save">${esc?'Salvar':'Publicar escala'}</button>
    </div>
  `, { lg: true });

  // botão "Gerar automático" — regera e remarca chips
  $('#es-auto').onclick = () => {
    if(eventoEhFesta) { toast('Festas ficam pra v2 — escale manual','err'); return; }
    const sugestao = gerarSugestao();
    funcoesAtivas.forEach(fn => {
      $$(`#e-${fn.id} [data-fid]`).forEach(b => {
        const filhoId = b.dataset.fid;
        const ehSugerido = (sugestao[fn.id]||[]).includes(filhoId);
        b.dataset.sel = ehSugerido ? 'true' : 'false';
        b.classList.toggle('chip-gold', ehSugerido);
      });
    });
    toast('Escala regerada · ajuste se quiser','ok');
  };

  $('#es-save').onclick = async () => {
    const alocacoes = [];
    funcoesAtivas.forEach(fn => {
      $$(`#e-${fn.id} [data-sel="true"]`).forEach(b => {
        alocacoes.push({
          funcao_id: fn.id,
          filho_id: b.dataset.fid,
          status: 'escalado',
          notificado: false
        });
      });
    });
    const data = {
      tipo: 'gira',
      evento_id: evId,
      periodo: null,
      data: ev.data,
      data_fim: null,
      alocacoes,
      status_geral: 'publicada',
      geradoPor: 'manual',
      atualizadoEm: serverTimestamp()
    };
    try {
      if(esc) {
        await updateDoc(doc(dbPvd,'adm_escalas',escId), data);
      } else {
        data.criadoEm = serverTimestamp();
        await addDoc(collection(dbPvd,'adm_escalas'), data);
      }
      toast('Escala salva','ok');
      closeModal();
    } catch(e) { toast('Erro: '+e.message,'err'); }
  };

  if(esc) $('#es-del').onclick = () => {
    confirmar('Excluir esta escala?', async () => {
      try { await deleteDoc(doc(dbPvd,'adm_escalas',escId)); toast('Escala excluída','ok'); }
      catch(e) { toast('Erro: '+e.message,'err'); }
    });
  };
}
