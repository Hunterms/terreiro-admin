}

function _renderIntelProdutos(pessoas) {
  const produtos = {};
  pessoas.forEach(p => {
    p.interacoes.filter(i => i.pago).forEach(i => {
      if (!produtos[i.label]) produtos[i.label] = { nome: i.label, unidades: 0, receita: 0, pessoasIds: new Set(), tipo: i.type };
      produtos[i.label].unidades += 1;
      produtos[i.label].receita += i.valor;
      produtos[i.label].pessoasIds.add(p.key);
    });
  });
  const lista = Object.values(produtos);
  const topReceita = [...lista].sort((a,b)=>b.receita-a.receita).slice(0,10);
  const topUnidades = [...lista].sort((a,b)=>b.unidades-a.unidades).slice(0,10);

  const totalAtend = pessoas.reduce((s,p)=>s+p.valorAtendimentos,0);
  const totalCursos = pessoas.reduce((s,p) => s + p.interacoes.filter(i => i.type==='pedido' && i.pago && i.categoria !== 'evento_filho').reduce((a,i)=>a+i.valor,0), 0);
  const totalEvFilho = pessoas.reduce((s,p) => s + p.interacoes.filter(i => i.type==='pedido' && i.pago && i.categoria === 'evento_filho').reduce((a,i)=>a+i.valor,0), 0);
  const totalGeral = totalAtend + totalCursos + totalEvFilho;

  // Co-ocorrência
  const pares = {};
  pessoas.forEach(p => {
    const labels = [...new Set(p.interacoes.filter(i => i.pago).map(i => i.label))];
    if (labels.length < 2) return;
    for (let i=0; i<labels.length; i++) for (let j=i+1; j<labels.length; j++) {
      const key = [labels[i], labels[j]].sort().join(' + ');
      pares[key] = (pares[key]||0) + 1;
    }
  });
  const topPares = Object.entries(pares).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Temas (de atendimentos)
  const temas = {};
  const temaLabel = { amor:'💕 Amor', saude:'🌿 Saúde', familia:'👨‍👩‍👧 Família', financeiro:'💰 Financeiro', luto:'🕯️ Luto', orientacao:'🧭 Orientação', outro:'Outro' };
  pessoas.forEach(p => p.interacoes.filter(i => i.type==='atendimento' && i.pago && i.tema).forEach(i => {
    temas[i.tema] = (temas[i.tema]||0) + 1;
  }));
  const topTemas = Object.entries(temas).sort((a,b)=>b[1]-a[1]);

  $('#intel-body').innerHTML = `
    ${totalGeral > 0 ? `
      <div class="card" style="margin-bottom:14px">
        <div class="card-h"><div class="card-title">Mix de receita por canal</div></div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px">
          <div style="padding:14px;background:var(--gold-bg);border:1px solid rgba(212,168,67,.3);border-radius:8px">
            <div style="font-size:10.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:700">Atendimentos</div>
            <div style="font-size:22px;font-weight:700;color:var(--gold);margin-top:4px">R$ ${totalAtend.toFixed(0)}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px">${((totalAtend/totalGeral)*100).toFixed(0)}% do total</div>
          </div>
          <div style="padding:14px;background:rgba(52,152,219,.08);border:1px solid rgba(52,152,219,.25);border-radius:8px">
            <div style="font-size:10.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:700">Cursos / produtos</div>
            <div style="font-size:22px;font-weight:700;color:#3498db;margin-top:4px">R$ ${totalCursos.toFixed(0)}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px">${((totalCursos/totalGeral)*100).toFixed(0)}% do total</div>
          </div>
          <div style="padding:14px;background:var(--green-bg);border:1px solid var(--green-bd);border-radius:8px">
            <div style="font-size:10.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:700">Eventos pros filhos</div>
            <div style="font-size:22px;font-weight:700;color:var(--green);margin-top:4px">R$ ${totalEvFilho.toFixed(0)}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px">${((totalEvFilho/totalGeral)*100).toFixed(0)}% do total</div>
          </div>
        </div>
      </div>
    ` : ''}

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px">
      <div class="card">
        <div class="card-h"><div class="card-title">Top por receita</div></div>
        ${topReceita.length === 0 ? '<div class="empty"><div class="empty-s">Sem dados.</div></div>' : topReceita.map((p,idx) => `
          <div class="list-item">
            <div class="li-avatar" style="background:var(--gold-bg);color:var(--gold);font-size:12px">${idx+1}</div>
            <div class="li-main">
              <div class="li-name">${p.nome}</div>
              <div class="li-meta"><span>${p.unidades} venda${p.unidades===1?'':'s'} · ${p.pessoasIds.size} pessoa${p.pessoasIds.size===1?'':'s'}</span></div>
            </div>
            <div style="font-size:15px;font-weight:700;color:var(--gold)">R$ ${p.receita.toFixed(0)}</div>
          </div>
        `).join('')}
      </div>

      <div class="card">
        <div class="card-h"><div class="card-title">Top por volume</div></div>
        ${topUnidades.length === 0 ? '<div class="empty"><div class="empty-s">Sem dados.</div></div>' : topUnidades.map((p,idx) => `
          <div class="list-item">
            <div class="li-avatar" style="background:var(--gold-bg);color:var(--gold);font-size:12px">${idx+1}</div>
            <div class="li-main">
              <div class="li-name">${p.nome}</div>
              <div class="li-meta"><span>R$ ${p.receita.toFixed(0)} · ${p.pessoasIds.size} pessoa${p.pessoasIds.size===1?'':'s'}</span></div>
            </div>
            <div style="font-size:15px;font-weight:700;color:var(--text)">${p.unidades}</div>
          </div>
        `).join('')}
      </div>
    </div>

    ${topPares.length > 0 ? `
      <div class="card" style="margin-top:14px">
        <div class="card-h"><div class="card-title">Co-ocorrência — comprados em conjunto</div></div>
        ${topPares.map(([par, count]) => `
          <div class="list-item">
            <div class="li-main">
              <div class="li-name">${par}</div>
              <div class="li-meta"><span>${count} pessoa${count===1?'':'s'} compraram ambos</span></div>
            </div>
          </div>
        `).join('')}
        <div style="font-size:12.5px;color:var(--text2);margin-top:10px;padding:10px 12px;background:var(--glass2);border-left:3px solid var(--gold);border-radius:6px;line-height:1.5">
          💡 Pares fortes podem virar pacotes/combos com desconto pra acelerar conversão.
        </div>
      </div>
    ` : ''}

    ${topTemas.length > 0 ? `
      <div class="card" style="margin-top:14px">
        <div class="card-h"><div class="card-title">Temas das consultas</div></div>
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          ${topTemas.map(([t, count]) => `
            <div style="padding:10px 14px;background:var(--glass2);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;gap:8px">
              <span style="font-size:14px">${temaLabel[t]||t}</span>
              <span style="font-size:13px;font-weight:700;color:var(--gold)">${count}</span>
            </div>
          `).join('')}
        </div>
        <div style="font-size:12.5px;color:var(--text2);margin-top:10px;padding:10px 12px;background:var(--glass2);border-left:3px solid var(--gold);border-radius:6px;line-height:1.5">
          💡 Tema com demanda alta pode virar oferta dedicada (curso, festa temática, palestra).
        </div>
      </div>
    ` : '<div class="card" style="margin-top:14px"><div class="empty"><div class="empty-t">Nenhum tema marcado ainda</div><div class="empty-s">Marque o tema da consulta no form de atendimento pra desbloquear análise de demanda por tema.</div></div></div>'}
  `;
}

function _renderIntelOportunidades(pessoas) {
  const opps = [];
  const hoje90ISO = (() => { const d = new Date(); d.setDate(d.getDate()-90); return d.toISOString().slice(0,10); })();
  const dormentes = pessoas.filter(p => p.ultimaData && p.ultimaData < hoje90ISO && p.valorTotal >= 100);
  if (dormentes.length > 0) {
    const acc = dormentes.reduce((s,p)=>s+p.valorTotal, 0);
    opps.push({
      icon:'🔁', tone:'gold',
      titulo:`Reativar ${dormentes.length} dormente${dormentes.length===1?'':'s'} de valor`,
      evidencia:`Histórico acumulado deles: R$ ${acc.toFixed(0)}. Sem aparecer há 3+ meses.`,
      acao:'Mensagem pessoal no WhatsApp perguntando como estão. Mencione uma novidade da casa (festa, curso novo).',
      conv:'15-25%',
      potencial: acc * 0.2
    });
  }

  const crossConsulta = pessoas.filter(p => p.qtdPedidosPagos > 0 && p.qtdAtendimentosPagos === 0);
  const todasConsultas = pessoas.flatMap(p => p.interacoes.filter(i => i.type==='atendimento' && i.pago));
  if (crossConsulta.length > 0 && todasConsultas.length > 0) {
    const tkt = todasConsultas.reduce((s,i)=>s+i.valor,0) / todasConsultas.length;
    opps.push({
      icon:'🎯', tone:'blue',
      titulo:`${crossConsulta.length} compradores nunca consultaram com Pai`,
      evidencia:`Ticket médio histórico de consulta: R$ ${tkt.toFixed(0)}. Já conhecem a casa, conversão tende a ser melhor.`,
      acao:'Pitch direto pós-compra. WhatsApp ou email: "Que tal aprofundar com Pai Nando em uma consulta?"',
      conv:'20-30%',
      potencial: crossConsulta.length * tkt * 0.25
    });
  }

  const crossProduto = pessoas.filter(p => p.qtdAtendimentosPagos > 0 && p.qtdPedidosPagos === 0);
  const todosProdutos = pessoas.flatMap(p => p.interacoes.filter(i => i.type==='pedido' && i.pago));
  if (crossProduto.length > 0 && todosProdutos.length > 0) {
    const tkt = todosProdutos.reduce((s,i)=>s+i.valor,0) / todosProdutos.length;
    opps.push({
      icon:'📦', tone:'green',
      titulo:`${crossProduto.length} consulentes nunca compraram produto`,
      evidencia:`Ticket médio histórico de pedido: R$ ${tkt.toFixed(0)}. Bons candidatos pra cursos ou festas.`,
      acao:'Sugira produto correlato ao tema da consulta. Use o WhatsApp pra abordagem pessoal.',
      conv:'10-20%',
      potencial: crossProduto.length * tkt * 0.15
    });
  }

  // Bundle opps
  const pares = {};
  pessoas.forEach(p => {
    const labels = [...new Set(p.interacoes.filter(i => i.pago).map(i => i.label))];
    if (labels.length < 2) return;
    for (let i=0; i<labels.length; i++) for (let j=i+1; j<labels.length; j++) {
      const key = [labels[i], labels[j]].sort().join(' + ');
      pares[key] = (pares[key]||0) + 1;
    }
  });
  const fortes = Object.entries(pares).filter(([_,c]) => c >= 3).sort((a,b)=>b[1]-a[1]);
  fortes.slice(0,3).forEach(([par, count]) => {
    opps.push({
      icon:'📦', tone:'blue',
      titulo:`Bundle ${par}`,
      evidencia:`${count} pessoas compraram os 2 separadamente — demanda natural pelo combo.`,
      acao:`Criar produto combo "${par}" com 10-15% off. Audiência alvo já conhece os dois lados.`,
      conv:'20-40%',
      potencial: 0
    });
  });

  // Tema dominante
  const temas = {};
  pessoas.forEach(p => p.interacoes.filter(i => i.type==='atendimento' && i.tema && i.pago).forEach(i => {
    temas[i.tema] = (temas[i.tema]||0) + 1;
  }));
  const topTema = Object.entries(temas).sort((a,b)=>b[1]-a[1])[0];
  if (topTema && topTema[1] >= 5) {
    const labelMap = { amor:'amor / relacionamento', saude:'saúde', familia:'família', financeiro:'financeiro / trabalho', luto:'luto', orientacao:'orientação espiritual' };
    opps.push({
      icon:'🌱', tone:'green',
      titulo:`Tema dominante: ${labelMap[topTema[0]]||topTema[0]} (${topTema[1]} consultas)`,
      evidencia:`Concentração clara de demanda. Pode virar produto dedicado (curso, palestra, festa temática).`,
      acao:`Idealize oferta que atende esse tema. Ex: curso de 4 semanas, R$ 400. Pitch direto pra quem consultou nele.`,
      conv:'—',
      potencial: 0
    });
  }

  // Sazonalidade
  const porMes = {};
  pessoas.forEach(p => p.interacoes.filter(i => i.pago && i.data).forEach(i => {
    const m = i.data.slice(0,7);
    porMes[m] = (porMes[m]||0) + i.valor;
  }));
  const mesesArr = Object.entries(porMes).sort((a,b)=>b[1]-a[1]);
  if (mesesArr.length >= 4) {
    const media = Object.values(porMes).reduce((s,v)=>s+v,0) / Object.keys(porMes).length;
    const mediaTop3 = mesesArr.slice(0,3).reduce((s,m)=>s+m[1],0) / 3;
    if (mediaTop3 > media * 1.4) {
      const meses = mesesArr.slice(0,3).map(m => {
        const [y,mn] = m[0].split('-');
        return new Date(parseInt(y), parseInt(mn)-1, 1).toLocaleDateString('pt-BR', {month:'short',year:'2-digit'});
      }).join(', ');
      opps.push({
        icon:'📈', tone:'gold',
        titulo:`Sazonalidade detectada`,
        evidencia:`Top 3 meses (${meses}) geram ${((mediaTop3/media-1)*100).toFixed(0)}% acima da média.`,
        acao:'Antecipe ações e campanhas pros meses fortes. Reduza despesas nos meses fracos.',
        conv:'—',
        potencial: 0
      });
    }
  }

  // Origens (como_soube)
  const origens = {};
  pessoas.forEach(p => p.interacoes.filter(i => i.type==='pedido' && i.comoSoube).forEach(i => {
    origens[i.comoSoube] = (origens[i.comoSoube]||0) + 1;
  }));
  const origensArr = Object.entries(origens).sort((a,b)=>b[1]-a[1]);
  if (origensArr.length > 0) {
    const total = origensArr.reduce((s,o)=>s+o[1],0);
    const top = origensArr[0];
    if (top[1] / total > 0.35) {
      const labelMap = { instagram:'Instagram', indicacao:'Indicação', gira_aberta:'Gira aberta', site:'Site / Google', outro:'Outro' };
      opps.push({
        icon:'📣', tone:'blue',
        titulo:`${labelMap[top[0]]||top[0]} é o canal #1 de aquisição (${((top[1]/total)*100).toFixed(0)}%)`,
        evidencia:`${top[1]} de ${total} compradores citaram esse canal.`,
        acao:`Invista esforço onde já funciona. Se Instagram, intensifique posts/reels. Se indicação, crie programa de referral.`,
        conv:'—',
        potencial: 0
      });
    }
  }

  opps.sort((a,b) => (b.potencial||0) - (a.potencial||0));

  const toneBg = {
    gold:'background:linear-gradient(135deg,rgba(212,168,67,.06),rgba(212,168,67,.01));border:1px solid rgba(212,168,67,.25)',
    green:'background:linear-gradient(135deg,var(--green-bg),rgba(46,204,113,.02));border:1px solid var(--green-bd)',
    blue:'background:linear-gradient(135deg,rgba(52,152,219,.06),rgba(52,152,219,.01));border:1px solid rgba(52,152,219,.25)'
  };

  $('#intel-body').innerHTML = opps.length === 0
    ? '<div class="card"><div class="empty"><div class="empty-t">Sem oportunidades detectadas ainda</div><div class="empty-s">Conforme aparecem mais atendimentos e pedidos, recomendações vão surgir automaticamente. Período: ' + _intelPeriodo + '.</div></div></div>'
    : opps.map(o => `
        <div class="card" style="${toneBg[o.tone]||''};margin-bottom:14px">
          <div style="display:flex;align-items:start;gap:14px">
            <div style="font-size:28px;flex-shrink:0;line-height:1">${o.icon}</div>
            <div style="flex:1;min-width:0">
              <div style="font-size:16px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:8px">${o.titulo}</div>

  } catch(e) { /* doc novo */ }
  const cfg = {
    whatsapp: '5519992494267',
    texto_intro: '',
    antecedencia_min_horas: 24,
    ativa: true,
    // Estrutura nova: janelas por dia da semana ('0'=dom .. '6'=sáb)
    horarios_semana: {
      '0': [], '1': [], '2': [{inicio:'10:00',fim:'18:00'}],

        <div class="page-sub">Define o que aparece em <code>agendar.html</code></div>
      </div>
      <div class="page-actions">
        <a class="btn" href="servicos" onclick="event.preventDefault();window._app.navigate('servicos')">⚙️ Gerenciar serviços</a>
        <a class="btn" href="agendar.html" target="_blank">↗ Abrir página pública</a>
      </div>
    </div>

    <div class="card" style="max-width:780px;margin-bottom:14px">
      <div class="fi-group">
        <label class="checkbox-row">
          <input type="checkbox" id="cf-ativa" ${cfg.ativa?'checked':''}/>
          Agendamentos ativos (desmarcar pra fechar temporariamente)
        </label>
      </div>
      <div class="row-2">
        <div class="fi-group"><label>Antecedência mínima (horas)</label><input type="number" class="fi" id="cf-ant" value="${cfg.antecedencia_min_horas}" min="0"/></div>
        <div class="fi-group"><label>WhatsApp (com DDI)</label><input class="fi" id="cf-wpp" value="${cfg.whatsapp}" placeholder="5519999999999"/></div>
      </div>
      <div class="row-2">
        <div class="fi-group"><label>Chave PIX do terreiro</label><input class="fi" id="cf-pix" value="${cfg.pix||''}" placeholder="ex: 19992494267 ou candieiro@email.com"/></div>
        <div class="fi-group"><label>Titular do PIX</label><input class="fi" id="cf-pix-titular" value="${cfg.pix_titular||''}" placeholder="ex: Fernando Soares"/></div>
      </div>
      <div style="padding:12px 14px;background:rgba(52,152,219,0.06);border:1px solid rgba(52,152,219,0.2);border-radius:10px;font-size:12.5px;color:var(--text2);line-height:1.55">
        💳 <strong>Pagamento com cartão (InfinityPay)</strong>: cada serviço e cada produto agora tem campo próprio pra colar o link da InfinityPay (já que cada link tem ID gerado por eles + valor fixo). Crie o link no app da InfinityPay com o valor exato e cole no formulário do serviço/produto.
      </div>
      <div class="fi-group"><label>Texto de introdução (substitui o default)</label><textarea class="fi" id="cf-intro" placeholder="Atendimentos individuais com Pai Nando...">${cfg.texto_intro||''}</textarea></div>
    </div>

    <div style="max-width:780px;margin-bottom:14px">
      <div style="font-weight:700;font-size:14px;margin-bottom:8px">Horários disponíveis por dia da semana</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:14px">Cada dia pode ter várias janelas (ex: manhã + tarde). Os slots são calculados pela duração do serviço escolhido pelo cliente.</div>
      ${[2,3,4,5,6,0,1].map(renderDia).join('')}
    </div>

    <div style="max-width:780px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center">
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" id="cf-bootstrap-slots" title="Popula pub_slots_ocupados com atendimentos/solicitações existentes. Roda 1x após instalar rules.">🔁 Resincronizar slots públicos</button>
        <button class="btn" id="cf-import-gcal" title="Importa eventos do Google Calendar pra bloquear horários no agendar.html. Pra horários antigos que não existem como atendimento no admin." ${gcalIsConnected()?'':'disabled style="opacity:.5;cursor:not-allowed"'}>📅 Importar do Google Calendar</button>
      </div>
      <button class="btn btn-primary" id="cf-save">Salvar configuração</button>
    </div>
    ${!gcalIsConnected() ? '<div style="max-width:780px;font-size:12px;color:var(--text3);margin-top:8px">Conecte o Google Calendar (em Atendimentos do Pai → Agenda) pra liberar a importação.</div>' : ''}
  `;

  $('#cf-import-gcal').onclick = async () => {
    if(!gcalIsConnected()) { toast('Conecte o Google Calendar primeiro','err'); return; }
    confirmar('Vai ler os eventos do <strong>Google Calendar</strong> dos próximos 90 dias e bloquear os horários no agendar.html. Pula eventos que já têm atendimento vinculado no admin.', async () => {
      const btn = $('#cf-import-gcal');
      const txtOrig = btn.textContent;
      btn.disabled = true; btn.textContent = 'Lendo calendar...';
      try {
        const eventos = await gcalListEvents(90);
        // IDs do gcal que já têm atendimento vinculado (não duplica)
        const jaVinculados = new Set(S.atendimentos.map(a => a.google_event_id).filter(Boolean));
        let c = 0, pulados = 0;
        for(const ev of eventos) {
          if(jaVinculados.has(ev.id)) { pulados++; continue; }
          // só eventos com horário (não all-day)
          if(!ev.start?.dateTime || !ev.end?.dateTime) { pulados++; continue; }
          const start = new Date(ev.start.dateTime);
          const end = new Date(ev.end.dateTime);
          const dur = Math.max(15, Math.round((end - start) / 60000));
          const data = start.toLocaleDateString('en-CA'); // YYYY-MM-DD em fuso local
          const hora = `${String(start.getHours()).padStart(2,'0')}:${String(start.getMinutes()).padStart(2,'0')}`;
          await setDoc(doc(dbPvd,'pub_slots_ocupados','gcal_'+ev.id), {
            data, hora, dur,
            fonte: 'gcal_externo',
            atualizadoEm: serverTimestamp()
          });
          c++;
        }
        toast(`${c} eventos do calendar importados${pulados?` · ${pulados} pulados`:''}`,'ok');
      } catch(e) { toast('Erro: '+e.message,'err'); }
      finally { btn.disabled = false; btn.textContent = txtOrig; }
    });
  };

  $('#cf-bootstrap-slots').onclick = async () => {
    confirmar('Vai popular <strong>pub_slots_ocupados</strong> com todos os atendimentos não-cancelados e solicitações pendentes a partir de hoje. Rode uma vez após instalar as rules.', async () => {
      try {
        const hoje = new Date().toISOString().slice(0,10);
        let c = 0;
        const snapA = await getDocs(collection(dbPvd,'adm_atendimentos'));
        for(const d of snapA.docs) {
          const a = d.data();
          if(!a.data || a.data < hoje) continue;
          if(a.status_atendimento === 'cancelado') continue;
          await setDoc(doc(dbPvd,'pub_slots_ocupados','atend_'+d.id), {
            data: a.data, hora: a.hora, dur: a.duracao_min||60,
            fonte: 'atendimento', atualizadoEm: serverTimestamp()
          });
          c++;
        }
        const snapS = await getDocs(collection(dbPvd,'adm_solicitacoes'));
        for(const d of snapS.docs) {
          const s = d.data();
          if(!s.data || s.data < hoje) continue;
          if(s.status !== 'pendente') continue;
          await setDoc(doc(dbPvd,'pub_slots_ocupados','sol_'+d.id), {
            data: s.data, hora: s.hora, dur: s.duracao_min||60,
            fonte: 'solicitacao', atualizadoEm: serverTimestamp()
          });
          c++;
        }
        toast(`${c} slots sincronizados`,'ok');
      } catch(e) { toast('Erro: '+e.message,'err'); }
    });
  };

  $('#cf-save').onclick = async () => {
    // Lê janelas atuais do DOM
    const horarios_semana = {};
    for(let i=0; i<7; i++) {
      const cont = document.querySelector(`#janelas-${i}`);
      if(!cont) { horarios_semana[String(i)] = []; continue; }
      const janelas = Array.from(cont.querySelectorAll('[data-j]')).map(div => ({
        inicio: div.querySelector('[data-campo=inicio]').value,
        fim: div.querySelector('[data-campo=fim]').value
      })).filter(j => j.inicio && j.fim);
      horarios_semana[String(i)] = janelas;
    }
    const payload = {
      ativa: $('#cf-ativa').checked,
      antecedencia_min_horas: parseInt($('#cf-ant').value) || 0,
      whatsapp: $('#cf-wpp').value.replace(/\D/g,''),
      pix: $('#cf-pix').value.trim() || null,
      pix_titular: $('#cf-pix-titular').value.trim() || null,
      texto_intro: $('#cf-intro').value.trim() || null,
      horarios_semana,
      atualizadoEm: serverTimestamp()
    };
    try {
      await setDoc(doc(dbPvd,'adm_config','agendamento'), payload, { merge: true });
      toast('Configuração salva','ok');
    } catch(e) { toast('Erro: '+e.message,'err'); }
  };
}

// Helpers pra config-agendamento gerenciar janelas no DOM
function addJanelaDia(i) {
  const cont = document.querySelector(`#janelas-${i}`);
  if(!cont) return;
  const idx = cont.querySelectorAll('[data-j]').length;
  // Remove "Sem atendimento" placeholder
  if(cont.querySelector('div[style*="italic"]')) cont.innerHTML = '';
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:6px';
  div.setAttribute('data-j', idx);
  div.innerHTML = `
    <input type="time" class="fi" value="10:00" data-campo="inicio" style="width:auto"/>
    <span style="color:var(--text3)">até</span>
    <input type="time" class="fi" value="18:00" data-campo="fim" style="width:auto"/>
    <button type="button" class="btn btn-sm btn-danger" onclick="window._app.delJanelaDia(${i},${idx})">×</button>
  `;
  cont.appendChild(div);
}

function delJanelaDia(i, idx) {
  const cont = document.querySelector(`#janelas-${i}`);
  if(!cont) return;
  const el = cont.querySelector(`[data-j="${idx}"]`);
  if(el) el.remove();
  if(cont.querySelectorAll('[data-j]').length === 0) {
    cont.innerHTML = '<div style="font-size:12.5px;color:var(--text3);font-style:italic">Sem atendimento</div>';
  }
}

function renderMinhasEscalas(c) {
  const f = S.filhoDoc;
  const hoje = new Date().toISOString().slice(0,10);
  const minhas = S.escalas.filter(es => (es.alocacoes||[]).some(a => a.filho_id === f.id));
  const futuras = minhas.filter(es => es.data >= hoje).sort((a,b)=>a.data.localeCompare(b.data));
  const passadas = minhas.filter(es => es.data < hoje).sort((a,b)=>b.data.localeCompare(a.data));

  const card = (es) => {
    const ev = S.eventos.find(e=>e.id===es.evento_id);
    const aloc = es.alocacoes.find(a=>a.filho_id===f.id);
    const fn = S.funcoes.find(fn=>fn.id===aloc?.funcao_id);
    const dataReal = dataEfetivaAloc(es, aloc);
    const ehDepois = dataReal !== es.data;
    return `
      <div class="list-item">
        <div class="li-avatar" style="background:var(--gold-bg);color:var(--gold)">${(dataReal||'').slice(8,10)}</div>
        <div class="li-main">
          <div class="li-name">${ev?.nome||'Evento'} — <span style="color:var(--gold)">${fn?.nome||'—'}</span></div>
          <div class="li-meta">
            <span>${fmt.dataLong(dataReal)} ${ehDepois?'<span style="color:var(--text3)">(dia seguinte à gira)</span>':`· ${ev?.hora||'—'}`}</span>
            <span class="chip">${aloc?.status||'escalado'}</span>
          </div>
        </div>
      </div>
    `;
  };

  c.innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">Minhas escalas</div>
        <div class="page-sub">${futuras.length} futura${futuras.length===1?'':'s'} · ${passadas.length} passada${passadas.length===1?'':'s'}</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:14px">
      <div class="card-h"><div class="card-title">Próximas</div></div>
      ${futuras.length===0?'<div class="empty"><div class="empty-s">Sem escalas futuras</div></div>':futuras.map(card).join('')}
    </div>

    ${passadas.length?`
      <div class="card">
        <div class="card-h"><div class="card-title">Histórico</div></div>
        ${passadas.slice(0,20).map(card).join('')}
      </div>
    `:''}
  `;
}

function renderDisponibilidade(c) {
  const f = S.filhoDoc;
  // Mes atual + próximo
  const now = new Date();
  const meses = [
    now.toISOString().slice(0,7),
    new Date(now.getFullYear(), now.getMonth()+1, 1).toISOString().slice(0,7)
  ];

  c.innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">Minha disponibilidade</div>
        <div class="page-sub">Marque os dias que <strong>NÃO</strong> pode comparecer. Vazio = totalmente disponível.</div>
      </div>
    </div>
    ${meses.map(m => `<div class="card" style="margin-bottom:18px" id="disp-${m}"></div>`).join('')}
  `;

  meses.forEach(m => renderDispMes(m));
}

async function renderDispMes(m) {
  const f = S.filhoDoc;
  const docId = `${f.id}_${m}`;
  const disp = S.disponibilidade.find(d => d.id === docId) || { datas_indisponivel:[], funcoes_indisponivel:[] };
  const [ano, mes] = m.split('-').map(Number);
  const first = new Date(ano, mes-1, 1);
  const last = new Date(ano, mes, 0);
  const firstDow = first.getDay();
  const daysInMonth = last.getDate();
  const nomeMes = first.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});

  let cells = '';
  for(let i=0; i<firstDow; i++) cells += `<div class="disp-day out"></div>`;
  for(let d=1; d<=daysInMonth; d++) {
    const dStr = `${ano}-${String(mes).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const indisp = disp.datas_indisponivel?.includes(dStr);
    cells += `<div class="disp-day ${indisp?'indisp':''}" data-d="${dStr}" data-m="${m}">${d}</div>`;
  }

  const funcoesAtivas = S.funcoes.filter(f=>!f.arquivada);
  const card = $(`#disp-${m}`);
  card.innerHTML = `
    <div class="card-h"><div class="card-title" style="text-transform:capitalize">${nomeMes}</div></div>
    <div class="disp-cal" style="margin-bottom:14px">
      ${['D','S','T','Q','Q','S','S'].map(d=>`<div style="text-align:center;font-size:11px;color:var(--text3);padding:4px">${d}</div>`).join('')}
      ${cells}
    </div>
    <div class="fi-group">
      <label>Funções que NÃO posso fazer esse mês</label>
      <div class="chips" id="disp-funcs-${m}">
        ${funcoesAtivas.map(fn => {
          const sel = (disp.funcoes_indisponivel||[]).includes(fn.id);
          return `<button type="button" class="chip ${sel?'chip-red':''}" data-fid="${fn.id}" data-sel="${sel}" onclick="this.dataset.sel = this.dataset.sel==='true'?'false':'true'; this.classList.toggle('chip-red')">${fn.nome}</button>`;
        }).join('')}
      </div>
    </div>
    <div class="fi-group">
      <label>Observação opcional</label>
      <input class="fi" id="disp-obs-${m}" value="${disp.obs||''}" placeholder="Ex: estou de luto / vou viajar dia X"/>
    </div>
    <div style="display:flex;justify-content:flex-end"><button class="btn btn-primary" onclick="window._app.salvarDisp('${m}')">Salvar disponibilidade</button></div>
  `;

  card.querySelectorAll('.disp-day:not(.out)').forEach(el => {
    el.onclick = () => el.classList.toggle('indisp');
  });
}

async function salvarDisp(m) {
  const f = S.filhoDoc;
  const docId = `${f.id}_${m}`;
  const datas = $$(`#disp-${m} .disp-day.indisp[data-d]`).map(el => el.dataset.d);
  const funcs = $$(`#disp-funcs-${m} [data-sel="true"]`).map(el => el.dataset.fid);
  const obs = $(`#disp-obs-${m}`).value.trim();
  try {
    await setDoc(doc(dbPvd,'adm_disponibilidade',docId), {
      filho_id: f.id,
      mes: m,
      datas_indisponivel: datas,
      funcoes_indisponivel: funcs,
      obs,
      atualizadoEm: serverTimestamp()
    }, { merge:true });
    toast('Disponibilidade salva','ok');
  } catch(e) { toast('Erro: '+e.message,'err'); }
}

function renderAvisosFilho(c) {
  const ativos = S.avisos.filter(a=>!a.arquivado).sort((a,b)=>(b.publicadoEm?.seconds||0)-(a.publicadoEm?.seconds||0));
  c.innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">Avisos</div>
        <div class="page-sub">${ativos.length} aviso${ativos.length===1?'':'s'} do terreiro</div>
      </div>
    </div>
    ${ativos.length===0 ? '<div class="empty"><div class="empty-t">Nenhum aviso ativo</div></div>' : ativos.map(a => `
      <div class="card" style="margin-bottom:12px;${a.importante?'border-color:var(--red-bd)':''}">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          ${a.importante ? '<span class="chip chip-red">IMPORTANTE</span>' : ''}
          <span style="font-size:11px;color:var(--text3)">${fmt.rel(a.publicadoEm)}</span>
        </div>
        <div style="font-size:16px;font-weight:700;margin-bottom:6px">${a.titulo}</div>
        <div style="font-size:14px;color:var(--text2);line-height:1.5;white-space:pre-wrap">${a.corpo}</div>
      </div>
    `).join('')}
  `;
}

    console.table(pend.map(p => ({
      id: p.id.slice(0,8),
      nome: p.nome,
      produto: p.produto_nome,
      email: p.email || (p.filho_id ? '(buscar no filho)' : '(sem email)'),
      tem_filho: !!p.filho_id

    console.log(`📊 Pendentes: ${pend.length} · Já enviados: ${enviados.length}`);
    return { pendentes: pend.length, enviados: enviados.length };
