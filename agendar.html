<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Agendar — Terreiro do Candieiro</title>
<meta name="description" content="Agende sua consulta no Terreiro do Candieiro em Barão Geraldo, Campinas."/>
<meta property="og:title" content="Agendar — Terreiro do Candieiro"/>
<meta property="og:description" content="Atendimentos com Pai Nando em Barão Geraldo, Campinas. Escolha o serviço, dia e horário."/>
<link rel="icon" type="image/png" href="logocandieiro.png"/>
<link rel="apple-touch-icon" href="logocandieiro.png"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;
  --glass:rgba(255,255,255,0.04);
  --glass2:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.15);
  --red:#e63329;--red2:#c0251c;
  --gold:#d4a843;--gold2:#b8922a;
  --green:#2ecc71;
  --green-bg:rgba(46,204,113,0.1);--green-bd:rgba(46,204,113,0.3);
  --blue:#3498db;--blue-bg:rgba(52,152,219,0.1);
  --text:#f0e8d8;--text2:#a89880;--text3:#6b5d4f;
  --font:-apple-system,'SF Pro Rounded','SF Pro Display',BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --rad:10px;--radlg:14px;
}
html,body{background:var(--bg);min-height:100vh}
body{font-family:var(--font);color:var(--text);background-image:radial-gradient(ellipse at 20% 0%,rgba(230,51,41,0.06) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(212,168,67,0.04) 0%,transparent 50%);padding:24px 16px 60px}
.container{max-width:780px;margin:0 auto}
header{text-align:center;margin-bottom:30px;padding:14px 0}
.flame{width:54px;height:54px;color:var(--red);margin:0 auto 14px;display:block}
h1{font-size:26px;font-weight:700;letter-spacing:.02em;margin-bottom:8px}
h1 .accent{color:var(--gold)}
.subtitle{font-size:12px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:18px}
.intro{font-size:15px;color:var(--text2);line-height:1.55;max-width:560px;margin:0 auto}

.card{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--radlg);padding:22px;margin-bottom:18px}
.card h2{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card h2 svg{width:18px;height:18px;color:var(--gold)}

/* Stepper */
.stepper{display:flex;gap:6px;margin-bottom:18px;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;justify-content:center;flex-wrap:wrap}
.step{padding:6px 12px;border:1px solid var(--border);border-radius:20px;background:var(--glass2);font-family:var(--font);color:var(--text3);font-size:11px;text-transform:uppercase;letter-spacing:.06em}
.step.clickable{cursor:pointer;transition:filter .12s,transform .12s}
.step.clickable:hover{filter:brightness(1.15);transform:translateY(-1px)}
.step.active{background:var(--gold);color:#1a1209;border-color:var(--gold);font-weight:700}
.step.done{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
.step.future{opacity:.55;cursor:not-allowed}

/* Service cards */
.servicos{display:grid;gap:10px}
.servico{padding:16px 18px;background:var(--glass2);border:2px solid var(--border);border-radius:var(--radlg);cursor:pointer;transition:all .15s}
.servico:hover{border-color:var(--gold);background:rgba(212,168,67,0.1)}
.servico.sel{border-color:var(--gold);background:rgba(212,168,67,0.15)}
.servico-nome{font-size:16px;font-weight:700;margin-bottom:4px}
.servico-meta{font-size:13px;color:var(--text2);display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:6px}
.servico-meta strong{color:var(--gold)}
.servico-desc{font-size:13px;color:var(--text3);line-height:1.45}
.chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.chip-green{background:var(--green-bg);color:var(--green)}
.chip-blue{background:var(--blue-bg);color:var(--blue)}

/* Modalidade */
.modalidade-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mod-opt{padding:18px;background:var(--glass2);border:2px solid var(--border);border-radius:var(--radlg);cursor:pointer;text-align:center;transition:all .15s}
.mod-opt:hover{border-color:var(--gold)}
.mod-opt.sel{border-color:var(--gold);background:rgba(212,168,67,0.12)}
.mod-icon{font-size:30px;margin-bottom:6px;display:block}
.mod-nome{font-size:15px;font-weight:700}
.mod-desc{font-size:12px;color:var(--text3);margin-top:4px}

/* Week strip */
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px}
.week-nav h3{font-size:14px;font-weight:600;color:var(--text2);text-align:center;flex:1}
.cal-btn{background:var(--glass2);border:1px solid var(--border2);border-radius:8px;padding:8px 14px;color:var(--text);cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600;white-space:nowrap}
.cal-btn:hover:not(:disabled){background:var(--glass);border-color:var(--gold)}
.cal-btn:disabled{opacity:.3;cursor:not-allowed}
.day-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.day-card{background:var(--glass2);border:2px solid transparent;border-radius:10px;padding:11px 4px;cursor:pointer;transition:all .14s;display:flex;flex-direction:column;align-items:center;gap:3px;min-height:84px;justify-content:center;text-align:center;position:relative}
.day-card:hover:not(.disabled){background:rgba(212,168,67,0.15);border-color:var(--gold);transform:translateY(-1px)}
.day-card .dow{font-size:10.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.day-card .day{font-size:21px;font-weight:700;color:var(--text);line-height:1}
.day-card .month{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.day-card.disabled{opacity:.28;cursor:not-allowed}
.day-card.today{border-color:var(--red)}
.day-card.today .day{color:var(--red)}
.day-card.selected{background:var(--gold);border-color:var(--gold)}
.day-card.selected .day,.day-card.selected .dow,.day-card.selected .month{color:#1a1209}
.day-card.has-slots:not(.disabled):not(.selected)::after{content:'';position:absolute;bottom:7px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--green)}

/* Slots */
.slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px}
.slot{padding:11px 14px;background:var(--glass2);border:1px solid var(--border2);border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;color:var(--text);text-align:center;font-family:var(--font);transition:all .12s}
.slot:hover{background:rgba(212,168,67,0.18);border-color:var(--gold);transform:translateY(-1px)}
.slot.busy{opacity:.3;cursor:not-allowed;color:var(--text3);text-decoration:line-through;background:transparent}
.slot.busy:hover{transform:none;background:transparent;border-color:var(--border2)}
.slots-empty{text-align:center;padding:24px;color:var(--text3);font-size:14px}
.slot.selected{background:var(--gold);color:#1a1209;border-color:var(--gold)}
.slot.selected:hover{background:var(--gold);transform:none}

/* Form & modal */
.modal-bd{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s}
.modal-bd.show{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{width:480px;max-width:100%;max-height:90vh;overflow-y:auto;background:#181412;border:1px solid var(--border2);border-radius:var(--radlg);box-shadow:0 30px 80px rgba(0,0,0,.6)}
.modal-h{padding:20px 24px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-h h3{font-size:16px;font-weight:700}
.modal-h .when{font-size:13px;color:var(--gold);margin-top:4px;text-transform:capitalize}
.modal-c{padding:20px 24px}
.btn-close{background:transparent;border:none;color:var(--text3);cursor:pointer;padding:4px;display:flex}
.btn-close svg{width:20px;height:20px}
.btn-close:hover{color:var(--text)}
.fi-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.fi-group label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase}
.fi{padding:11px 13px;background:rgba(255,255,255,0.05);border:1px solid var(--border2);border-radius:var(--rad);color:var(--text);font-size:15px;font-family:var(--font);outline:none;width:100%}
.fi:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,67,0.15)}
textarea.fi{min-height:70px;resize:vertical}
.req{color:var(--red)}
.btn{display:inline-flex;align-items:center;gap:7px;padding:11px 18px;border-radius:var(--rad);border:1px solid var(--border2);background:var(--glass);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font)}
.btn:hover{background:var(--glass2)}
.btn-primary{background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 100%);border-color:transparent;color:#1a1209}
.btn-primary:hover{transform:translateY(-1px);filter:brightness(1.05)}
.btn-primary:disabled{opacity:.55;cursor:wait}
.btn-block{width:100%;justify-content:center;padding:14px}
.success-box{text-align:center;padding:34px 24px}
.success-icon{width:64px;height:64px;color:var(--green);margin:0 auto 14px;display:block}
.success-t{font-size:18px;font-weight:700;margin-bottom:10px}
.success-d{font-size:14px;color:var(--text2);line-height:1.5;margin-bottom:24px}
.success-whats{display:inline-flex;align-items:center;gap:8px;padding:14px 22px;background:#25d366;color:#fff;border-radius:var(--rad);text-decoration:none;font-weight:700;font-size:15px}
.success-whats:hover{transform:translateY(-1px)}

#loading{text-align:center;padding:40px;color:var(--text3)}
.spinner{width:30px;height:30px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

footer{text-align:center;margin-top:36px;color:var(--text3);font-size:13px;line-height:1.6}
footer a{color:var(--gold);text-decoration:none}

@media (max-width:560px){
  body{padding:18px 12px 40px}
  h1{font-size:22px}
  .day-strip{gap:4px}
  .day-card{padding:8px 2px;min-height:70px;gap:2px}
  .day-card .day{font-size:18px}
  .modalidade-opts{grid-template-columns:1fr}
}

/* Resumo na lateral */
.resumo{padding:12px 14px;background:rgba(212,168,67,0.08);border:1px solid rgba(212,168,67,0.25);border-radius:10px;margin-bottom:14px;font-size:13px}
.resumo-row{display:flex;justify-content:space-between;gap:10px;padding:3px 0}
.resumo-row strong{color:var(--gold)}
</style>
</head>
<body>

<div class="container">
  <a href="https://terreirodocandieiro.com.br" style="display:inline-flex;align-items:center;gap:6px;color:var(--text3);font-size:13px;text-decoration:none;padding:6px 0;margin-bottom:8px" onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--text3)'">← Voltar para o site</a>
  <header>
    <img class="flame" src="logocandieiro.png" alt="Candieiro" style="object-fit:contain;width:80px;height:80px"/>
    <h1>Agendar <span class="accent">consulta</span></h1>
    <div class="subtitle">Terreiro do Candieiro</div>
    <p class="intro" id="intro-text">Atendimentos individuais com Pai Nando em Barão Geraldo, Campinas.</p>
  </header>

  <div id="loading"><div class="spinner"></div>Carregando agenda...</div>

  <div id="content" style="display:none">
    <div class="stepper" id="stepper"></div>
    <div id="passo"></div>
  </div>

  <footer>Terreiro do Candieiro · R. Angelo Vicentim 236 · Barão Geraldo, Campinas-SP<br>
  <a id="footer-whats" href="#" target="_blank">Dúvidas? Fala com a gente no WhatsApp</a>
  </footer>
</div>

<div class="modal-bd" id="modal-bd"><div class="modal" id="modal"><div class="modal-c" id="modal-c"></div></div></div>

<script type="module">
import { initializeApp } from "https://cdn.jsdelivr.net/npm/firebase@10.12.0/app/+esm";
import {
  getFirestore, collection, doc, getDoc, getDocs, addDoc, setDoc, query, where, orderBy, serverTimestamp
} from "https://cdn.jsdelivr.net/npm/firebase@10.12.0/firestore/+esm";

const cfg = {
  apiKey: "AIzaSyCVGBtxNCj4iE3OsBY4KD_eYlYXL3SGgs4",
  authDomain: "terreiro-pvd.firebaseapp.com",
  projectId: "terreiro-pvd",
  storageBucket: "terreiro-pvd.firebasestorage.app",
  messagingSenderId: "365180068240",
  appId: "1:365180068240:web:7b2fe25ca670781f585315"
};
const db = getFirestore(initializeApp(cfg));

const cfgDefault = {
  horarios_semana: { '0':[], '1':[], '2':[{inicio:'10:00',fim:'18:00'}], '3':[{inicio:'10:00',fim:'18:00'}], '4':[{inicio:'10:00',fim:'18:00'}], '5':[{inicio:'10:00',fim:'18:00'}], '6':[{inicio:'10:00',fim:'18:00'}] },
  whatsapp: "5519992494267",
  texto_intro: null,
  ativa: true,
  antecedencia_min_horas: 24,
  pix: null,
  pix_titular: null
};

let APP = {
  cfg: cfgDefault,
  servicos: [],
  ocupados: new Set(),
  servico: null,
  modalidade: null,
  dataSel: null,
  horaSel: null,
  viewStart: null,
  passo: 1
};

const $ = q => document.querySelector(q);
const pad = n => String(n).padStart(2,'0');
const fmtData = d => d ? new Date(d+'T00:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'}) : '—';
const fmtCurto = d => d ? new Date(d+'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}) : '—';
const toMin = h => { const [a,b] = h.split(':').map(Number); return a*60+b; };
const fromMin = m => `${pad(Math.floor(m/60))}:${pad(m%60)}`;

function closeModal() {
  $('#modal-bd').classList.remove('show');
  $('#modal-c').innerHTML = '';
}
window.closeModal = closeModal;

// ── BOOT ───────────────────────────────────────────────────────────────────
(async function boot() {
  try {
    // Config
    try {
      const snap = await getDoc(doc(db,'adm_config','agendamento'));
      if(snap.exists()) {
        const dados = snap.data();
        APP.cfg = { ...cfgDefault, ...dados };
        // Migration: se tem só dias_atendimento + horas, converte
        if(dados.dias_atendimento && dados.hora_inicio && dados.hora_fim && !dados.horarios_semana) {
          APP.cfg.horarios_semana = {};
          for(let i=0;i<7;i++) APP.cfg.horarios_semana[String(i)] = dados.dias_atendimento.includes(i) ? [{ inicio: dados.hora_inicio, fim: dados.hora_fim }] : [];
        }
      }
    } catch(e) {}

    // Serviços (só públicos + ativos)
    try {
      const snap = await getDocs(collection(db,'adm_servicos'));
      APP.servicos = snap.docs.map(d => ({ id:d.id, ...d.data() }))
        .filter(s => s.publico !== false && s.ativo !== false)
        .sort((a,b) => (a.ordem||999) - (b.ordem||999));
    } catch(e) { console.warn('Erro servicos', e); }

    // Slots ocupados
    await carregarOcupados();

    if(APP.cfg.texto_intro) $('#intro-text').textContent = APP.cfg.texto_intro;
    $('#footer-whats').href = `https://wa.me/${APP.cfg.whatsapp}?text=${encodeURIComponent('Olá! Tenho dúvidas sobre o agendamento.')}`;

    if(!APP.cfg.ativa) {
      $('#loading').innerHTML = `<div style="font-size:15px;color:var(--text2);max-width:420px;margin:0 auto">Agendamentos temporariamente fechados. <a style="color:var(--gold)" href="${$('#footer-whats').href}">Fale com a gente no WhatsApp</a>.</div>`;
      return;
    }
    if(APP.servicos.length === 0) {
      $('#loading').innerHTML = `<div style="font-size:15px;color:var(--text2);max-width:420px;margin:0 auto">Nenhum serviço disponível pra agendar agora. <a style="color:var(--gold)" href="${$('#footer-whats').href}">Fala com a gente</a>.</div>`;
      return;
    }

    const hoje = new Date(); hoje.setHours(0,0,0,0);
    APP.viewStart = hoje.toISOString().slice(0,10);

    $('#loading').style.display = 'none';
    $('#content').style.display = '';
    renderPasso();
  } catch(e) {
    console.error(e);
    $('#loading').innerHTML = `<div style="color:var(--red)">Erro ao carregar. Recarregue a página.</div>`;
  }
})();

async function carregarOcupados() {
  APP.ocupados.clear();
  const hoje = new Date();
  const limite = new Date(); limite.setMonth(hoje.getMonth() + 3);
  const inicio = hoje.toISOString().slice(0,10);
  const fim = limite.toISOString().slice(0,10);
  // Lê do espelho público (sem PII) — admin sincroniza atendimentos/solicitações aqui
  try {
    const q1 = query(collection(db,'pub_slots_ocupados'), where('data','>=',inicio), where('data','<=',fim));
    (await getDocs(q1)).forEach(d => {
      const a = d.data();
      marcarOcupado(a.data, a.hora, a.dur || 60);
    });
  } catch(e) { console.warn('Erro carregar slots:', e); }
}

function marcarOcupado(data, hora, dur) {
  if(!data || !hora) return;
  const start = toMin(hora);
  // Bloqueia em janelas de 15min pra resolução fina
  for(let m = start; m < start + dur; m += 15) APP.ocupados.add(`${data} ${fromMin(m)}`);
}

// Verifica se um slot [hora, hora+dur) está livre
function slotLivre(data, hora, dur) {
  const start = toMin(hora);
  for(let m = start; m < start + dur; m += 15) {
    if(APP.ocupados.has(`${data} ${fromMin(m)}`)) return false;
  }
  return true;
}

// Gera todos os slots de um dia, respeitando janelas e duração do serviço
function gerarSlots(dataStr, dur) {
  const dow = new Date(dataStr+'T00:00:00').getDay();
  const janelas = APP.cfg.horarios_semana[String(dow)] || [];
  if(janelas.length === 0) return [];
  const slots = [];
  const minBookable = Date.now() + (APP.cfg.antecedencia_min_horas||0)*3600*1000;
  for(const j of janelas) {
    const ini = toMin(j.inicio);
    const fim = toMin(j.fim);
    for(let m = ini; m + dur <= fim; m += dur) {
      const hora = fromMin(m);
      const ts = new Date(`${dataStr}T${hora}:00`).getTime();
      const busy = !slotLivre(dataStr, hora, dur) || ts < minBookable;
      slots.push({ hora, busy });
    }
  }
  return slots;
}

// ── STEPPER ────────────────────────────────────────────────────────────────
function renderStepper() {
  const steps = [
    { n:1, lbl:'Serviço' },
    { n:2, lbl:'Modalidade' },
    { n:3, lbl:'Data e horário' },
    { n:4, lbl:'Confirmar' }
  ];
  const pulaMod = APP.servico && !(APP.servico.online && APP.servico.presencial !== false);
  $('#stepper').innerHTML = steps
    .filter(s => !(s.n === 2 && pulaMod))
    .map(s => {
      let cls = 'step';
      const isCurrent = APP.passo === s.n;
      const isDone = APP.passo > s.n;
      if(isCurrent) cls += ' active';
      else if(isDone) cls += ' done';
      else cls += ' future';
      // clicável só se for done ou active (não pula pra frente)
      const clickable = isDone || isCurrent;
      if(clickable) cls += ' clickable';
      const attrs = clickable
        ? `role="button" tabindex="0" onclick="irParaPasso(${s.n})" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();irParaPasso(${s.n});}"`
        : '';
      return `<span class="${cls}" ${attrs}>${s.lbl}</span>`;
    }).join('');
}

function irParaPasso(n) {
  if(n === APP.passo) return;
  if(n > APP.passo) return; // nunca pula pra frente
  // se o modal de confirmar estiver aberto, fecha
  closeModal();
  APP.passo = n;
  renderPasso();
  window.scrollTo({top:0,behavior:'smooth'});
}
window.irParaPasso = irParaPasso;

function renderPasso() {
  renderStepper();
  if(APP.passo === 1) renderPasso1();
  else if(APP.passo === 2) renderPasso2();
  else if(APP.passo === 3) renderPasso3();
  else if(APP.passo === 4) abrirModalDados();
}

// ── PASSO 1: serviço ──────────────────────────────────────────────────────
function renderPasso1() {
  $('#passo').innerHTML = `
    <div class="card">
      <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Escolha o serviço</h2>
      <div class="servicos">
        ${APP.servicos.map(s => `
          <div class="servico ${APP.servico && APP.servico.id === s.id ? 'sel' : ''}" data-id="${s.id}">
            <div class="servico-nome">${s.nome}</div>
            <div class="servico-meta">
              <span><strong>R$ ${(s.valor||0).toFixed(0)}</strong></span>
              <span>${s.duracao_min||60} min</span>
              ${s.presencial!==false?'<span class="chip chip-green">presencial</span>':''}
              ${s.online?'<span class="chip chip-blue">online</span>':''}
            </div>
            ${s.descricao?`<div class="servico-desc">${s.descricao}</div>`:''}
          </div>
        `).join('')}
      </div>
    </div>
  `;
  document.querySelectorAll('.servico').forEach(el => {
    el.onclick = () => {
      const sid = el.dataset.id;
      APP.servico = APP.servicos.find(s => s.id === sid);
      const hasOnline = !!APP.servico.online;
      const hasPres = APP.servico.presencial !== false;
      if(hasOnline && hasPres) {
        APP.passo = 2;
      } else {
        APP.modalidade = hasPres ? 'presencial' : 'online';
        APP.passo = 3;
      }
      renderPasso();
      window.scrollTo({top:0,behavior:'smooth'});
    };
  });
}

// ── PASSO 3: data ─────────────────────────────────────────────────────────
function renderPasso3() {
  $('#passo').innerHTML = `
    <div class="resumo">
      <div class="resumo-row"><span>Serviço</span><strong>${APP.servico.nome} · R$ ${(APP.servico.valor||0).toFixed(0)}</strong></div>
      <div class="resumo-row"><span>Modalidade</span><strong>${APP.modalidade==='online'?'Online':'Presencial'}</strong></div>
    </div>
    <div class="card">
      <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg>Escolha data e horário</h2>
      <div class="week-nav">
        <button class="cal-btn" id="cal-prev">◀ Anterior</button>
        <h3 id="cal-range">—</h3>
        <button class="cal-btn" id="cal-next">Próxima ▶</button>
      </div>
      <div class="day-strip" id="day-strip"></div>

      <div id="slots-section" style="margin-top:22px;padding-top:18px;border-top:1px solid var(--border)">
        <div id="slots-title" style="font-size:13px;color:var(--text3);margin-bottom:12px">Clica numa data acima pra ver os horários</div>
        <div class="slots" id="slots-grid"></div>
      </div>

      <div id="resumo-final" style="margin-top:18px;padding:14px;background:rgba(212,168,67,0.1);border:1px solid rgba(212,168,67,0.3);border-radius:10px;display:none">
        <div style="font-size:13px;color:var(--text2);margin-bottom:4px">Você escolheu:</div>
        <div id="resumo-quando" style="font-size:15px;font-weight:700;color:var(--gold);text-transform:capitalize"></div>
      </div>

      <div style="display:flex;justify-content:space-between;margin-top:18px;gap:10px">
        <button class="btn" onclick="window._app.voltar()">← Voltar</button>
        <button class="btn btn-primary" id="btn-agendar" disabled style="opacity:.5;cursor:not-allowed">Agendar →</button>
      </div>
    </div>
  `;
  // Se há data selecionada fora da semana atual, re-âncora a viewStart pra ela
  if(APP.dataSel) {
    const selD = new Date(APP.dataSel+'T00:00:00');
    const viewD = new Date(APP.viewStart+'T00:00:00');
    const viewEnd = new Date(viewD); viewEnd.setDate(viewD.getDate()+6);
    if(selD < viewD || selD > viewEnd) {
      APP.viewStart = APP.dataSel;
    }
  }
  renderDayStrip();
  $('#cal-prev').onclick = () => navSemana(-1);
  $('#cal-next').onclick = () => navSemana(1);
  $('#btn-agendar').onclick = () => {
    if(!APP.dataSel || !APP.horaSel) return;
    APP.passo = 4;
    renderPasso();
  };
  // Se já tinha data selecionada, restaura slots (atualizarSlots já chama atualizarResumoFinal)
  if(APP.dataSel) atualizarSlots();
}

function renderDayStrip() {
  const startD = new Date(APP.viewStart+'T00:00:00');
  const dias = [];
  for(let i=0; i<7; i++) {
    const d = new Date(startD);
    d.setDate(startD.getDate()+i);
    dias.push(d);
  }
  $('#cal-range').textContent = `${dias[0].toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})} – ${dias[6].toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})}`;
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const startMs = startD.getTime();
  $('#cal-prev').disabled = startMs <= hoje.getTime();
  $('#cal-next').disabled = startMs >= hoje.getTime() + 60*86400000;
  const hojeStr = hoje.toISOString().slice(0,10);
  const dowAb = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const dur = APP.servico.duracao_min || 60;
  let html = '';
  for(const dt of dias) {
    const dStr = dt.toISOString().slice(0,10);
    const ehHoje = dStr === hojeStr;
    const slots = gerarSlots(dStr, dur);
    const algumLivre = slots.some(s => !s.busy);
    const passado = dStr < hojeStr;
    const disabled = passado || slots.length === 0 || !algumLivre;
    const sel = APP.dataSel === dStr;
    const klass = ['day-card'];
    if(disabled) klass.push('disabled');
    if(ehHoje) klass.push('today');
    if(sel) klass.push('selected');
    if(!disabled && algumLivre) klass.push('has-slots');
    const mesAb = dt.toLocaleDateString('pt-BR',{month:'short'}).replace('.','').toLowerCase();
    html += `<div class="${klass.join(' ')}" ${disabled?'':`data-d="${dStr}"`}><div class="dow">${dowAb[dt.getDay()]}</div><div class="day">${dt.getDate()}</div><div class="month">${mesAb}</div></div>`;
  }
  $('#day-strip').innerHTML = html;
  document.querySelectorAll('.day-card[data-d]').forEach(el => {
    el.onclick = () => {
      APP.dataSel = el.dataset.d;
      APP.horaSel = null; // reset hora ao trocar dia
      // Update somente o strip + slots, sem re-render geral (anti-flicker)
      atualizarStripSelecao();
      atualizarSlots();
    };
  });
}

// Atualiza só a classe 'selected' nos cards do strip (sem re-render)
function atualizarStripSelecao() {
  document.querySelectorAll('.day-card').forEach(el => {
    el.classList.toggle('selected', el.dataset.d === APP.dataSel);
  });
}

// Atualiza só a área de slots (sem flicker)
function atualizarSlots() {
  const sec = $('#slots-section');
  if(!sec || !APP.dataSel) return;
  const dur = APP.servico.duracao_min || 60;
  const slots = gerarSlots(APP.dataSel, dur);
  const titulo = `<strong style="color:var(--text);text-transform:capitalize">${fmtData(APP.dataSel)}</strong> · slots de ${dur} min`;
  if(slots.length === 0) {
    $('#slots-title').innerHTML = titulo;
    $('#slots-grid').innerHTML = '<div class="slots-empty">Nenhum horário nesse dia.</div>';
  } else if(slots.every(s => s.busy)) {
    $('#slots-title').innerHTML = titulo;
    $('#slots-grid').innerHTML = '<div class="slots-empty">Tudo ocupado nesse dia.</div>';
  } else {
    $('#slots-title').innerHTML = titulo;
    $('#slots-grid').innerHTML = slots.map(s => {
      const sel = APP.horaSel === s.hora;
      return `<button class="slot ${s.busy?'busy':''} ${sel?'selected':''}" ${s.busy?'disabled':''} data-h="${s.hora}">${s.hora}</button>`;
    }).join('');
    document.querySelectorAll('#slots-grid .slot[data-h]:not(.busy)').forEach(b => {
      b.onclick = () => {
        APP.horaSel = b.dataset.h;
        // Atualiza só visual dos slots + resumo final
        document.querySelectorAll('#slots-grid .slot').forEach(el => el.classList.toggle('selected', el.dataset.h === APP.horaSel));
        atualizarResumoFinal();
      };
    });
  }
  atualizarResumoFinal();
}

function atualizarResumoFinal() {
  const box = $('#resumo-final');
  const btn = $('#btn-agendar');
  if(!box || !btn) return;
  if(APP.dataSel && APP.horaSel) {
    box.style.display = '';
    $('#resumo-quando').textContent = `${fmtData(APP.dataSel)} · ${APP.horaSel}`;
    btn.disabled = false;
    btn.style.opacity = '1';
    btn.style.cursor = 'pointer';
  } else {
    box.style.display = 'none';
    btn.disabled = true;
    btn.style.opacity = '.5';
    btn.style.cursor = 'not-allowed';
  }
}

function navSemana(delta) {
  const d = new Date(APP.viewStart+'T00:00:00');
  d.setDate(d.getDate() + delta*7);
  APP.viewStart = d.toISOString().slice(0,10);
  renderDayStrip();
  // Se data atual saiu da janela, limpa seleção + slots
  const inView = (() => {
    const start = new Date(APP.viewStart+'T00:00:00');
    const end = new Date(start); end.setDate(start.getDate()+6);
    if(!APP.dataSel) return false;
    const sel = new Date(APP.dataSel+'T00:00:00');
    return sel >= start && sel <= end;
  })();
  if(!inView) {
    APP.dataSel = null;
    APP.horaSel = null;
    $('#slots-title').innerHTML = 'Clica numa data acima pra ver os horários';
    $('#slots-grid').innerHTML = '';
    atualizarResumoFinal();
  }
}

// ── PASSO 4: dados (modal) ────────────────────────────────────────────────
function abrirModalDados() {
  $('#modal-c').innerHTML = `
    <h3 style="font-size:17px;font-weight:700;margin-bottom:6px">Confirmar agendamento</h3>
    <div style="font-size:13px;color:var(--gold);margin-bottom:14px;text-transform:capitalize">${fmtData(APP.dataSel)} · ${APP.horaSel}</div>
    <div class="resumo" style="margin-bottom:14px">
      <div class="resumo-row"><span>${APP.servico.nome}</span><strong>R$ ${(APP.servico.valor||0).toFixed(0)}</strong></div>
      <div class="resumo-row"><span>${APP.modalidade==='online'?'Online':'Presencial'}</span><span>${APP.servico.duracao_min||60} min</span></div>
    </div>
    <div class="fi-group"><label>Seu nome <span class="req">*</span></label><input class="fi" id="b-nome" autocomplete="name" required/></div>
    <div class="fi-group"><label>Telefone (WhatsApp) <span class="req">*</span></label><input class="fi" id="b-tel" type="tel" placeholder="(11) 99999-9999" autocomplete="tel" required/></div>
    <div class="fi-group"><label>Email <span class="req">*</span></label><input class="fi" id="b-email" type="email" placeholder="seu@email.com" autocomplete="email" required/></div>
    <div class="fi-group">
      <label>Método de pagamento <span class="req">*</span></label>
      <select class="fi" id="b-pag" required>
        <option value="">— Selecione —</option>
        <option value="pix">PIX</option>
        <option value="dinheiro">Dinheiro (no dia)</option>
        <option value="cartao_credito">Cartão de crédito</option>
        <option value="cartao_debito">Cartão de débito</option>
        <option value="transferencia">Transferência bancária</option>
      </select>
    </div>
    ${APP.cfg.pix ? `
      <div id="b-pix-box" style="display:none;padding:14px;background:linear-gradient(135deg,rgba(212,168,67,0.12),rgba(212,168,67,0.04));border:1px solid rgba(212,168,67,0.35);border-radius:10px;margin-bottom:14px">
        <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">💳 PIX pra pagar</div>
        <div id="b-pix-key" style="font-size:15px;font-family:monospace;color:var(--gold);font-weight:700;word-break:break-all;margin-bottom:4px;user-select:all">${APP.cfg.pix}</div>
        ${APP.cfg.pix_titular ? `<div style="font-size:12px;color:var(--text2);margin-bottom:10px">Titular: ${APP.cfg.pix_titular}</div>` : ''}
        <button type="button" class="btn" id="b-pix-copy" style="padding:9px 14px;font-size:13px;width:auto">📋 Copiar chave</button>
        <div style="font-size:12px;color:var(--text3);margin-top:10px;line-height:1.5">Após pagar, anexe o comprovante abaixo (ou mande pelo WhatsApp depois).</div>
      </div>
    ` : ''}
    <div class="fi-group">
      <label>Comprovante de pagamento <span style="font-weight:400;color:var(--text3);text-transform:none">(opcional)</span></label>
      <input type="file" class="fi" id="b-comprov" accept="image/*,application/pdf" style="padding:8px"/>
      <div id="b-comprov-info" style="font-size:12px;color:var(--text3);margin-top:6px">Pode anexar agora ou enviar pelo WhatsApp depois.</div>
    </div>
    <div class="fi-group"><label>Observação (opcional)</label><textarea class="fi" id="b-obs" placeholder="Algo que queira contar?"></textarea></div>
    <button class="btn btn-primary btn-block" id="b-submit">Confirmar agendamento</button>
    <button class="btn btn-block" style="margin-top:10px" onclick="window._app.voltar()">← Voltar</button>
    <div id="b-err" style="color:var(--red);font-size:13px;text-align:center;margin-top:10px;display:none"></div>
  `;
  $('#modal-bd').classList.add('show');
  $('#modal-bd').onclick = e => { if(e.target.id === 'modal-bd') closeModal(); };

  // Mostra a box de PIX quando o método for PIX
  const pixBox = $('#b-pix-box');
  if(pixBox) {
    $('#b-pag').onchange = e => {
      pixBox.style.display = e.target.value === 'pix' ? '' : 'none';
    };
    const btnCopy = $('#b-pix-copy');
    if(btnCopy) btnCopy.onclick = () => {
      navigator.clipboard.writeText(APP.cfg.pix).then(() => {
        const orig = btnCopy.textContent;
        btnCopy.textContent = '✓ Copiado!';
        btnCopy.style.background = 'rgba(46,204,113,0.15)';
        btnCopy.style.borderColor = 'var(--green)';
        btnCopy.style.color = 'var(--green)';
        setTimeout(() => {
          btnCopy.textContent = orig;
          btnCopy.style.background = '';
          btnCopy.style.borderColor = '';
          btnCopy.style.color = '';
        }, 1800);
      }).catch(() => {
        alert('Não consegui copiar. A chave é: ' + APP.cfg.pix);
      });
    };
  }

  // Feedback visual ao anexar comprovante (sem upload — só placebo)
  $('#b-comprov').onchange = e => {
    const f = e.target.files[0];
    const info = $('#b-comprov-info');
    if(f) {
      const mb = (f.size/1024/1024).toFixed(2);
      info.innerHTML = `<span style="color:var(--green)">✓ Anexado: <strong>${f.name}</strong> (${mb}MB) — envie também pelo WhatsApp após confirmar.</span>`;
    } else {
      info.innerHTML = 'Pode anexar agora ou enviar pelo WhatsApp depois.';
    }
  };

  $('#b-submit').onclick = async () => {
    const nome = $('#b-nome').value.trim();
    const tel = $('#b-tel').value.replace(/\D/g,'');
    const email = $('#b-email').value.trim();
    const obs = $('#b-obs').value.trim();
    const pag = $('#b-pag').value;
    const comprovFile = $('#b-comprov').files[0]; // só pra UI, não salvamos
    const err = $('#b-err');
    err.style.display = 'none';
    if(!nome) { err.textContent='Informe seu nome'; err.style.display='block'; return; }
    if(!tel || tel.length < 10) { err.textContent='Telefone inválido'; err.style.display='block'; return; }
    if(!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { err.textContent='Informe um email válido pra contato'; err.style.display='block'; return; }
    if(!pag) { err.textContent='Selecione o método de pagamento'; err.style.display='block'; return; }

    const btn = $('#b-submit');
    btn.disabled = true; btn.textContent = 'Enviando...';

    try {
      // NÃO salvamos o arquivo do comprovante no banco (decisão: floda storage).
      // Apenas o flag "anexou" pra admin saber que cliente vai mandar via WhatsApp.
      const solRef = await addDoc(collection(db,'adm_solicitacoes'), {
        nome, tel, email: email||null,
        observacao: obs,
        data: APP.dataSel,
        hora: APP.horaSel,
        duracao_min: APP.servico.duracao_min || 60,
        servico_id: APP.servico.id,
        servico_nome: APP.servico.nome,
        modalidade: APP.modalidade,
        metodo_pagamento: pag,
        comprovante_anexado: !!comprovFile, // só boolean, não o arquivo
        tipo_oraculo: APP.servico.nome.toLowerCase().includes('baralho') ? 'baralho_cigano' : (APP.servico.nome.toLowerCase().includes('búzio')||APP.servico.nome.toLowerCase().includes('buzio') ? 'buzios' : 'outro'),
        valor_proposto: APP.servico.valor || 0,
        status: 'pendente',
        origem: 'agendar_publico',
        criadoEm: serverTimestamp()
      });
      // Espelha no pub_slots_ocupados (sem PII) pra outros agendamentos verem ocupado
      try {
        await setDoc(doc(db,'pub_slots_ocupados','sol_'+solRef.id), {
          data: APP.dataSel,
          hora: APP.horaSel,
          dur: APP.servico.duracao_min || 60,
          fonte: 'solicitacao',
          atualizadoEm: serverTimestamp()
        });
      } catch(e) { console.warn('sync slot público falhou:', e); }
      marcarOcupado(APP.dataSel, APP.horaSel, APP.servico.duracao_min || 60);
      mostrarSucesso(nome, !!comprovFile);
    } catch(e) {
      console.error(e);
      err.textContent = 'Erro ao enviar. Tente o WhatsApp.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Confirmar agendamento';
    }
  };
}

function mostrarSucesso(nome, temComprovante) {
  const msg = `Olá! Acabei de pedir um agendamento:\n\n🪷 ${APP.servico.nome}\n📅 ${fmtData(APP.dataSel)}\n🕐 ${APP.horaSel}\n📍 ${APP.modalidade==='online'?'Online':'Presencial'}\n👤 ${nome}${temComprovante?'\n\n💸 Já tenho o comprovante de pagamento pra enviar.':''}\n\nAguardo confirmação.`;
  const link = `https://wa.me/${APP.cfg.whatsapp}?text=${encodeURIComponent(msg)}`;
  $('#modal-c').innerHTML = `
    <div class="success-box">
      <svg class="success-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <div class="success-t">Pedido recebido!</div>
      <div class="success-d">
        <strong style="color:var(--gold);text-transform:capitalize">${APP.servico.nome} · ${fmtData(APP.dataSel)} · ${APP.horaSel}</strong><br><br>
        ${temComprovante ? '<strong style="color:var(--green)">⚠️ Não esqueça de enviar o comprovante pelo WhatsApp</strong> — ele não fica anexado aqui, só serve pra você confirmar que tem.<br><br>' : ''}
        O Pai Nando vai entrar em contato pelo WhatsApp pra confirmar.
        Se preferir, mande mensagem agora pra agilizar:
      </div>
      <a class="success-whats" href="${link}" target="_blank">
        <svg viewBox="0 0 24 24" fill="currentColor" style="width:20px;height:20px"><path d="M17.6 6.32A8 8 0 005.74 17l-1.07 4.04 4.13-1.08A8 8 0 1017.6 6.32zM12 19.67c-1.36 0-2.69-.37-3.84-1.06l-.28-.16-2.86.75.76-2.79-.18-.29A6.66 6.66 0 0118.66 12 6.67 6.67 0 0112 19.67z"/></svg>
        ${temComprovante ? 'Mandar comprovante pelo WhatsApp' : 'Mandar pelo WhatsApp'}
      </a>
      <div style="margin-top:24px"><button class="btn" onclick="closeModal();location.reload()">Fechar</button></div>
    </div>
  `;
}

function voltar() {
  closeModal();
  if(APP.passo === 4) { APP.passo = 3; renderPasso(); return; }
  if(APP.passo === 3) {
    const hasBoth = APP.servico && APP.servico.online && APP.servico.presencial !== false;
    APP.passo = hasBoth ? 2 : 1;
    renderPasso();
    return;
  }
  if(APP.passo === 2) { APP.passo = 1; renderPasso(); return; }
}

window._app = { voltar };
</script>
